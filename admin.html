<script>
    // --- GIỮ NGUYÊN FIREBASE CONFIG CỦA ANH ---
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- HÀM UPLOAD TỐI ƯU ---
    async function uploadList() {
        const txtArea = document.getElementById('csvData');
        const btn = document.querySelector('.btn');
        const raw = txtArea.value.trim();
        
        if (!raw) {
            alert("Vui lòng dán dữ liệu từ Excel trước!");
            return;
        }

        const lines = raw.split('\n');
        let count = 0;

        // 1. Khóa giao diện để tránh bấm nhiều lần
        btn.disabled = true;
        btn.innerText = "⏳ ĐANG TẢI LÊN (0/" + lines.length + ")...";
        btn.style.background = "#ccc";

        try {
            for (let line of lines) {
                const c = line.split('\t');
                if (c.length >= 2) {
                    const stt = c[0].trim();
                    // Gửi dữ liệu lên Firebase
                    await db.ref('master_list/' + stt).set({
                        stt: stt, 
                        name: c[1]?.trim() || "", 
                        gender: c[2]?.trim() || "",
                        dob: c[3]?.trim() || "", 
                        rank: c[4]?.trim() || "", 
                        position: c[5]?.trim() || "",
                        department: c[6]?.trim() || "", 
                        company: c[7]?.trim() || "", 
                        type: c[8]?.trim() || ""
                    });
                    count++;
                    // Cập nhật trạng thái trên nút bấm
                    btn.innerText = "⏳ ĐANG TẢI LÊN (" + count + "/" + lines.length + ")...";
                }
            }

            // 2. Hoàn tất: Xóa trắng ô nhập và mở khóa nút
            alert("Thành công! Đã nạp xong " + count + " học viên vào Master List.");
            txtArea.value = ""; // Xóa sạch bảng nhập

        } catch (error) {
            console.error(error);
            alert("Có lỗi xảy ra trong quá trình tải lên!");
        } finally {
            btn.disabled = false;
            btn.innerText = "CẬP NHẬT DANH SÁCH";
            btn.style.background = "#007bff";
        }
    }

    // Hiển thị danh sách thực tế (giữ nguyên)
    db.ref('students').on('value', snap => {
        const data = snap.val();
        const tbody = document.querySelector('#listTable tbody');
        tbody.innerHTML = '';
        if(data) {
            const list = Object.values(data);
            document.getElementById('count').innerText = "Số lượng đã có mặt: " + list.length;
            list.forEach(u => {
                tbody.innerHTML += `<tr>
                    <td>${u.stt}</td><td>${u.name}</td><td>${u.dob}</td>
                    <td>${u.department}</td><td>${u.time}</td>
                    <td><img src="${u.photo}" width="60" height="80"></td>
                </tr>`;
            });
        }
    });
</script>
