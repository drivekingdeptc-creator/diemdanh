<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY - ADMIN 4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-link.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-900/50; }
    </style>
</head>
<body class="bg-slate-100 flex min-h-screen font-sans">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen shadow-xl">
        <div class="p-6 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center font-black text-xl text-white">V</div>
                <span class="font-bold text-xl tracking-tight text-white uppercase">VDC Safety</span>
            </div>
            <p class="text-[10px] text-slate-500 mt-1 tracking-widest uppercase">Hệ thống quản trị 4.0</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="nav('sec-dashboard', this)" class="nav-link active w-full flex items-center p-3 rounded-xl transition-all">
                <i class="fas fa-th-large mr-3 w-5"></i> <span>Điểm danh lớp</span>
            </button>
            <button onclick="nav('sec-setup', this)" class="nav-link w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-calendar-alt mr-3 w-5"></i> <span>Thiết lập lớp</span>
            </button>
            <button onclick="nav('sec-add-user', this)" class="nav-link w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-user-plus mr-3 w-5"></i> <span>Thêm học viên</span>
            </button>
            <button onclick="nav('sec-audit', this)" class="nav-link w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-search mr-3 w-5"></i> <span>Soát vé nhanh</span>
            </button>
            <button onclick="nav('sec-report', this)" class="nav-link w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-file-pdf mr-3 w-5"></i> <span>Báo cáo tổng</span>
            </button>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center gap-3 p-3 bg-slate-800/40 rounded-xl">
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold">AT</div>
                <div>
                    <p class="text-xs font-bold text-white">Mr. An Toàn</p>
                    <p class="text-[9px] text-blue-400">Chuyên gia OSH</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-8">
        
        <section id="sec-dashboard" class="active">
            <h1 class="text-2xl font-black text-slate-800 uppercase mb-6">📊 Quản lý điểm danh</h1>
            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Sĩ Số</p>
                    <h3 class="text-3xl font-black text-slate-800">45</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Hiện Diện</p>
                    <h3 class="text-3xl font-black text-green-600">38</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-red-500">
                    <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Vắng</p>
                    <h3 class="text-3xl font-black text-red-600">07</h3>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[11px] uppercase text-slate-500 font-bold tracking-wider">
                        <tr>
                            <th class="p-4 border-b">Học viên</th>
                            <th class="p-4 border-b">Thời gian</th>
                            <th class="p-4 border-b text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y text-sm">
                        <tr class="hover:bg-slate-50">
                            <td class="p-4 font-bold text-slate-700">Nguyễn Văn A</td>
                            <td class="p-4 text-slate-500">07:45:12</td>
                            <td class="p-4 text-center text-red-500 cursor-pointer hover:font-bold">Hủy</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="sec-setup">
            <h1 class="text-2xl font-black text-slate-800 uppercase mb-6">⚙️ Thiết lập phiên dạy</h1>
            <div class="max-w-md bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Ngày huấn luyện</label>
                        <input type="date" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Buổi dạy</label>
                        <select class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                            <option>Sáng</option>
                            <option>Chiều</option>
                        </select>
                    </div>
                    <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">LƯU THIẾT LẬP</button>
                </div>
            </div>
        </section>

        <section id="sec-add-user">
            <h1 class="text-2xl font-black text-slate-800 uppercase mb-6">➕ Nhập danh sách Excel</h1>
            <div class="bg-white p-6 rounded-3xl border-2 border-dashed border-slate-200">
                <textarea rows="10" class="w-full p-4 outline-none text-sm font-mono" placeholder="Dán dữ liệu Excel tại đây..."></textarea>
                <button class="mt-4 bg-green-600 text-white px-8 py-3 rounded-xl font-bold">XÁC NHẬN NẠP</button>
            </div>
        </section>

        <section id="sec-report">
            <h1 class="text-2xl font-black text-slate-800 uppercase mb-6">📜 Xuất báo cáo PDF</h1>
            <div class="bg-white p-20 rounded-3xl text-center border">
                <i class="fas fa-file-pdf text-6xl text-red-500 mb-4"></i>
                <h3 class="font-bold text-xl mb-4">Sẵn sàng trích xuất dữ liệu</h3>
                <button class="bg-red-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl shadow-red-500/20">TẢI FILE PDF BÁO CÁO</button>
            </div>
        </section>

    </main>

    <script>
        function nav(id, btn) {
            // Ẩn tất cả section
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            // Hiện section được chọn
            document.getElementById(id).classList.add('active');
            
            // Xóa active ở tất cả các nút menu
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active', 'bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-900/50');
                l.classList.add('text-slate-400');
            });
            
            // Thêm active cho nút vừa bấm
            btn.classList.add('active', 'bg-blue-600', 'text-white', 'shadow-lg', 'shadow-blue-900/50');
            btn.classList.remove('text-slate-400');
        }
    </script>
</body>
</html>
