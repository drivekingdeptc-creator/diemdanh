<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin SOL61 v5.9</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .nav-btn.active { background: #1e293b; border-left: 4px solid var(--accent); color: white; }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <aside class="bg-slate-900 text-slate-400 flex flex-col h-screen w-[260px] shadow-2xl">
        <div class="p-8 border-b border-slate-800"><h1 class="font-black text-white text-sm tracking-widest">VDC SAFETY</h1></div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-4 rounded-xl text-left"><i class="fas fa-university w-5"></i><span class="ml-4 font-bold text-xs">Bước 1: Quản lý Lớp</span></button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left"><i class="fas fa-id-card w-5"></i><span class="ml-4 font-bold text-xs">Bước 2: Điểm danh</span></button>
            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left"><i class="fas fa-tasks w-5"></i><span class="ml-4 font-bold text-xs">Bước 3: Nộp bài</span></button>
            <button onclick="switchTab('tab-ai', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left"><i class="fas fa-robot w-5"></i><span class="ml-4 font-bold text-xs">Bước 4: AI Grader</span></button>
        </nav>
    </aside>

    <main class="flex-1 p-10 relative">
        <section id="tab-classes" class="tab-content active">
            <div class="flex justify-between items-center mb-8"><h2 class="text-3xl font-black uppercase">Quản lý Lớp học</h2><button onclick="openClassModal()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold text-xs">+ THÊM LỚP</button></div>
            <div id="class-grid" class="grid grid-cols-4 gap-6 mb-10"></div>
            <div id="student-editor" class="hidden bg-white rounded-[2rem] border p-8 shadow-sm">
                <div class="flex justify-between items-center mb-6 border-b pb-4">
                    <h3 id="editing-class-title" class="font-black text-lg text-slate-800">DANH SÁCH LỚP</h3>
                    <div class="flex gap-2">
                        <button onclick="openImportModal()" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-[10px] font-black uppercase">Nhập từ Excel</button>
                        <button onclick="closeEditor()" class="px-4 py-2 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-black uppercase">Đóng</button>
                    </div>
                </div>
                <table class="w-full text-sm"><tbody id="student-list-body"></tbody></table>
            </div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase">Điều phối Nộp bài</h2>
                <div class="flex gap-3">
                    <select id="folder-select" onchange="updateStorageFolder(this.value)" class="bg-white border-2 border-blue-600 text-blue-600 px-4 py-2 rounded-xl font-bold text-xs"></select>
                    <button onclick="confirmCreateFolder()" class="bg-blue-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-folder-plus"></i></button>
                </div>
            </div>
            <div id="call-area" class="hidden bg-slate-900 rounded-[3rem] p-10 text-white flex items-center gap-10">
                <img id="call-img" class="w-48 h-64 object-cover rounded-2xl border-4 border-white/20">
                <div class="flex-1">
                    <h1 id="call-name" class="text-6xl font-black uppercase tracking-tighter mb-4">---</h1>
                    <div class="flex gap-4"><button onclick="confirmAction('sign')" class="flex-1 py-6 bg-white text-slate-900 rounded-2xl font-black text-xl uppercase">DUYỆT - KÝ TÊN</button></div>
                </div>
            </div>
            <div id="queue-grid" class="grid grid-cols-5 gap-4 mt-10"></div>
        </section>
    </main>

    <div id="importModal" class="popup-overlay"><div class="bg-white p-10 rounded-[3rem] w-full max-w-xl shadow-2xl">
        <h2 class="text-xl font-black uppercase mb-4">Dán từ Excel (STT | Tên | Năm | Đơn vị)</h2>
        <textarea id="import-area" rows="8" class="w-full p-4 bg-slate-50 border rounded-xl font-mono text-xs mb-4"></textarea>
        <div class="flex gap-4"><button onclick="processImport()" class="flex-1 py-4 bg-blue-600 text-white rounded-xl font-black uppercase">NHẬP DỮ LIỆU</button><button onclick="closeImportModal()" class="flex-1 py-4 bg-slate-100 rounded-xl font-black uppercase">HỦY</button></div>
    </div></div>

<script>
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentQueue = [], editingClassId = null;

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-classes') loadClasses();
        if(id === 'tab-queue') { loadFolderList(); initQueue(); }
    }

    // LOGIC EXCEL IMPORT
    function openImportModal() { document.getElementById('importModal').style.display = 'flex'; }
    function closeImportModal() { document.getElementById('importModal').style.display = 'none'; }
    async function processImport() {
        const raw = document.getElementById('import-area').value;
        const lines = raw.split('\n');
        for (let line of lines) {
            const p = line.split('\t');
            if (p.length >= 2) await db.ref(`classes/${editingClassId}/students/${p[0].trim()}`).set({ stt: p[0].trim(), name: p[1].trim(), dob: p[2]||'', department: p[3]||'' });
        }
        alert("Xong!"); closeImportModal();
    }

    // LOGIC FOLDER DROPLIST
    function loadFolderList() {
        google.script.run.withSuccessHandler(folders => {
            const sel = document.getElementById('folder-select');
            sel.innerHTML = '<option value="">-- Chọn Folder --</option>';
            folders.forEach(f => sel.innerHTML += `<option value="${f.id}">${f.name}</option>`);
        }).vdc_GetSubFolders();
    }
    function updateStorageFolder(id) { if(id) db.ref('current_session').update({ storage_id: id }); }
    function confirmCreateFolder() { google.script.run.withSuccessHandler(() => { alert("Đã tạo!"); loadFolderList(); }).vdc_CreateFolderInRoot(); }

    function loadClasses() {
        db.ref('classes').on('value', snap => {
            const grid = document.getElementById('class-grid'); grid.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div class="bg-white p-6 rounded-3xl border shadow-sm"><h3 class="font-black text-xs uppercase mb-4">${data[id].name}</h3><button onclick="editClassStudents('${id}', '${data[id].name}')" class="w-full py-2 bg-slate-100 rounded-xl text-[9px] font-black uppercase">Sửa DS</button></div>`;
            });
        });
    }

    function editClassStudents(id, name) {
        editingClassId = id; document.getElementById('student-editor').classList.remove('hidden');
        document.getElementById('editing-class-title').innerText = name;
        db.ref(`classes/${id}/students`).on('value', snap => {
            const body = document.getElementById('student-list-body'); body.innerHTML = '';
            const s = snap.val() || {};
            Object.keys(s).sort((a,b)=>a-b).forEach(stt => {
                body.innerHTML += `<tr class="border-b"><td class="p-4 font-black text-blue-600">${stt}</td><td class="p-4 uppercase font-bold">${s[stt].name}</td><td class="p-4 text-slate-400">${s[stt].department}</td></tr>`;
            });
        });
    }
    function closeEditor() { document.getElementById('student-editor').classList.add('hidden'); }

    window.onload = loadClasses;
</script>
</body>
</html>
