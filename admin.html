<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC ADMIN v1.2.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: #007bff; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; font-size: 13px; text-align: left; }
        th { background: #007bff; color: white; }
        img { border-radius: 4px; border: 1px solid #ccc; object-fit: cover; }
    </style>
</head>
<body>
    <h2>VDC ADMIN v1.2.0 - HEPC SAFETY</h2>
    <div id="stats" style="margin-bottom: 10px; font-weight: bold; color: #28a745;">ĐANG KẾT NỐI...</div>
    <div class="box">
        <table>
            <thead><tr><th>STT</th><th>Họ Tên</th><th>Chức danh</th><th>Đơn vị</th><th>Thời gian</th><th>Ảnh 3x4</th><th>Thao tác</th></tr></thead>
            <tbody id="tblBody"></tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('students').on('value', snap => {
        const data = snap.val() || {};
        const tbody = document.getElementById('tblBody');
        tbody.innerHTML = '';
        const list = Object.values(data);
        document.getElementById('stats').innerText = "TỔNG CỘNG ĐÃ ĐIỂM DANH: " + list.length + " HỌC VIÊN";
        list.sort((a,b) => parseInt(a.stt) - parseInt(b.stt)).forEach(u => {
            tbody.innerHTML += `<tr>
                <td>${u.stt}</td><td><b>${u.name}</b></td><td>${u.position || "-"}</td>
                <td>${u.department || "-"}</td><td>${u.time}</td>
                <td><img src="${u.photo}" width="50" height="66"></td>
                <td><button onclick="if(confirm('Xóa?')) db.ref('students/${u.stt}').remove()" style="color:red; background:none; border:none; cursor:pointer;">Xóa</button></td>
            </tr>`;
        });
    });
</script>
</body>
</html>
