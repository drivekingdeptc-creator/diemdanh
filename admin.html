<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY ADMIN v1.8.8</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004085; --success: #28a745; --danger: #dc3545; --sidebar-w: 250px; --bg: #f4f7f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; }
        #sidebar { width: var(--sidebar-w); background: #1a202c; color: white; height: 100vh; position: fixed; padding: 20px; box-sizing: border-box; }
        .nav-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; color: #cbd5e0; transition: 0.3s; }
        .nav-item.active { background: var(--primary); color: white; }
        #main { margin-left: var(--sidebar-w); flex: 1; padding: 25px; min-height: 100vh; box-sizing: border-box; width: calc(100% - var(--sidebar-w)); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #ddd; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card.present { border-left-color: var(--success); }
        .stat-card.absent { border-left-color: var(--danger); }
        .stat-card .value { font-size: 28px; font-weight: 800; }
        .content-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-primary { background: var(--primary); color: white; }
        .hidden { display: none !important; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body onclick="resetFilter()">

<div id="sidebar">
    <h2 style="font-size: 20px; margin-bottom: 30px;">VDC SAFETY</h2>
    <div class="nav-item active" onclick="switchTab('tab-attendance', this)">📊 Điểm danh</div>
    <div class="nav-item" onclick="switchTab('tab-config', this)">⚙️ Thiết lập phiên</div>
    <div class="nav-item" onclick="switchTab('tab-list', this)">➕ Danh sách học viên</div>
    <p style="position: absolute; bottom: 10px; font-size: 10px; color: #4a5568;">v1.8.8 Fix Upload</p>
</div>

<div id="main">
    <div class="top-bar">
        <div id="info-display" style="font-weight: 800; color: var(--primary); font-size: 18px;">VDC DASHBOARD</div>
        <div id="clock" style="font-weight: 600;"></div>
    </div>

    <div id="stats-area" class="stats-grid">
        <div class="stat-card" onclick="setFilter('all', event)"><h4>Sĩ số</h4><div class="value" id="stat-total">0</div></div>
        <div class="stat-card present" onclick="setFilter('present', event)"><h4>Có mặt</h4><div class="value" id="stat-present" style="color:var(--success)">0</div></div>
        <div class="stat-card absent" onclick="setFilter('absent', event)"><h4>Vắng</h4><div class="value" id="stat-absent" style="color:var(--danger)">0</div></div>
    </div>

    <div id="tab-attendance" class="content-box">
        <table>
            <thead><tr><th>STT</th><th>Họ Tên</th><th>Đơn vị</th><th>Trạng thái</th><th>Ảnh</th><th>Thời gian</th><th>Xóa</th></tr></thead>
            <tbody id="report-body"></tbody>
        </table>
    </div>

    <div id="tab-config" class="hidden">
        <div class="content-box">
            <h3>Thiết lập Phiên dạy</h3>
            <div style="display:flex; gap:20px; background:#e2e8f0; padding:20px; border-radius:12px;">
                <div style="flex:1;"><label>NGÀY ĐIỂM DANH</label><input type="text" id="cfg-date" onchange="saveSess()" style="width:100%; padding:10px; border-radius:5px; border:none;"></div>
                <div style="flex:1;"><label>BUỔI</label><select id="cfg-session" onchange="saveSess()" style="width:100%; padding:10px; border-radius:5px; border:none;"><option value="Sáng">Sáng</option><option value="Chiều">Chiều</option></select></div>
            </div>
        </div>
    </div>

    <div id="tab-list" class="hidden">
        <div class="content-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;">Quản lý Danh sách</h3>
                <button class="btn btn-danger" onclick="clearMasterList()">⚠️ XÓA TRẮNG DANH SÁCH</button>
            </div>
            <p style="font-size:12px; color:#666;">Copy từ Excel: Cột 1 (STT), Cột 2 (Họ Tên), Cột 3 (Đơn vị)</p>
            <textarea id="csvData" style="height:250px; margin-bottom:15px;"></textarea>
            <button id="btnUpload" class="btn btn-primary" style="width:100%; height:50px;" onclick="uploadData()">📥 NẠP DANH SÁCH MỚI</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentFilter = 'all';

    async function saveSess() {
        const d = document.getElementById('cfg-date').value.replace(/\//g, '-');
        const s = document.getElementById('cfg-session').value;
        await db.ref('current_session').update({ date: d, session: s });
        render();
    }

    async function clearMasterList() {
        if(confirm("Xóa sạch danh sách học viên hiện tại?")) {
            await db.ref('master_list_total').remove();
            alert("Đã xóa sạch!");
            render();
        }
    }

    async function render() {
        const snap = await db.ref().once('value');
        const data = snap.val() || {};
        const sess = data.current_session || { date: '...', session: 'Sáng' };
        const master = data.master_list_total || {};
        const attData = (data.attendance?.[sess.date]?.[sess.session]) || {};
        
        document.getElementById('info-display').innerText = `NGÀY: ${sess.date} | BUỔI: ${sess.session}`;
        const tbody = document.getElementById('report-body'); tbody.innerHTML = '';
        let count = 0;
        
        const keys = Object.keys(master).sort((a,b)=>parseInt(a)-parseInt(b));
        keys.forEach(k => {
            const s = master[k]; const att = attData[s.stt];
            if(att) count++;
            if(currentFilter==='present' && !att) return;
            if(currentFilter==='absent' && att) return;
            tbody.innerHTML += `<tr><td>${s.stt}</td><td style="text-align:left;"><b>${s.name}</b></td><td>${s.department||""}</td><td style="color:${att? '#28a745':'#ccc'}; font-weight:bold;">${att?'CÓ MẶT':'VẮNG'}</td><td>${att?`<img src="${att.photo}" style="width:40px;height:55px;object-fit:cover;border-radius:4px;">`:''}</td><td>${att?att.time.split(' ')[0]:''}</td><td><button onclick="delAtt('${sess.date}','${sess.session}','${s.stt}')" style="background:none;border:none;cursor:pointer;color:red;">❌</button></td></tr>`;
        });
        document.getElementById('stat-total').innerText = keys.length;
        document.getElementById('stat-present').innerText = count;
        document.getElementById('stat-absent').innerText = keys.length - count;
    }

    async function uploadData() {
        const raw = document.getElementById('csvData').value.trim();
        if(!raw) return alert("Vui lòng dán dữ liệu!");
        
        const btn = document.getElementById('btnUpload');
        btn.disabled = true;
        btn.innerText = "⏳ ĐANG NẠP...";

        const lines = raw.split('\n');
        const promises = [];
        
        for(let l of lines) { 
            const c = l.split('\t'); 
            if(c.length >= 2) {
                const item = {stt: c[0].trim(), name: c[1].trim(), department: c[2] ? c[2].trim() : ""};
                promises.push(db.ref(`master_list_total/${item.stt}`).set(item));
            }
        }
        
        try {
            await Promise.all(promises);
            alert("Đã nạp thành công " + promises.length + " học viên!");
            document.getElementById('csvData').value = '';
            render();
        } catch (e) {
            alert("Lỗi: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "📥 NẠP DANH SÁCH MỚI";
        }
    }

    function switchTab(id, el) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
        ['tab-attendance','tab-config','tab-list'].forEach(t => document.getElementById(t).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById('stats-area').style.display = (id==='tab-attendance'?'grid':'none');
    }

    async function delAtt(d,s,id) { if(confirm("Xóa điểm danh này?")) await db.ref(`attendance/${d}/${s}/${id}`).remove(); }
    function setFilter(f, e) { e.stopPropagation(); currentFilter = f; render(); }
    function resetFilter() { if(currentFilter!=='all'){currentFilter='all'; render();} }
    
    window.onload = () => {
        const n = new Date(); document.getElementById('cfg-date').value = `${n.getDate().toString().padStart(2,'0')}/${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getFullYear()}`;
        db.ref('attendance').on('value', render);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('vi-VN'); }, 1000);
        saveSess();
    };
</script>
</body>
</html>
