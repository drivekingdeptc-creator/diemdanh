<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin v3.1 - HỆ THỐNG QUẢN TRỊ OSH AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        #sidebar { transition: all 0.3s ease; width: 260px; }
        #sidebar.collapsed { width: 80px; }
        #sidebar.collapsed .nav-text, #sidebar.collapsed .logo-text { display: none; }
        #sidebar.collapsed .nav-btn { justify-content: center; padding: 12px; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(30, 41, 59, 0.85); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .spinner { width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .popup-content { max-width: 90%; max-height: 85%; border-radius: 20px; border: 5px solid white; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="loading-overlay"><div class="spinner mb-4"></div><p class="text-white font-black uppercase text-sm">VDC Safety đang xử lý...</p></div>
    <div id="imagePopup" class="popup-overlay" onclick="this.style.display='none'"><img id="popupImg" class="popup-content" src=""></div>

    <aside id="sidebar" class="bg-[#1e293b] text-white flex flex-col sticky top-0 h-screen shadow-2xl z-50">
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-xl">V</div>
                <span class="logo-text font-bold text-lg uppercase tracking-widest">VDC Admin</span>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-3 rounded-xl transition-all">
                <i class="fas fa-university w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Lớp học</span>
            </button>
            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-bullhorn w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Gọi nộp bài</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-check-double w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Điểm danh</span>
            </button>
            <button onclick="switchTab('tab-faces', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-user-shield w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Face ID</span>
            </button>
            <button onclick="switchTab('tab-upload', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-plus-circle w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Nạp lớp</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-6 overflow-hidden">
        <section id="tab-classes" class="tab-content active">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">🏫 Danh sách lớp huấn luyện</h2>
            <div id="class-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase">📢 Hàng đợi nộp bài thi</h2>
                    <p class="text-blue-600 font-bold text-[10px] uppercase mt-1 italic">Tự động gọi tên theo thứ tự nộp bài</p>
                </div>
                <button onclick="toggleVoice()" id="voice-btn" class="px-4 py-2 bg-green-500 text-white rounded-xl text-[10px] font-black uppercase shadow-md">
                    <i class="fas fa-volume-up mr-1"></i> Loa: BẬT
                </button>
            </div>

            <div id="call-area" class="hidden mb-8">
                <div class="bg-gradient-to-r from-slate-900 to-blue-900 rounded-[2.5rem] p-8 text-white shadow-2xl flex items-center gap-8 border-4 border-white relative overflow-hidden">
                    <img id="call-img" src="" class="w-44 h-56 object-cover rounded-[2rem] border-4 border-white/20 shadow-2xl bg-slate-800 z-10">
                    <div class="flex-1 z-10">
                        <span class="bg-blue-500 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest mb-4 inline-block">Mời nộp bài</span>
                        <h1 id="call-name" class="text-6xl font-black uppercase tracking-tighter mb-2 leading-tight">---</h1>
                        <p id="call-info" class="text-xl font-bold text-blue-200/60 uppercase italic">---</p>
                        <div class="flex gap-4 mt-8">
                            <button onclick="confirmSigned()" class="flex-[2] py-5 bg-white text-slate-900 rounded-2xl font-black text-xl shadow-xl hover:bg-green-50 uppercase">Xác nhận đã ký & Gọi tiếp</button>
                            <button onclick="replayVoice()" class="flex-1 py-5 bg-blue-600/30 border border-blue-400/50 rounded-2xl font-black text-xl hover:bg-blue-600/50"><i class="fas fa-redo-alt"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="queue-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-attendance" class="tab-content">
             <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">📊 Kết quả điểm danh</h2>
             <div class="bg-white rounded-3xl shadow-sm border overflow-hidden"><table class="w-full text-left text-[12px]"><tbody id="attendance-body"></tbody></table></div>
        </section>

        <section id="tab-faces" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">🛡️ Face ID Database</h2>
            <div id="face-list-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>

        <section id="tab-upload" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">📥 Nạp lớp mới</h2>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border space-y-4">
                <input type="text" id="new-class-name" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold" placeholder="Tên lớp huấn luyện">
                <textarea id="csvData" rows="10" class="w-full p-4 bg-slate-50 border rounded-2xl font-mono text-[10px]" placeholder="Dán dữ liệu từ Excel tại đây..."></textarea>
                <button onclick="uploadData()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg shadow-xl uppercase">Lưu trữ lớp học</button>
            </div>
        </section>
    </main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isVoiceActive = true;
    let currentQueue = [];

    // CHUYỂN TAB
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-queue') initQueue();
        if(id === 'tab-classes') renderClassList();
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // HÀNG ĐỢI NỘP BÀI & LOA BÁO
    function initQueue() {
        const today = new Date().toISOString().slice(0,10);
        db.ref(`submissions/${today}`).on('value', snap => {
            const data = snap.val() || {};
            currentQueue = Object.values(data)
                .filter(i => !i.signed)
                .sort((a,b) => a.timestamp - b.timestamp);
            renderQueue();
        });
    }

    function renderQueue() {
        const area = document.getElementById('call-area');
        const grid = document.getElementById('queue-grid');
        grid.innerHTML = '';
        if(currentQueue.length > 0) {
            area.classList.remove('hidden');
            const top = currentQueue[0];
            document.getElementById('call-name').innerText = top.name;
            document.getElementById('call-info').innerText = `STT: ${top.stt} | ${top.dob}`;
            document.getElementById('call-img').src = top.photo_exam || '';
            currentQueue.slice(1).forEach((item, idx) => {
                grid.innerHTML += `<div class="bg-white p-4 rounded-3xl border flex items-center gap-4 opacity-50"><div class="font-black text-slate-300">${idx+2}</div><div class="font-bold uppercase text-[10px]">${item.name}</div></div>`;
            });
        } else { area.classList.add('hidden'); grid.innerHTML = '<p class="col-span-full text-center text-slate-400 uppercase font-black py-20">Đang chờ bài thi...</p>'; }
    }

    function speak(txt) {
        if(!isVoiceActive) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(txt);
        utter.lang = 'vi-VN'; utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
    }

    function toggleVoice() {
        isVoiceActive = !isVoiceActive;
        const btn = document.getElementById('voice-btn');
        btn.className = isVoiceActive ? "px-4 py-2 bg-green-500 text-white rounded-xl text-[10px] font-black uppercase shadow-md" : "px-4 py-2 bg-slate-400 text-white rounded-xl text-[10px] font-black uppercase shadow-md";
        btn.innerHTML = isVoiceActive ? '<i class="fas fa-volume-up mr-1"></i> Loa: BẬT' : '<i class="fas fa-volume-mute mr-1"></i> Loa: TẮT';
    }

// HÀM XÁC NHẬN & TỰ ĐỘNG GỌI TIẾP (SOL61 v3.3)
async function confirmSigned() {
    if (currentQueue.length === 0) return;
    
    const current = currentQueue[0]; // Người đang đứng trước bàn
    const today = new Date().toISOString().slice(0,10);

    // 1. Cập nhật trạng thái đã ký lên Firebase
    await db.ref(`submissions/${today}/${current.stt}`).update({ signed: true });

    // 2. Kiểm tra xem còn người tiếp theo trong danh sách chờ không
    // Lưu ý: Sau khi update, currentQueue sẽ tự động cập nhật lại nhờ .on('value')
    // Nhưng để loa báo mượt mà, ta lấy thông tin từ mảng hiện tại
    if (currentQueue.length > 1) {
        const next = currentQueue[1]; // Đây chính là người kế tiếp
        
        // Kịch bản loa: Xác nhận xong người cũ -> Gọi luôn người mới
        const message = `Xác nhận anh ${current.name} đã hoàn thành. Mời học viên tiếp theo, anh ${next.name}, số thứ tự ${next.stt}, lên nộp bài và ký tên.`;
        
        speak(message);
        
        // Hiệu ứng hình ảnh: Tự động cuộn danh sách và hiển thị người mới (Firebase lo phần này)
        console.log(`>>> Tự động chuyển từ ${current.name} sang ${next.name}`);
    } else {
        // Nếu là người cuối cùng trong hàng đợi
        speak(`Xác nhận anh ${current.name} đã hoàn thành. Hiện tại đã hết danh sách chờ.`);
    }
}

    function replayVoice() { if(currentQueue.length > 0) speak(`Mời học viên ${currentQueue[0].name} lên nộp bài.`); }

    // RENDER LỚP HỌC (CŨ)
    async function renderClassList() {
        const snap = await db.ref('classes').once('value');
        const container = document.getElementById('class-list-container');
        container.innerHTML = '';
        Object.keys(snap.val() || {}).forEach(id => {
            const cls = snap.val()[id];
            container.innerHTML += `<div class="bg-white p-5 rounded-3xl border shadow-sm"><h3 class="font-black text-slate-800 text-[11px] uppercase truncate">${cls.name}</h3><button onclick="activateClass('${id}')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl text-[9px] font-black uppercase">Mở điểm danh</button></div>`;
        });
    }

    async function activateClass(id) {
        const snap = await db.ref(`classes/${id}`).once('value');
        const cls = snap.val(); const now = new Date();
        const dateStr = `${now.getDate().toString().padStart(2,'0')}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getFullYear()}`;
        await db.ref('current_session').set({ class: cls.name, date: dateStr, session: now.getHours() < 12 ? "Sáng" : "Chiều", source: id });
        alert("Đã kích hoạt lớp: " + cls.name);
    }

    window.onload = renderClassList;
</script>
</body>
</html>
