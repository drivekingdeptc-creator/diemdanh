<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY ADMIN v6.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .nav-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <aside class="bg-slate-900 text-slate-400 flex flex-col h-screen w-[280px] shadow-2xl">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="font-black text-white text-lg tracking-tighter">VDC SAFETY <span class="text-blue-500">v6.0</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-university w-5"></i><span class="ml-4 font-bold text-xs uppercase">Bước 1: Quản lý Lớp</span>
            </button>
            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-tasks w-5"></i><span class="ml-4 font-bold text-xs uppercase">Bước 3: Nộp bài & Droplist</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 relative">
        
        <section id="tab-classes" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 uppercase">Quản lý Lớp học</h2>
                <button onclick="openClassModal()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-lg hover:scale-105 transition-transform">+ THÊM LỚP MỚI</button>
            </div>
            <div id="class-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>

            <div id="student-editor" class="hidden mt-10 bg-white rounded-[3rem] shadow-sm border p-10 animate-fadeIn">
                <div class="flex justify-between items-center mb-8 border-b pb-6">
                    <div>
                        <h3 id="editing-class-title" class="font-black text-2xl uppercase text-slate-800">Danh sách học viên</h3>
                        <p class="text-[10px] font-bold text-slate-400 uppercase italic">Chỉnh sửa hoặc nhập nhanh từ Excel</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openImportModal()" class="px-5 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Nhập nhanh Excel</button>
                        <button onclick="closeEditor()" class="px-5 py-3 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-black uppercase">Đóng</button>
                    </div>
                </div>
                <table class="w-full">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                        <tr><th class="p-4 text-center">STT</th><th class="p-4 text-left">Họ tên</th><th class="p-4 text-left">Năm sinh</th><th class="p-4 text-left">Đơn vị</th><th class="p-4 text-center">Xóa</th></tr>
                    </thead>
                    <tbody id="student-list-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-4xl font-black text-slate-900 uppercase">Điều phối Nộp bài</h2>
                    <p class="text-[10px] text-slate-400 font-bold uppercase italic">Chọn thư mục lưu trữ từ Drive</p>
                </div>
                <div class="flex gap-4 items-center">
                    <select id="folder-select" onchange="updateStorageFolder(this.value)" class="bg-white border-2 border-blue-600 text-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-sm outline-none">
                        <option value="">-- Đang tải thư mục... --</option>
                    </select>
                    <button onclick="confirmCreateFolder()" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg hover:bg-blue-700">
                        <i class="fas fa-folder-plus"></i>
                    </button>
                </div>
            </div>
            
            <div id="queue-grid" class="grid grid-cols-2 md:grid-cols-6 gap-4"></div>
        </section>

    </main>

    <div id="importModal" class="popup-overlay">
        <div class="bg-white p-12 rounded-[3.5rem] w-full max-w-2xl shadow-2xl">
            <h2 class="text-2xl font-black uppercase mb-2 text-slate-900">Nhập danh sách nhanh</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase mb-6 italic">Dán 4 cột từ Excel: STT | Họ Tên | Năm Sinh | Đơn Vị</p>
            <textarea id="import-area" rows="10" class="w-full p-6 bg-slate-50 border-2 border-dashed rounded-3xl font-mono text-xs mb-6 outline-none focus:border-blue-500" placeholder="1	Nguyễn Văn A	1990	Điện lực Thủ Đức..."></textarea>
            <div class="flex gap-4">
                <button onclick="processImport()" class="flex-1 py-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-lg">Xử lý dữ liệu</button>
                <button onclick="closeImportModal()" class="flex-1 py-5 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase">Hủy</button>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH HỆ THỐNG
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLK_ZNVHoMTInV_Mo-_-q6fMUYlR1uLElrev9h-HwLXg70NVZDyX0veXPDmDmAVk/exec";
        const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let editingClassId = null;

        // CHUYỂN TAB & SYNC DỮ LIỆU
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if(id === 'tab-queue') {
                initFolderDroplist();
                // Gọi GAS đồng bộ thư mục Drive sang Firebase
                fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "syncFolders" }) });
            }
        }

        // PHÂN HỆ FOLDER DROPLIST (LẤY TỪ FIREBASE)
        function initFolderDroplist() {
            db.ref('drive_folders').on('value', snap => {
                const select = document.getElementById('folder-select');
                const folders = snap.val() || {};
                select.innerHTML = '<option value="">-- Chọn thư mục --</option>';
                Object.values(folders).sort((a,b) => b.name.localeCompare(a.name)).forEach(f => {
                    select.innerHTML += `<option value="${f.id}">${f.name}</option>`;
                });
                db.ref('current_session/storage_id').once('value', s => { if(s.val()) select.value = s.val(); });
            });
        }

        function updateStorageFolder(id) {
            if(!id) return;
            db.ref('current_session').update({ storage_id: id });
        }

        function confirmCreateFolder() {
            if(!confirm("Tạo thư mục nộp bài mới cho hôm nay?")) return;
            fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "createFolder" }) });
            alert("Đã gửi yêu cầu! Danh sách sẽ tự cập nhật sau vài giây.");
        }

        // PHÂN HỆ QUẢN LÝ LỚP & IMPORT EXCEL
        function loadClasses() {
            db.ref('classes').on('value', snap => {
                const grid = document.getElementById('class-grid');
                grid.innerHTML = '';
                const data = snap.val() || {};
                Object.keys(data).forEach(id => {
                    grid.innerHTML += `
                        <div class="bg-white p-8 rounded-[2.5rem] border shadow-sm hover:shadow-xl transition-all">
                            <h3 class="font-black text-sm uppercase text-slate-800 mb-6">${data[id].name}</h3>
                            <button onclick="editClassStudents('${id}', '${data[id].name}')" class="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-[10px] font-black uppercase">Danh sách</button>
                        </div>`;
                });
            });
        }

        function editClassStudents(id, name) {
            closeEditor(); // Clear cũ
            editingClassId = id;
            document.getElementById('student-editor').classList.remove('hidden');
            document.getElementById('editing-class-title').innerText = name;
            
            db.ref(`classes/${id}/students`).on('value', snap => {
                const body = document.getElementById('student-list-body');
                body.innerHTML = '';
                const students = snap.val() || {};
                Object.keys(students).sort((a,b) => a-b).forEach(stt => {
                    const s = students[stt];
                    body.innerHTML += `
                        <tr class="border-b text-xs font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                            <td class="p-5 text-center text-blue-600 font-black">${stt}</td>
                            <td class="p-5 uppercase">${s.name}</td>
                            <td class="p-5">${s.dob || '--'}</td>
                            <td class="p-5 uppercase text-slate-400">${s.department || '--'}</td>
                            <td class="p-5 text-center"><button onclick="removeStudent('${stt}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash-alt"></i></button></td>
                        </tr>`;
                });
            });
            document.getElementById('student-editor').scrollIntoView({ behavior: 'smooth' });
        }

        function openImportModal() { document.getElementById('importModal').style.display = 'flex'; }
        function closeImportModal() { document.getElementById('importModal').style.display = 'none'; document.getElementById('import-area').value = ''; }
        function closeEditor() { document.getElementById('student-editor').classList.add('hidden'); }

        async function processImport() {
            const raw = document.getElementById('import-area').value;
            if(!raw || !editingClassId) return;
            const lines = raw.split('\n');
            for (let line of lines) {
                if(!line.trim()) continue;
                const p = line.split('\t');
                if(p.length >= 2) {
                    await db.ref(`classes/${editingClassId}/students/${p[0].trim()}`).set({
                        stt: p[0].trim(), name: p[1].trim(), dob: p[2] || '', department: p[3] || ''
                    });
                }
            }
            alert("✅ Đã nhập danh sách thành công!");
            closeImportModal();
        }

        window.onload = loadClasses;
    </script>
</body>
</html>
