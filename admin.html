<script>
    async function uploadList() {
        const raw = document.getElementById('csvData').value;
        const lines = raw.split('\n');
        let count = 0;
        
        for (let line of lines) {
            const cols = line.split('\t'); // Tách theo Tab của Excel
            if(cols.length >= 2) {
                const stt = cols[0].trim();
                const studentData = {
                    stt: stt,
                    name: cols[1] ? cols[1].trim() : "",
                    gender: cols[2] ? cols[2].trim() : "",
                    dob: cols[3] ? cols[3].trim() : "",
                    rank: cols[4] ? cols[4].trim() : "",
                    position: cols[5] ? cols[5].trim() : "",
                    department: cols[6] ? cols[6].trim() : "",
                    company: cols[7] ? cols[7].trim() : "",
                    type: cols[8] ? cols[8].trim() : ""
                };
                // Lưu vào master_list trên Firebase
                await db.ref('master_list/' + stt).set(studentData);
                count++;
            }
        }
        alert("Đã cập nhật " + count + " học viên với đầy đủ thông tin!");
    }
</script>
