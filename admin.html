<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin v3.5 - HỆ THỐNG QUẢN TRỊ OSH AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #sidebar { transition: all 0.3s ease; width: 260px; }
        #sidebar.collapsed { width: 80px; }
        #sidebar.collapsed .nav-text, #sidebar.collapsed .logo-text { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="examPhotoPopup" class="popup-overlay" onclick="closeExamPhotoPopup()">
        <img id="popupExamImg" class="max-h-[95vh] max-w-[95vw] rounded-xl border-4 border-white shadow-2xl" src="">
        <button class="absolute top-8 right-8 text-white text-4xl hover:scale-110 transition-transform"><i class="fas fa-times-circle"></i></button>
    </div>

    <aside id="sidebar" class="bg-[#0f172a] text-white flex flex-col sticky top-0 h-screen shadow-2xl z-50">
        <div class="p-6 border-b border-slate-800 flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-xl">V</div>
                <span class="logo-text font-bold text-lg uppercase tracking-widest">VDC Admin</span>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-500 hover:text-white"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-queue', this)" class="nav-btn active w-full flex items-center p-3 rounded-xl transition-all">
                <i class="fas fa-bullhorn w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Gọi nộp bài</span>
            </button>
            <button onclick="switchTab('tab-classes', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-university w-6 text-center"></i> <span class="nav-text ml-2 font-bold uppercase text-[11px]">Lớp học</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-6 overflow-hidden">
        
        <section id="tab-queue" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-black text-slate-900 uppercase tracking-tighter">Hàng đợi & Duyệt bài thi</h2>
                    <p id="queue-count" class="text-blue-600 font-bold text-xs uppercase mt-1 italic">Đang tải danh sách...</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="toggleVoice()" id="voice-btn" class="px-6 py-3 bg-green-500 text-white rounded-2xl text-[11px] font-black uppercase shadow-lg">
                        <i class="fas fa-volume-up mr-2"></i> Loa: BẬT
                    </button>
                </div>
            </div>

            <div id="call-area" class="hidden mb-10">
                <div class="bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 rounded-[3rem] p-10 text-white shadow-2xl flex items-center gap-10 border-4 border-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5 text-[12rem]"><i class="fas fa-bullhorn"></i></div>
                    
                    <div class="relative group cursor-zoom-in" onclick="openExamPhotoPopup()">
                        <img id="call-img" src="" class="w-48 h-64 object-cover rounded-[2.5rem] border-4 border-white/20 shadow-2xl bg-slate-700 z-10 transition-transform group-hover:scale-105">
                        <div class="absolute inset-0 bg-black/40 rounded-[2.5rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-20">
                            <i class="fas fa-search-plus text-white text-3xl"></i>
                        </div>
                    </div>
                    
                    <div class="flex-1 z-10">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="bg-blue-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">Đang chờ duyệt bài</span>
                            <span id="call-stt" class="text-blue-300 font-mono font-bold text-2xl"></span>
                        </div>
                        <h1 id="call-name" class="text-7xl font-black uppercase tracking-tighter leading-none mb-4">---</h1>
                        <p id="call-info" class="text-2xl font-bold text-blue-200/50 uppercase italic tracking-wide">---</p>
                        
                        <div class="flex gap-4 mt-10">
                            <button onclick="processSubmission('confirm')" class="flex-[3] py-6 bg-white text-slate-900 rounded-[1.5rem] font-black text-2xl shadow-2xl hover:bg-green-50 hover:scale-[1.02] active:scale-95 transition-all uppercase">
                                <i class="fas fa-check-circle mr-3 text-green-600"></i> Bài OK, Mời Ký
                            </button>
                            <button onclick="processSubmission('retake')" class="flex-[2] py-6 bg-red-600/20 border-2 border-red-500 rounded-[1.5rem] font-black text-2xl text-red-100 hover:bg-red-600/40 hover:scale-[1.02] active:scale-95 transition-all uppercase">
                                <i class="fas fa-camera mr-3"></i> Chụp lại
                            </button>
                            <button onclick="replayVoice()" class="px-8 py-6 bg-blue-600/30 border border-blue-400/50 rounded-[1.5rem] font-black text-2xl hover:bg-blue-600/50 transition-all">
                                <i class="fas fa-redo-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="queue-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-classes" class="tab-content">
            <h2 class="text-2xl font-black text-slate-900 uppercase mb-6">Quản lý lớp huấn luyện</h2>
            <div id="class-list-container" class="grid grid-cols-1 md:grid-cols-4 gap-4"></div>
        </section>

    </main>

<script>
    // --- CẤU HÌNH FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isVoiceActive = true;
    let currentQueue = [];

    // --- NAVIGATION ---
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-queue') initQueue();
    }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    // --- POPUP ẢNH ---
    function openExamPhotoPopup() {
        if (!currentQueue[0]) return;
        document.getElementById('popupExamImg').src = currentQueue[0].photo_exam;
        document.getElementById('examPhotoPopup').style.display = 'flex';
    }
    function closeExamPhotoPopup() { document.getElementById('examPhotoPopup').style.display = 'none'; }

    // --- LOGIC HÀNG ĐỢI ---
    function initQueue() {
        const today = new Date().toISOString().slice(0,10);
        db.ref(`submissions/${today}`).on('value', snap => {
            const data = snap.val() || {};
            // Lọc ra những người chưa ký và không ở trạng thái chờ chụp lại (để không gọi người đang chụp lại lên bàn)
            currentQueue = Object.values(data)
                .filter(i => !i.signed && i.status !== "retake")
                .sort((a,b) => a.timestamp - b.timestamp);
            
            document.getElementById('queue-count').innerText = `Hôm nay có ${currentQueue.length} học viên đang chờ duyệt bài`;
            renderQueue();
        });
    }

    function renderQueue() {
        const area = document.getElementById('call-area');
        const grid = document.getElementById('queue-grid');
        grid.innerHTML = '';

        if(currentQueue.length > 0) {
            area.classList.remove('hidden');
            const top = currentQueue[0];
            document.getElementById('call-name').innerText = top.name;
            document.getElementById('call-stt').innerText = `STT: ${top.stt}`;
            document.getElementById('call-info').innerText = `${top.dob} | ${top.unit || 'VDC Safety'}`;
            document.getElementById('call-img').src = top.photo_exam || '';

            currentQueue.slice(1).forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center gap-4 opacity-50">
                        <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center font-black text-slate-400">${idx+2}</div>
                        <div class="flex-1 overflow-hidden">
                            <div class="font-black text-slate-800 uppercase text-xs truncate">${item.name}</div>
                            <div class="text-[9px] font-bold text-blue-500">STT: ${item.stt}</div>
                        </div>
                    </div>`;
            });
        } else {
            area.classList.add('hidden');
            grid.innerHTML = '<div class="col-span-full py-20 text-center font-black text-slate-300 uppercase tracking-widest text-xl">Đang chờ học viên nộp bài...</div>';
        }
    }

    // --- XỬ LÝ DUYỆT BÀI & TỰ ĐỘNG GỌI ---
    async function processSubmission(type) {
        if(currentQueue.length === 0) return;
        
        const current = currentQueue[0];
        const next = currentQueue.length > 1 ? currentQueue[1] : null;
        const today = new Date().toISOString().slice(0,10);

        try {
            if(type === 'confirm') {
                // TRƯỜNG HỢP OK: Đánh dấu đã ký
                await db.ref(`submissions/${today}/${current.stt}`).update({ signed: true, status: "completed" });
                
                let msg = `Xác nhận bài thi anh ${current.name} hợp lệ. Mời anh lên bàn giảng viên ký tên xác nhận. `;
                if(next) msg += `Tiếp theo, mời anh ${next.name}, số thứ tự ${next.stt} lên nộp bài.`;
                speak(msg);
            } else {
                // TRƯỜNG HỢP LỖI: Yêu cầu chụp lại
                await db.ref(`submissions/${today}/${current.stt}`).update({ status: "retake" });
                
                let msg = `Bài thi của anh ${current.name} không đạt yêu cầu. Hệ thống đã gửi yêu cầu chụp lại về điện thoại của anh. `;
                if(next) msg += `Mời học viên tiếp theo, anh ${next.name} lên nộp bài.`;
                speak(msg);
            }
        } catch (e) { alert("Lỗi kết nối Firebase!"); }
    }

    // --- LOA THÔNG BÁO ---
    function speak(txt) {
        if(!isVoiceActive) return;
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(txt);
        utter.lang = 'vi-VN'; utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
    }
    function toggleVoice() {
        isVoiceActive = !isVoiceActive;
        const btn = document.getElementById('voice-btn');
        btn.className = isVoiceActive ? "px-6 py-3 bg-green-500 text-white rounded-2xl text-[11px] font-black uppercase shadow-lg" : "px-6 py-3 bg-slate-400 text-white rounded-2xl text-[11px] font-black uppercase shadow-lg";
        btn.innerHTML = isVoiceActive ? '<i class="fas fa-volume-up mr-2"></i> Loa: BẬT' : '<i class="fas fa-volume-mute mr-2"></i> Loa: TẮT';
    }
    function replayVoice() { if(currentQueue[0]) speak(`Mời học viên ${currentQueue[0].name}, số thứ tự ${currentQueue[0].stt} lên nộp bài thi.`); }

    window.onload = () => { initQueue(); };
</script>
</body>
</html>
