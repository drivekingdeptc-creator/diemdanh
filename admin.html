<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY ADMIN v7.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .nav-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        ::-webkit-scrollbar { height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <aside class="bg-slate-900 text-slate-400 flex flex-col h-screen w-[280px] shadow-2xl shrink-0">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="font-black text-white text-lg tracking-tighter uppercase">VDC Safety <span class="text-blue-500 text-xs">v7.0</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-university w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B1: Quản lý Lớp</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-id-card w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B2: Điểm danh</span>
            </button>
            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-bullhorn w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B3: Nộp bài</span>
            </button>
            <button onclick="switchTab('tab-ai', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-robot w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B4: AI Chấm điểm</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 relative overflow-hidden">
        
        <section id="tab-classes" class="tab-content active">
             <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 uppercase">Quản lý Lớp học</h2>
                <button onclick="openClassModal()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-lg">+ THÊM LỚP</button>
            </div>
            <div id="class-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
            <div id="student-editor" class="hidden mt-10 bg-white rounded-[3rem] shadow-sm border p-10">
                <div class="flex justify-between items-center mb-8 border-b pb-6">
                    <h3 id="editing-class-title" class="font-black text-xl uppercase text-slate-800">---</h3>
                    <div class="flex gap-2">
                        <button onclick="openImportModal()" class="px-5 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Nhập từ Excel</button>
                        <button onclick="closeEditor()" class="px-5 py-3 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-black uppercase">Đóng</button>
                    </div>
                </div>
                <table class="w-full text-sm"><tbody id="student-list-body"></tbody></table>
            </div>
        </section>

        <section id="tab-attendance" class="tab-content">
             <div class="bg-white rounded-[2.5rem] border overflow-hidden shadow-sm">
                <table class="w-full"><tbody id="attendance-list"></tbody></table>
            </div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <div class="flex gap-4">
                    <select id="folder-select" onchange="updateStorageFolder(this.value)" class="bg-white border-2 border-blue-600 text-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] outline-none shadow-sm"></select>
                </div>
            </div>
            <div id="queue-scroll" class="flex gap-6 overflow-x-auto pb-10 snap-x"></div>
        </section>

        <section id="tab-ai" class="tab-content">
            <div class="mb-10 text-center"><h2 class="text-4xl font-black text-slate-900 uppercase">AI Auto Grader</h2></div>
            <div class="max-w-2xl mx-auto bg-white p-12 rounded-[3rem] shadow-xl border-t-8 border-blue-600 space-y-8">
                
                <div class="bg-slate-50 p-6 rounded-3xl">
                    <label class="text-[10px] font-black text-slate-400 uppercase">1. Chọn Thư mục cần chấm</label>
                    <select id="ai-folder-select" class="w-full bg-transparent border-b-2 border-slate-200 p-2 font-bold text-lg outline-none text-blue-600"></select>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl">
                    <label class="text-[10px] font-black text-slate-400 uppercase">2. Tải lên Ảnh Đáp án (Key)</label>
                    <input type="file" id="ai-key-input" accept="image/*" class="w-full font-bold text-xs mt-2" onchange="previewKey(this)">
                    <img id="key-preview" class="hidden mt-4 w-full h-40 object-cover rounded-xl border">
                </div>

                <div id="grader-status" class="hidden p-4 bg-slate-900 rounded-2xl text-white text-center">
                    <p class="text-xs font-black animate-pulse">ĐANG CHẤM BÀI... VUI LÒNG ĐỢI</p>
                </div>

                <button id="start-ai-btn" onclick="startAICheck()" class="w-full py-8 bg-slate-900 text-white rounded-[2rem] font-black text-2xl uppercase shadow-2xl hover:bg-blue-600 transition-all">BẮT ĐẦU CHẤM</button>
            </div>
        </section>
    </main>

    <div id="importModal" class="popup-overlay"><div class="bg-white p-10 rounded-[3rem] w-full max-w-xl shadow-2xl"><textarea id="import-area" rows="8" class="w-full p-6 bg-slate-50 border-2 border-dashed rounded-3xl font-mono text-xs mb-6 outline-none"></textarea><div class="flex gap-4"><button onclick="processImport()" class="flex-1 py-5 bg-blue-600 text-white rounded-2xl font-black uppercase">Xử lý</button></div></div></div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLK_ZNVHoMTInV_Mo-_-q6fMUYlR1uLElrev9h-HwLXg70NVZDyX0veXPDmDmAVk/exec";
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let keyBase64 = "";

    function previewKey(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                keyBase64 = e.target.result;
                document.getElementById('key-preview').src = e.target.result;
                document.getElementById('key-preview').classList.remove('hidden');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function startAICheck() {
        const folderId = document.getElementById('ai-folder-select').value;
        if(!folderId || !keyBase64) return alert("Vui lòng chọn thư mục và tải ảnh đáp án!");

        const btn = document.getElementById('start-ai-btn');
        const status = document.getElementById('grader-status');
        btn.disabled = true; btn.innerText = "HỆ THỐNG ĐANG CHẠY...";
        status.classList.remove('hidden');

        // Gọi hàm trực tiếp trên Apps Script
        google.script.run.withSuccessHandler(count => {
            alert("✅ Hoàn thành! Đã chấm thêm " + count + " bài mới.");
            btn.disabled = false; btn.innerText = "BẮT ĐẦU CHẤM";
            status.classList.add('hidden');
        }).vdc_StartGrader(folderId, keyBase64);
    }

    // Đồng bộ Droplist Folders
    function syncFolders() {
        const list = document.getElementById('folder-select').innerHTML;
        document.getElementById('ai-folder-select').innerHTML = list;
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-ai') syncFolders();
        if(id === 'tab-classes') loadClasses();
        if(id === 'tab-queue') { initFolderDroplist(); initQueue(); }
    }

    // Các hàm loadClasses, initFolderDroplist, processImport cũ của anh...
    window.onload = loadClasses;
</script>
</body>
</html>
