<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY ADMIN v6.2 - FULL OPTION</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .nav-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; }
    </style>
</head>
<body class="flex">

    <div id="photoPopup" class="popup-overlay" onclick="this.style.display='none'">
        <img id="popupImg" class="max-h-[90vh] max-w-[90vw] border-4 border-white rounded-2xl shadow-2xl" src="">
    </div>

    <aside class="bg-slate-900 text-slate-400 flex flex-col h-screen w-[280px] shadow-2xl shrink-0">
        <div class="p-8 border-b border-slate-800 text-center">
            <h1 class="font-black text-white text-lg tracking-tighter uppercase">VDC Safety <span class="text-blue-500 text-xs">v6.2</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-university w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B1: Quản lý Lớp</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-id-card w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B2: Điểm danh & FaceID</span>
            </button>
            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-bullhorn w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B3: Điều phối nộp bài</span>
            </button>
            <button onclick="switchTab('tab-ai', this)" class="nav-btn w-full flex items-center p-4 rounded-2xl text-left transition-all">
                <i class="fas fa-robot w-5"></i><span class="ml-4 font-bold text-[10px] uppercase">B4: AI Chấm điểm</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 relative overflow-hidden">
        
        <section id="tab-classes" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 uppercase">Quản lý Lớp học</h2>
                <button onclick="openClassModal()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-lg">+ THÊM LỚP</button>
            </div>
            <div id="active-session-box" class="hidden mb-8 p-6 bg-blue-600 rounded-[2rem] text-white flex justify-between items-center">
                <div><p class="text-[10px] font-black uppercase opacity-60">Lớp đang hoạt động</p><h3 id="active-class-name" class="text-2xl font-black uppercase tracking-tighter">---</h3></div>
                <i class="fas fa-broadcast-tower text-3xl opacity-30"></i>
            </div>
            <div id="class-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>

            <div id="student-editor" class="hidden mt-10 bg-white rounded-[3rem] shadow-sm border p-10">
                <div class="flex justify-between items-center mb-8 border-b pb-6">
                    <h3 id="editing-class-title" class="font-black text-xl uppercase text-slate-800">Danh sách học viên</h3>
                    <div class="flex gap-2">
                        <button onclick="openImportModal()" class="px-5 py-3 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase">Nhập từ Excel</button>
                        <button onclick="closeEditor()" class="px-5 py-3 bg-slate-100 text-slate-400 rounded-xl text-[10px] font-black uppercase">Đóng</button>
                    </div>
                </div>
                <table class="w-full text-sm"><tbody id="student-list-body"></tbody></table>
            </div>
        </section>

        <section id="tab-attendance" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 uppercase">Điểm danh & FaceID</h2>
                <div class="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                    <button onclick="filterAttendance('all')" id="btn-filter-all" class="px-5 py-2 rounded-xl font-black text-[10px] uppercase bg-white text-slate-900">Tất cả</button>
                    <button onclick="filterAttendance('present')" id="btn-filter-present" class="px-5 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500">Hiện diện</button>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] border overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 border-b uppercase">
                        <tr><th class="p-6">STT</th><th>Học viên</th><th class="text-center">FaceID</th><th class="text-center">Gỡ</th></tr>
                    </thead>
                    <tbody id="attendance-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-4xl font-black text-slate-900 uppercase">Điều phối Nộp bài</h2>
                    <p id="display-folder-name" class="text-[10px] text-blue-600 font-black uppercase italic">Thư mục: Đang tải...</p>
                </div>
                <div class="flex gap-4">
                    <select id="folder-select" onchange="updateStorageFolder(this.value)" class="bg-white border-2 border-blue-600 text-blue-600 px-6 py-3 rounded-2xl font-black text-[10px] outline-none"></select>
                    <button onclick="confirmCreateFolder()" class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg"><i class="fas fa-folder-plus"></i></button>
                    <button onclick="toggleVoice()" id="voice-btn" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">Loa: BẬT</button>
                </div>
            </div>
            <div id="call-area" class="hidden bg-slate-900 rounded-[3rem] p-10 text-white flex items-center gap-10 border-4 border-white shadow-2xl">
                <img id="call-img" src="" class="w-48 h-64 object-cover rounded-3xl border-4 border-white/20 cursor-pointer" onclick="openPhoto(this.src)">
                <div class="flex-1">
                    <span id="call-stt" class="bg-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block">STT: --</span>
                    <h1 id="call-name" class="text-7xl font-black uppercase tracking-tighter mb-4">---</h1>
                    <div class="flex gap-4">
                        <button onclick="confirmAction('sign')" id="btn-approve" class="flex-[3] py-6 bg-white text-slate-900 rounded-2xl font-black text-2xl uppercase shadow-lg">DUYỆT - KÝ TÊN</button>
                        <button onclick="confirmAction('retake')" class="flex-[2] py-6 bg-red-600/20 border-2 border-red-500 rounded-2xl font-black text-2xl text-red-100 uppercase">CHỤP LẠI</button>
                    </div>
                </div>
            </div>
            <div id="queue-grid" class="grid grid-cols-5 gap-4 mt-10"></div>
        </section>

        <section id="tab-ai" class="tab-content">
            <div class="mb-10 text-center"><h2 class="text-4xl font-black text-slate-900 uppercase">AI Auto Grader</h2></div>
            <div class="max-w-xl mx-auto bg-white p-12 rounded-[3rem] shadow-xl border-t-8 border-blue-600 space-y-8">
                <div class="bg-slate-50 p-6 rounded-3xl"><label class="text-[10px] font-black text-slate-400 uppercase">Folder ID</label><input type="text" id="folder-id" class="w-full bg-transparent border-b-2 border-slate-200 p-2 font-bold text-lg outline-none"></div>
                <div class="bg-slate-50 p-6 rounded-3xl"><label class="text-[10px] font-black text-slate-400 uppercase">Ảnh Đáp án mẫu</label><input type="file" id="key-image" class="w-full font-bold text-xs mt-2"></div>
                <button onclick="runAIGrader()" class="w-full py-8 bg-slate-900 text-white rounded-[2rem] font-black text-2xl uppercase shadow-2xl hover:bg-blue-600 transition-all">CHẤM ĐIỂM AI</button>
            </div>
        </section>
    </main>

    <div id="classModal" class="popup-overlay"><div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl"><h2 class="text-2xl font-black uppercase mb-6">Tạo lớp mới</h2><input type="text" id="new-class-name" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold mb-4" placeholder="Tên lớp..."><div class="flex gap-4"><button onclick="confirmCreateClass()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase">Tạo ngay</button><button onclick="closeClassModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase">Hủy</button></div></div></div>
    
    <div id="importModal" class="popup-overlay"><div class="bg-white p-10 rounded-[3rem] w-full max-w-xl shadow-2xl"><h2 class="text-xl font-black uppercase mb-4 text-slate-900">Dán từ Excel</h2><textarea id="import-area" rows="8" class="w-full p-6 bg-slate-50 border-2 border-dashed rounded-3xl font-mono text-xs mb-6 outline-none" placeholder="1	Nguyễn Văn A	1990	Công ty..."></textarea><div class="flex gap-4"><button onclick="processImport()" class="flex-1 py-5 bg-blue-600 text-white rounded-2xl font-black uppercase">Xử lý</button><button onclick="closeImportModal()" class="flex-1 py-5 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase">Hủy</button></div></div></div>

<script>
    // CẤU HÌNH TỪ ANH
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLK_ZNVHoMTInV_Mo-_-q6fMUYlR1uLElrev9h-HwLXg70NVZDyX0veXPDmDmAVk/exec";
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentQueue = [], isVoiceActive = true, editingClassId = null, currentFilter = 'all';

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-classes') loadClasses();
        if(id === 'tab-attendance') initAttendance();
        if(id === 'tab-queue') { initFolderDroplist(); initQueue(); fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "syncFolders" }) }); }
    }

    // BƯỚC 1: QUẢN LÝ LỚP & IMPORT
    function loadClasses() {
        db.ref('classes').on('value', snap => {
            const grid = document.getElementById('class-grid'); grid.innerHTML = '';
            const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                grid.innerHTML += `<div class="bg-white p-8 rounded-[2rem] border shadow-sm"><h3 class="font-black text-xs uppercase mb-6">${data[id].name}</h3><div class="flex gap-2"><button onclick="activateClass('${id}', '${data[id].name}')" class="flex-1 py-2 bg-blue-600 text-white rounded-xl text-[9px] font-black uppercase">Mở Lớp</button><button onclick="editClassStudents('${id}', '${data[id].name}')" class="flex-1 py-2 bg-slate-100 rounded-xl text-[9px] font-black uppercase text-slate-600">Sửa DS</button></div></div>`;
            });
        });
        db.ref('current_session').on('value', snap => {
            const s = snap.val(); if(s) { document.getElementById('active-session-box').classList.remove('hidden'); document.getElementById('active-class-name').innerText = s.class; if(s.storage_id) document.getElementById('folder-id').value = s.storage_id; }
        });
    }
    async function activateClass(id, name) { await db.ref('current_session').set({ source: id, class: name, timestamp: Date.now() }); alert("Đã mở lớp!"); }
    function editClassStudents(id, name) {
        editingClassId = id; document.getElementById('student-editor').classList.remove('hidden'); document.getElementById('editing-class-title').innerText = name;
        db.ref(`classes/${id}/students`).on('value', snap => {
            const b = document.getElementById('student-list-body'); b.innerHTML = ''; const s = snap.val() || {};
            Object.keys(s).sort((a,b)=>a-b).forEach(stt => { b.innerHTML += `<tr class="border-b font-bold"><td class="p-4 text-center text-blue-500">${stt}</td><td class="p-4 uppercase">${s[stt].name}</td><td class="p-4">${s[stt].dob}</td><td class="p-4 text-center"><button onclick="removeStudent('${stt}')" class="text-red-300"><i class="fas fa-trash-alt"></i></button></td></tr>`; });
        });
    }
    async function processImport() {
        const raw = document.getElementById('import-area').value; const lines = raw.split('\n');
        for (let line of lines) { const p = line.split('\t'); if (p.length >= 2) await db.ref(`classes/${editingClassId}/students/${p[0].trim()}`).set({ stt: p[0].trim(), name: p[1].trim(), dob: p[2]||'', department: p[3]||'' }); }
        alert("Xong!"); closeImportModal();
    }

    // BƯỚC 2: ĐIỂM DANH
    function initAttendance() {
        const today = new Date().toISOString().slice(0,10);
        db.ref('current_session').on('value', snap => { if(!snap.val()) return;
            db.ref(`classes/${snap.val().source}/students`).on('value', sSnap => {
                db.ref(`attendance/${today}`).on('value', aSnap => {
                    const list = document.getElementById('attendance-list'); list.innerHTML = '';
                    const all = sSnap.val() || {}, att = aSnap.val() || {};
                    Object.keys(all).sort((a,b)=>a-b).forEach(stt => {
                        const isP = !!att[stt]; if(currentFilter === 'present' && !isP) return;
                        list.innerHTML += `<tr class="border-b ${!isP?'opacity-50':''}"><td class="p-6 text-center font-black">${stt}</td><td class="p-6 font-black uppercase text-xs">${all[stt].name}</td><td class="p-6 text-center">${isP?`<img src="${att[stt].face_thumb}" class="w-10 h-10 rounded-full inline-block cursor-pointer" onclick="openPhoto(this.src)">`:'---'}</td><td class="p-6 text-center">${isP?`<button onclick="resetFaceID('${stt}')" class="text-red-300"><i class="fas fa-undo"></i></button>`:'---'}</td></tr>`;
                    });
                });
            });
        });
    }

    // BƯỚC 3: NỘP BÀI & DROPLIST
    function initFolderDroplist() {
        db.ref('drive_folders').on('value', snap => {
            const sel = document.getElementById('folder-select'); const folders = snap.val() || {};
            sel.innerHTML = '<option value="">-- Chọn Folder --</option>';
            Object.values(folders).sort((a,b)=>b.name.localeCompare(a.name)).forEach(f => { sel.innerHTML += `<option value="${f.id}">${f.name}</option>`; });
            db.ref('current_session/storage_id').once('value', s => { if(s.val()) { sel.value = s.val(); document.getElementById('display-folder-name').innerText = "Thư mục: " + sel.options[sel.selectedIndex]?.text; } });
        });
    }
    function updateStorageFolder(id) { if(id) { db.ref('current_session').update({ storage_id: id }); document.getElementById('folder-id').value = id; } }
    function confirmCreateFolder() { fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "createFolder" }) }); alert("Đang tạo..."); }
    
    function initQueue() {
        const today = new Date().toISOString().slice(0,10);
        db.ref(`submissions/${today}`).on('value', snap => {
            const data = snap.val() || {};
            currentQueue = Object.values(data).filter(i => !i.signed && i.status !== 'retake').sort((a,b)=>a.timestamp - b.timestamp);
            renderQueue();
        });
    }
    function renderQueue() {
        const area = document.getElementById('call-area'), grid = document.getElementById('queue-grid'); grid.innerHTML = '';
        if(currentQueue.length > 0) {
            area.classList.remove('hidden'); const t = currentQueue[0];
            document.getElementById('call-name').innerText = t.name; document.getElementById('call-stt').innerText = `STT: ${t.stt}`;
            document.getElementById('call-img').src = t.photo_exam;
        } else area.classList.add('hidden');
    }

    // HÀM QUAN TRỌNG: DUYỆT VÀ LƯU DRIVE
    async function confirmAction(type) {
        if(currentQueue.length === 0) return;
        const c = currentQueue[0], today = new Date().toISOString().slice(0,10);
        const storageId = document.getElementById('folder-select').value;

        if(type === 'sign') {
            if(!storageId) { alert("Anh chưa chọn thư mục lưu bài ở Bước 3!"); return; }
            
            const btn = document.getElementById('btn-approve');
            btn.innerText = "ĐANG LƯU DRIVE...";
            btn.disabled = true;

            // Gọi GAS để bốc ảnh từ Firebase ném vào Drive
            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({
                    action: "saveToDrive",
                    params: {
                        folderId: storageId,
                        photoData: c.photo_exam,
                        stt: c.stt,
                        name: c.name
                    }
                })
            });

            await db.ref(`submissions/${today}/${c.stt}`).update({ signed: true });
            btn.innerText = "DUYỆT - KÝ TÊN";
            btn.disabled = false;
            speak(`Xác nhận anh ${c.name} ký tên.`);
        } else {
            await db.ref(`submissions/${today}/${c.stt}`).update({ status: 'retake' });
            speak(`Anh ${c.name} chụp lại bài.`);
        }
    }

    // UTILS
    function openClassModal() { document.getElementById('classModal').style.display='flex'; }
    function closeClassModal() { document.getElementById('classModal').style.display='none'; }
    function openImportModal() { document.getElementById('importModal').style.display='flex'; }
    function closeImportModal() { document.getElementById('importModal').style.display='none'; }
    function closeEditor() { document.getElementById('student-editor').classList.add('hidden'); }
    function openPhoto(url) { document.getElementById('popupImg').src = url; document.getElementById('photoPopup').style.display='flex'; }
    function speak(t) { if(isVoiceActive) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='vi-VN'; u.rate=0.9; window.speechSynthesis.speak(u); } }
    function toggleVoice() { isVoiceActive = !isVoiceActive; document.getElementById('voice-btn').classList.toggle('bg-slate-400'); }

    window.onload = loadClasses;
</script>
</body>
</html>
