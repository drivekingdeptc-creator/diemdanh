<div style="background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 10px; margin-top: 15px;">
    <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 15px;">
        <div style="flex: 1; min-width: 200px;">
            <label style="color: #856404; font-size: 10px;">📍 TỌA ĐỘ BẢO MẬT HIỆN TẠI:</label>
            <div id="gps-display" style="font-weight: bold; font-size: 14px; color: #004085; margin: 5px 0;">
                <span style="color: #999; font-weight: normal;">Chưa ghim vị trí</span>
            </div>
        </div>
        
        <div style="flex: 1; min-width: 250px;">
            <label style="color: #4a5568; font-size: 10px;">DÁN TỌA ĐỘ TỪ GOOGLE MAPS:</label>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <input type="text" id="manual-gps" placeholder="Ví dụ: 10.823, 106.629" style="padding: 8px; font-size: 13px;">
                <button class="btn btn-primary" onclick="saveManualGPS()" style="padding: 8px 15px;">LƯU</button>
            </div>
        </div>
    </div>

    <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ffe082; display: flex; gap: 10px;">
        <button class="btn btn-warning" onclick="pinGPS()">🌐 LẤY VỊ TRÍ TỰ ĐỘNG (GPS/WIFI)</button>
        <button class="btn" style="background:#cbd5e0; color:#4a5568;" onclick="clearGPS()">❌ XÓA TỌA ĐỘ</button>
    </div>
</div>

<script>
    // --- HÀM LƯU TỌA ĐỘ THỦ CÔNG ---
    async function saveManualGPS() {
        const val = document.getElementById('manual-gps').value.trim();
        if (!val) return alert("Vui lòng dán tọa độ!");

        // Tách chuỗi bằng dấu phẩy hoặc dấu cách
        const parts = val.split(/[\s,]+/);
        if (parts.length < 2) return alert("Định dạng tọa độ không đúng! (Phải có vĩ độ và kinh độ)");

        const lat = parseFloat(parts[0]);
        const lng = parseFloat(parts[1]);

        if (isNaN(lat) || isNaN(lng)) return alert("Tọa độ phải là chữ số!");

        try {
            await db.ref('current_session').update({ lat: lat, lng: lng });
            updateGPSUI(lat, lng);
            document.getElementById('manual-gps').value = ''; // Xóa ô nhập
            alert("Đã lưu tọa độ thủ công thành công!");
        } catch (e) {
            alert("Lỗi lưu dữ liệu: " + e.message);
        }
    }

    // --- CÁC HÀM CŨ GIỮ NGUYÊN HOẶC TỐI ƯU ---
    async function pinGPS() {
        if (!navigator.geolocation) return alert("Trình duyệt không hỗ trợ!");
        document.getElementById('gps-display').innerHTML = "⏳ Đang xác định vị trí...";
        
        navigator.geolocation.getCurrentPosition(async p => {
            const lat = p.coords.latitude; 
            const lng = p.coords.longitude;
            await db.ref('current_session').update({ lat: lat, lng: lng });
            updateGPSUI(lat, lng);
            alert("Đã ghim vị trí thành công!");
        }, () => {
            alert("Không lấy được GPS tự động. Anh hãy dán tọa độ thủ công nhé!");
            renderReport();
        }, { enableHighAccuracy: false, timeout: 5000 });
    }

    function updateGPSUI(lat, lng) {
        if (lat && lng) {
            const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;
            document.getElementById('gps-display').innerHTML = `
                <a href="${mapUrl}" target="_blank" style="color: #004085; text-decoration: underline; font-weight: 800;">
                    ${lat.toFixed(6)}, ${lng.toFixed(6)} 🔗
                </a>
                <br><small style="font-weight:normal; color:#666;">(Bấm để kiểm tra bản đồ)</small>
            `;
        }
    }
</script>
