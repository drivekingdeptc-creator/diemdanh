<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin SOL61 v5.7 - FINAL SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .nav-btn.active { background: #1e293b; border-left: 4px solid var(--accent); color: white; }
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 1000; align-items: center; justify-content: center; }
        .card-vdc { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; transition: 0.3s; }
        .card-vdc:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="photoPopup" class="popup-overlay" onclick="this.style.display='none'">
        <img id="popupImg" class="max-h-[90vh] max-w-[90vw] border-4 border-white rounded-2xl shadow-2xl" src="">
    </div>

    <aside class="bg-slate-900 text-slate-400 flex flex-col sticky top-0 h-screen w-[280px] shadow-2xl z-50">
        <div class="p-8 border-b border-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black">V</div>
            <h1 class="font-black text-white text-sm tracking-widest uppercase">VDC Safety</h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-1 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-4 rounded-xl text-left">
                <i class="fas fa-university w-5"></i> 
                <div class="ml-4"><p class="text-[9px] font-black uppercase leading-none opacity-50">Bước 1</p><p class="font-bold text-xs">Quản lý Lớp học</p></div>
            </button>

            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left">
                <i class="fas fa-id-card w-5"></i> 
                <div class="ml-4"><p class="text-[9px] font-black uppercase leading-none opacity-50">Bước 2</p><p class="font-bold text-xs">Điểm danh & FaceID</p></div>
            </button>

            <button onclick="switchTab('tab-queue', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left">
                <i class="fas fa-file-export w-5"></i> 
                <div class="ml-4"><p class="text-[9px] font-black uppercase leading-none opacity-50">Bước 3</p><p class="font-bold text-xs">Điều phối Nộp bài</p></div>
            </button>

            <button onclick="switchTab('tab-ai', this)" class="nav-btn w-full flex items-center p-4 rounded-xl text-left">
                <i class="fas fa-robot w-5"></i> 
                <div class="ml-4"><p class="text-[9px] font-black uppercase leading-none opacity-50">Bước 4</p><p class="font-bold text-xs">AI Chấm điểm</p></div>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-10 overflow-hidden relative">
        
        <section id="tab-classes" class="tab-content active">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Quản lý Lớp học</h2>
                <button onclick="openClassModal()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">+ Thêm lớp mới</button>
            </div>
            <div id="active-session-box" class="hidden mb-8 p-6 bg-blue-600 rounded-[2rem] text-white flex justify-between items-center">
                <div><p class="text-[10px] font-black uppercase opacity-60">Đang giảng dạy lớp</p><h3 id="active-class-name" class="text-2xl font-black uppercase">---</h3></div>
                <i class="fas fa-broadcast-tower text-3xl opacity-30"></i>
            </div>
            <div id="class-grid" class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10"></div>
            
            <div id="student-editor" class="hidden bg-white rounded-[2.5rem] shadow-sm border p-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="editing-class-title" class="font-black text-lg uppercase text-slate-800">Danh sách học viên</h3>
                    <button onclick="addStudentRow()" class="px-5 py-2.5 bg-green-500 text-white rounded-xl text-[10px] font-black uppercase shadow-md">+ Thêm học viên</button>
                </div>
                <table class="w-full text-sm">
                    <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400"><tr class="border-b"><th class="p-4 text-center">STT</th><th class="p-4 text-left">Họ tên</th><th class="p-4 text-left">Năm sinh</th><th class="p-4 text-center">Thao tác</th></tr></thead>
                    <tbody id="student-list-body"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-attendance" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Điểm danh & FaceID</h2>
                <div class="flex bg-slate-200 p-1.5 rounded-2xl gap-1">
                    <button onclick="filterAttendance('all')" id="btn-filter-all" class="px-5 py-2 rounded-xl font-black text-[10px] uppercase bg-white text-slate-900">Tất cả</button>
                    <button onclick="filterAttendance('present')" id="btn-filter-present" class="px-5 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500">Hiện diện</button>
                    <button onclick="filterAttendance('absent')" id="btn-filter-absent" class="px-5 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500">Vắng mặt</button>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 border-b uppercase"><tr><th class="p-6 text-center">STT</th><th class="p-6">Học viên</th><th class="p-6">Trạng thái</th><th class="p-6 text-center">Face ID Gốc</th><th class="p-6 text-center">Gỡ</th></tr></thead>
                    <tbody id="attendance-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-queue" class="tab-content">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Điều phối Nộp bài</h2>
                <div class="flex gap-3">
                    <button onclick="confirmCreateFolder()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg hover:bg-blue-700">
                        <i class="fas fa-folder-plus mr-2"></i> Tạo thư mục ngày hôm nay
                    </button>
                    <button onclick="toggleVoice()" id="voice-btn" class="bg-green-500 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase shadow-lg">Loa: BẬT</button>
                </div>
            </div>
            <div id="current-folder-info" class="mb-6 hidden bg-white p-4 rounded-2xl border border-blue-100 flex items-center justify-between">
                <span id="display-folder-id" class="text-[10px] font-mono font-bold text-blue-600 tracking-widest uppercase">ID Thư mục nộp bài: ---</span>
                <span class="text-[9px] font-black text-slate-400 uppercase italic">Thư mục tạo theo định dạng yyyy-MM-dd</span>
            </div>
            <div id="call-area" class="hidden mb-10 bg-slate-900 rounded-[3rem] p-10 text-white shadow-2xl flex items-center gap-10 border-4 border-white">
                <img id="call-img" src="" class="w-48 h-64 object-cover rounded-3xl border-4 border-white/20 cursor-pointer shadow-2xl" onclick="openPhoto(this.src)">
                <div class="flex-1">
                    <span id="call-stt" class="bg-blue-600 px-4 py-1 rounded-full text-[10px] font-black uppercase mb-4 inline-block">STT: --</span>
                    <h1 id="call-name" class="text-7xl font-black uppercase leading-none tracking-tighter mb-4">---</h1>
                    <p id="call-info" class="text-xl font-medium text-slate-400 italic mb-8">---</p>
                    <div class="flex gap-4">
                        <button onclick="confirmAction('sign')" class="flex-[3] py-6 bg-white text-slate-900 rounded-2xl font-black text-2xl uppercase shadow-xl hover:bg-blue-50">Duyệt - Mời Ký</button>
                        <button onclick="confirmAction('retake')" class="flex-[2] py-6 bg-red-600/20 border-2 border-red-500 rounded-2xl font-black text-2xl text-red-100 uppercase">Chụp lại</button>
                    </div>
                </div>
            </div>
            <div id="queue-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>

        <section id="tab-ai" class="tab-content">
            <div class="mb-10 text-center"><h2 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">AI Auto Grader</h2></div>
            <div class="max-w-xl mx-auto bg-white p-12 rounded-[3rem] shadow-xl border-t-8 border-blue-600 space-y-8">
                <div class="bg-slate-50 p-6 rounded-3xl"><label class="block text-[10px] font-black text-slate-400 uppercase mb-3">Google Drive Folder ID (Tự động điền khi ở Bước 3)</label><input type="text" id="folder-id" class="w-full bg-transparent border-b-2 border-slate-200 p-2 font-bold text-lg outline-none"></div>
                <div class="bg-slate-50 p-6 rounded-3xl"><label class="block text-[10px] font-black text-slate-400 uppercase mb-3">Tải ảnh Đáp án mẫu (.JPG)</label><input type="file" id="key-image" class="w-full font-bold text-xs"></div>
                <button onclick="runAIGrader()" class="w-full py-8 bg-slate-900 text-white rounded-[2rem] font-black text-2xl uppercase shadow-2xl hover:bg-blue-600 active:scale-95 transition-all">Kích hoạt Gemini Chấm điểm</button>
            </div>
        </section>
    </main>

    <div id="classModal" class="popup-overlay" style="display:none;">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black uppercase mb-6">Tạo lớp huấn luyện mới</h2>
            <input type="text" id="new-class-name" class="w-full p-5 bg-slate-50 border rounded-2xl font-bold mb-4" placeholder="Tên lớp (VD: An toàn Điện VSIP)">
            <div class="flex gap-4"><button onclick="confirmCreateClass()" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black uppercase">Tạo ngay</button><button onclick="closeClassModal()" class="flex-1 py-4 bg-slate-100 text-slate-400 rounded-2xl font-black uppercase">Hủy</button></div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI", authDomain: "hepc-ed95d.firebaseapp.com", databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com", projectId: "hepc-ed95d", storageBucket: "hepc-ed95d.firebasestorage.app", appId: "1:536861347284:web:61d162705878577f741a41" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentQueue = [], isVoiceActive = true, editingClassId = null, currentFilter = 'all';

    // --- LOGIC HÀNG ĐỢI ---
    function initQueue() {
        const today = new Date().toISOString().slice(0,10);
        db.ref(`submissions/${today}`).on('value', snap => {
            const data = snap.val() || {};
            currentQueue = Object.values(data).filter(i => !i.signed && i.status !== 'retake').sort((a,b) => a.timestamp - b.timestamp);
            renderQueue();
        });
    }
    function renderQueue() {
        const area = document.getElementById('call-area'), grid = document.getElementById('queue-grid'); grid.innerHTML = '';
        if(currentQueue.length > 0) {
            area.classList.remove('hidden'); const t = currentQueue[0];
            document.getElementById('call-name').innerText = t.name; document.getElementById('call-stt').innerText = `STT: ${t.stt}`;
            document.getElementById('call-info').innerText = `${t.dob} | ${t.unit}`; document.getElementById('call-img').src = t.photo_exam;
            currentQueue.slice(1).forEach((item, i) => { grid.innerHTML += `<div class="bg-white p-4 rounded-2xl border flex items-center gap-4 opacity-40"><div class="font-black text-slate-200 text-xs">${i+2}</div><div class="font-bold uppercase text-[9px] truncate text-slate-600">${item.name}</div></div>`; });
        } else { area.classList.add('hidden'); grid.innerHTML = '<p class="col-span-full text-center text-slate-300 py-10 font-black uppercase text-xs tracking-widest italic">Chưa có bài nộp trong hàng đợi</p>'; }
    }
    async function confirmAction(type) {
        if(currentQueue.length === 0) return; const c = currentQueue[0], today = new Date().toISOString().slice(0,10);
        if(type === 'sign') { await db.ref(`submissions/${today}/${c.stt}`).update({ signed: true, status: 'completed' }); speak(`Đã xác nhận anh ${c.name} ký tên.`); }
        else { await db.ref(`submissions/${today}/${c.stt}`).update({ status: 'retake' }); speak(`Yêu cầu anh ${c.name} chụp lại bài rõ hơn.`); }
    }

    // --- QUẢN LÝ LỚP & HỌC VIÊN ---
    function initClasses() {
        db.ref('classes').on('value', snap => {
            const grid = document.getElementById('class-grid'); grid.innerHTML = ''; const data = snap.val() || {};
            Object.keys(data).forEach(id => {
                const cls = data[id];
                grid.innerHTML += `<div class="card-vdc p-6 flex flex-col justify-between"><h3 class="font-black text-xs uppercase mb-1 leading-tight">${cls.name}</h3><p class="text-[10px] font-bold text-slate-400 italic mb-6">${Object.keys(cls.students || {}).length} Học viên</p><div class="flex gap-2"><button onclick="activateClass('${id}', '${cls.name}')" class="flex-1 py-2 bg-blue-600 text-white rounded-xl text-[9px] font-black uppercase">Mở Lớp</button><button onclick="editClassStudents('${id}', '${cls.name}')" class="flex-1 py-2 bg-slate-100 rounded-xl text-[9px] font-black uppercase text-slate-600">Sửa DS</button></div></div>`;
            });
        });
        db.ref('current_session').on('value', snap => {
            const s = snap.val(); const b = document.getElementById('active-session-box');
            if(s) { b.classList.remove('hidden'); document.getElementById('active-class-name').innerText = s.class; if(s.storage_id) document.getElementById('folder-id').value = s.storage_id; }
            else b.classList.add('hidden');
        });
    }
    async function activateClass(id, name) { await db.ref('current_session').set({ source: id, class: name, timestamp: Date.now() }); alert(`Lớp ${name} đã được kích hoạt!`); }
    function openClassModal() { document.getElementById('classModal').style.display = 'flex'; }
    function closeClassModal() { document.getElementById('classModal').style.display = 'none'; }
    async function confirmCreateClass() { const n = document.getElementById('new-class-name').value; if(!n) return; await db.ref('classes').push().set({ name: n, students: {} }); closeClassModal(); document.getElementById('new-class-name').value = ''; }
    function editClassStudents(id, name) {
        editingClassId = id; document.getElementById('student-editor').classList.remove('hidden'); document.getElementById('editing-class-title').innerText = "Đang sửa: " + name;
        db.ref(`classes/${id}/students`).on('value', snap => {
            const b = document.getElementById('student-list-body'); b.innerHTML = ''; const s = snap.val() || {};
            Object.keys(s).sort((a,b)=>a-b).forEach(stt => { const p = s[stt]; b.innerHTML += `<tr class="border-b font-bold"><td class="p-4 text-center text-blue-500">${stt}</td><td class="p-4 uppercase">${p.name}</td><td class="p-4">${p.dob}</td><td class="p-4 text-center"><button onclick="removeStudent('${stt}')" class="text-red-300 hover:text-red-500"><i class="fas fa-user-minus"></i></button></td></tr>`; });
        });
        document.getElementById('student-editor').scrollIntoView({ behavior: 'smooth' });
    }
    async function addStudentRow() { const stt = prompt("STT:"), name = prompt("Họ Tên:"), dob = prompt("Năm sinh:"), unit = prompt("Đơn vị:"); if(stt && name) await db.ref(`classes/${editingClassId}/students/${stt}`).set({ stt, name, dob, department: unit }); }
    async function removeStudent(stt) { if(confirm(`Xóa học viên ${stt}?`)) await db.ref(`classes/${editingClassId}/students/${stt}`).remove(); }

    // --- ĐIỂM DANH & TẠO THƯ MỤC ---
    function initAttendance() {
        const today = new Date().toISOString().slice(0,10);
        db.ref('current_session').on('value', snap => {
            if(!snap.val()) return; const source = snap.val().source;
            db.ref(`classes/${source}/students`).on('value', sSnap => {
                const all = sSnap.val() || {};
                db.ref(`attendance/${today}`).on('value', aSnap => {
                    const att = aSnap.val() || {}; window.masterAtt = { all, att }; renderAttendanceTable();
                });
            });
        });
    }
    function renderAttendanceTable() {
        const { all, att } = window.masterAtt || { all: {}, att: {} }; const list = document.getElementById('attendance-list'); list.innerHTML = ''; let count = 0;
        Object.keys(all).sort((a,b)=>a-b).forEach(stt => {
            const s = all[stt], a = att[stt], isP = !!a;
            if(currentFilter === 'present' && !isP) return; if(currentFilter === 'absent' && isP) return;
            if(isP) count++;
            list.innerHTML += `<tr class="border-b hover:bg-slate-50 transition-all ${!isP?'opacity-50':''}"><td class="p-6 text-center font-black text-slate-300">${stt}</td><td class="p-6 font-black uppercase text-xs">${s.name}</td><td class="p-6"><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase ${isP?'bg-green-100 text-green-600':'bg-slate-100 text-slate-400'}">${isP?'Hiện diện':'Vắng'}</span></td><td class="p-6 text-center">${isP?`<img src="${a.face_thumb}" class="w-10 h-10 rounded-full border-2 border-white shadow-sm inline-block cursor-pointer hover:scale-125 transition-all" onclick="openPhoto(this.src)">`:'<i class="fas fa-user-slash text-slate-200"></i>'}</td><td class="p-6 text-center">${isP?`<button onclick="resetFaceID('${stt}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-undo-alt"></i></button>`:'---'}</td></tr>`;
        });
    }
    function filterAttendance(t) { currentFilter = t; ['all','present','absent'].forEach(f => { const b = document.getElementById(`btn-filter-${f}`); b.className = f===t?"px-5 py-2 rounded-xl font-black text-[10px] uppercase bg-white text-slate-900":"px-5 py-2 rounded-xl font-black text-[10px] uppercase text-slate-500"; }); renderAttendanceTable(); }
    async function resetFaceID(stt) { if(confirm(`Gỡ Face ID STT ${stt}?`)) await db.ref(`attendance/${new Date().toISOString().slice(0,10)}/${stt}`).remove(); }

    function confirmCreateFolder() {
        google.script.run.withSuccessHandler(id => {
            document.getElementById('display-folder-id').innerText = "ID Thư mục nộp bài: " + id;
            document.getElementById('current-folder-info').classList.remove('hidden');
            document.getElementById('folder-id').value = id;
            db.ref('current_session').update({ storage_id: id });
            alert("✅ Đã tạo thư mục ngày hôm nay!");
        }).vdc_CreateFolderInRoot();
    }

    // --- COMMON UTILS ---
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-classes') initClasses(); if(id === 'tab-attendance') initAttendance(); if(id === 'tab-queue') initQueue();
    }
    function speak(t) { if(isVoiceActive) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='vi-VN'; u.rate=0.9; window.speechSynthesis.speak(u); } }
    function toggleVoice() { isVoiceActive = !isVoiceActive; document.getElementById('voice-btn').classList.toggle('bg-slate-400'); }
    function openPhoto(url) { document.getElementById('popupImg').src = url; document.getElementById('photoPopup').style.display='flex'; }

    window.onload = initClasses;
</script>
</body>
</html>
