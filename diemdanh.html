<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - FACE ID AI v1.5.3</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --vdc-blue: #1e293b; --vdc-accent: #3b82f6; }
        body { background: #f8fafc; font-family: 'Inter', system-ui, sans-serif; }
        .app-container { max-width: 450px; width: 100%; background: white; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); overflow: hidden; margin: auto; }

        /* Khung Camera chuyên nghiệp */
        #video-container { position: relative; width: 280px; height: 373px; margin: 15px auto; background: #000; border-radius: 30px; overflow: hidden; border: 6px solid #fff; box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }

        /* Hiệu ứng tia quét AI */
        .scan-line {
            position: absolute; width: 100%; height: 2px; background: linear-gradient(to right, transparent, #3b82f6, transparent);
            box-shadow: 0 0 15px #3b82f6; top: 0; animation: scan 2.5s infinite linear; z-index: 10;
        }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        .face-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 40%, rgba(30,41,59,0.7) 85%); pointer-events: none; }

        /* Nút bấm VDC Style */
        .btn-vdc { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; transition: 0.3s; }
        .btn-vdc:disabled { background: #cbd5e1; color: #94a3b8; }
        .btn-vdc:active { transform: scale(0.96); }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center min-h-screen">

<div class="app-container">
    <div id="session-info" class="bg-slate-900 text-white p-4 text-[10px] tracking-wider text-center uppercase font-bold border-b border-slate-700 italic">
        Đang đồng bộ phiên học...
    </div>

    <div class="p-6 text-center">
        <div class="flex items-center justify-center gap-2 mb-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-sm">V</div>
            <h3 class="text-xl font-black text-slate-800 tracking-tighter uppercase">VDC Safety AI</h3>
        </div>
        <p id="loading-msg" class="text-xs text-red-500 font-bold animate-pulse mb-4"><i class="fas fa-spinner fa-spin mr-1"></i> ĐANG TẢI DỮ LIỆU AI...</p>

        <div id="scanner-section">
            <div id="video-container">
                <div class="scan-line"></div>
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
                <div class="face-guide"></div>
            </div>
            <p id="scan-status" class="text-sm font-bold text-slate-400 mb-4 tracking-wide uppercase">Đưa mặt vào khung bầu dục</p>
            <button class="btn-vdc w-full py-5 rounded-2xl font-black text-lg shadow-xl shadow-slate-200" id="btnCapture" onclick="checkFace()" disabled>
                XÁC NHẬN KHUÔN MẶT
            </button>
        </div>

        <div id="search-section" class="hidden mt-4 pt-6 border-t border-dashed border-slate-200 text-left fade-in">
            <div class="bg-orange-50 border-l-4 border-orange-500 p-3 mb-4">
                <p class="text-orange-700 text-xs font-bold uppercase tracking-tight">Thông báo</p>
                <p class="text-[11px] text-orange-600 font-medium">Bạn chưa đăng ký khuôn mặt. Vui lòng nhập họ tên để tìm hồ sơ lớp.</p>
            </div>
            <input type="text" id="inputName" class="w-full p-4 bg-slate-50 border rounded-2xl mb-3 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-slate-700" placeholder="NHẬP HỌ TÊN CÓ DẤU...">
            <button class="w-full py-4 bg-slate-700 text-white rounded-2xl font-bold shadow-lg" onclick="searchStudent()">TÌM THÔNG TIN</button>
        </div>

        <div id="verify-section" class="hidden mt-4 text-left bg-blue-50/50 p-5 rounded-3xl border border-blue-100 fade-in">
            <img id="preview-photo" class="w-24 h-32 object-cover rounded-xl border-4 border-white shadow-md mx-auto mb-6 bg-slate-200">
            <div class="space-y-4">
                <div class="flex gap-3">
                    <div class="flex-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">STT</label><input type="text" id="c1" disabled class="w-full p-2 bg-slate-100 border-none rounded-lg font-bold"></div>
                    <div class="flex-[3]"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Học viên</label><input type="text" id="c2" disabled class="w-full p-2 bg-slate-100 border-none rounded-lg font-bold"></div>
                </div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Giới tính</label><select id="c3" class="w-full p-3 bg-white border rounded-xl outline-none"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Ngày sinh (dd/mm/yyyy)</label><input type="date" id="c4" class="w-full p-3 bg-white border rounded-xl outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Bậc An Toàn</label><select id="c5" class="w-full p-3 bg-white border rounded-xl outline-none"><option value="5/5">5/5</option><option value="4/5">4/5</option><option value="3/5">3/5</option><option value="2/5">2/5</option><option value="1/5">1/5</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Chức danh / Đơn vị</label><div class="flex gap-2"><input type="text" id="c6" placeholder="Chức danh" class="w-1/2 p-3 bg-white border rounded-xl"><input type="text" id="c7" placeholder="Đơn vị" class="w-1/2 p-3 bg-white border rounded-xl"></div></div>
            </div>
            <button class="w-full mt-6 py-5 bg-green-600 text-white rounded-2xl font-black text-lg shadow-lg uppercase" onclick="saveFinal()">XÁC NHẬN ĐĂNG KÝ MẶT</button>
            <button class="w-full mt-2 text-slate-400 font-bold text-xs" onclick="location.reload()">QUAY LẠI QUÉT MẶT</button>
        </div>

        <div id="result-screen" class="hidden mt-4 fade-in">
            <div class="bg-white p-6 rounded-[40px] shadow-2xl border border-green-50 shadow-green-100 relative text-center">
                <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4 text-white text-2xl shadow-lg shadow-green-100">
                    <i class="fas fa-check"></i>
                </div>
                <img id="res-photo" class="w-32 h-44 object-cover rounded-2xl border-4 border-white shadow-md mx-auto mb-4 bg-slate-100">
                <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight" id="res-name"></h2>
                <p class="text-sm font-bold text-green-600 mt-2 italic" id="res-time"></p>
                
                <div class="mt-4 p-4 bg-slate-50 rounded-2xl text-left text-[13px] space-y-2 border border-slate-100">
                    <p class="flex justify-between border-b border-slate-200 pb-2 text-slate-500">
                        <span>Số thứ tự:</span> <b id="res-stt" class="text-slate-800"></b>
                    </p>
                    <p class="flex justify-between pt-1 text-slate-500">
                        <span>Đơn vị:</span> <b id="res-unit" class="text-slate-800 text-right truncate ml-4"></b>
                    </p>
                </div>
                <button class="w-full mt-6 py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs" onclick="location.reload()">
                    TIẾP TỤC QUÉT MỚI
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="mt-8 text-[10px] text-slate-400 uppercase tracking-[0.2em] font-bold">
    Hệ thống VDC Safety v1.5.3 | <span class="text-slate-800">Mr. An Toàn</span>
</footer>

<script>
    // CẤU HÌNH FIREBASE - Mr. Trần Công Đẹp
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting, faceMatcher, session, currentStudent, capturedPhoto;

    async function initAI() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL)
            ]);
            document.getElementById('loading-msg').style.display = 'none';
            
            db.ref('current_session').on('value', snap => {
                session = snap.val();
                if(session) document.getElementById('session-info').innerHTML = `<i class="fas fa-university mr-1"></i> LỚP: ${session.class}`;
            });

            startCamera();
            loadFaceDB();
        } catch (e) { document.getElementById('loading-msg').innerHTML = "❌ LỖI TẢI MÔ HÌNH AI!"; }
    }

    async function startCamera() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.getElementById('video');
        video.srcObject = s;
        isDetecting = true;
        video.onplay = () => {
            const canvas = document.getElementById('overlay');
            faceapi.matchDimensions(canvas, { width: 280, height: 373 });
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if(det) {
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                    faceapi.draw.drawDetections(canvas, faceapi.resizeResults(det, { width: 280, height: 373 }));
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                    document.getElementById('scan-status').innerHTML = "✅ SẴN SÀNG NHẬN DIỆN";
                    document.getElementById('scan-status').classList.replace('text-slate-400', 'text-blue-600');
                }
            }, 500);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref('students').once('value');
        const data = snap.val() || {};
        const labeled = Object.values(data).filter(u => u.descriptor).map(u => new faceapi.LabeledFaceDescriptors(u.stt.toString(), [new Float32Array(u.descriptor)]));
        if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
    }

    async function checkFace() {
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 600;
        const v = document.getElementById('video');
        canvas.getContext('2d').drawImage(v, (v.videoWidth-(v.videoHeight*0.75))/2, v.videoHeight*0.05, v.videoHeight*0.75, v.videoHeight*0.95, 0, 0, 450, 600);
        capturedPhoto = canvas.toDataURL('image/jpeg', 0.8);

        if(faceMatcher && lastDescriptor) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                const snap = await db.ref(`classes/${session.source}/students/${match.label}`).once('value');
                if(snap.val()) {
                    currentStudent = snap.val();
                    currentStudent.photo = capturedPhoto; 
                    return saveAttendance(currentStudent);
                }
            }
        }
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('search-section').classList.remove('hidden');
    }

    async function searchStudent() {
        const name = document.getElementById('inputName').value.trim().toLowerCase();
        const snap = await db.ref(`classes/${session.source}/students`).once('value');
        const list = snap.val() || {};
        const found = Object.values(list).find(u => u.name && u.name.toLowerCase() === name);
        
        if(found) {
            currentStudent = found;
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').classList.remove('hidden');
            document.getElementById('preview-photo').src = capturedPhoto;
            document.getElementById('c1').value = found.stt;
            document.getElementById('c2').value = found.name;
        } else { alert("Không tìm thấy tên trong danh sách lớp này!"); }
    }

    async function saveFinal() {
        const v4 = document.getElementById('c4').value;
        if(!v4) return alert("Vui lòng nhập Ngày sinh để định danh!");
        
        // CHUYỂN ĐỔI NGÀY SANG dd/MM/yyyy ĐỂ KHỚP VỚI EXCEL
        const [y, m, d] = v4.split('-');
        const formattedDOB = `${d}/${m}/${y}`;

        const data = {
            ...currentStudent,
            gender: document.getElementById('c3').value,
            dob: formattedDOB,
            rank: document.getElementById('c5').value,
            position: document.getElementById('c6').value.trim(),
            department: document.getElementById('c7').value.trim(),
            descriptor: Array.from(lastDescriptor),
            photo: capturedPhoto,
            time: new Date().toLocaleTimeString('vi-VN')
        };
        await db.ref('students/' + data.stt).set(data);
        saveAttendance(data);
    }

    async function saveAttendance(st) {
        const timeStr = new Date().toLocaleTimeString('vi-VN') + " ngày " + new Date().toLocaleDateString('vi-VN');
        await db.ref(`attendance/${session.date}/${session.session}/${st.stt}`).set({ name: st.name, time: timeStr, photo: st.photo || "" });
        
        isDetecting = false;
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('verify-section').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        document.getElementById('res-photo').src = st.photo || "";
        document.getElementById('res-stt').innerText = st.stt;
        document.getElementById('res-name').innerText = st.name.toUpperCase();
        document.getElementById('res-unit').innerText = st.department || st.company || "";
        document.getElementById('res-time').innerText = "ĐIỂM DANH THÀNH CÔNG LÚC: " + timeStr;
    }
    initAI();
</script>
</body>
</html>
