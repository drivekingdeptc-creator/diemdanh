<div id="verify-section" class="form-verify" style="display:none; text-align: left; background: #fff3cd; padding: 15px; border-radius: 12px; border: 1px solid #ffeeba; margin-top: 15px;">
    
    <p style="font-size: 13px; color: #856404; line-height: 1.5; margin-bottom: 12px; font-style: italic;">
        <strong>Lưu ý:</strong> Để phục vụ cho công tác làm chứng chỉ đào tạo cuối khóa, kính đề nghị các anh/chị học viên <strong>KIỂM TRA</strong> và <strong>ĐIỀN</strong> đầy đủ các thông tin bên dưới. Trân trọng cảm ơn!
    </p>

    <div id="info-display" style="font-size: 13px; background: rgba(255,255,255,0.5); padding: 10px; border-radius: 8px; margin-bottom: 10px; line-height: 1.6;">
        </div>

    <label style="font-size: 11px; font-weight: bold; color: var(--primary);">HỌ VÀ TÊN (KIỂM TRA & SỬA NẾU SAI):</label>
    <input type="text" id="editName">
    
    <button class="btn" style="background:var(--success); color:white;" onclick="saveFinal()">XÁC NHẬN ĐIỂM DANH</button>
</div>

<script>
    // Cập nhật hàm searchStudent để hiển thị chi tiết
    async function searchStudent() {
        const stt = document.getElementById('inputSTT').value;
        const snap = await db.ref('master_list/' + stt).once('value');
        const s = snap.val();
        
        if(s) {
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
            
            // Hiển thị các thông tin từ danh sách của anh để học viên đối soát
            document.getElementById('info-display').innerHTML = `
                <b>Ngày sinh:</b> ${s.dob || '...'} <br>
                <b>Đơn vị:</b> ${s.department || '...'} <br>
                <b>Công ty:</b> ${s.company || '...'} <br>
                <b>Chức danh:</b> ${s.position || '...'}
            `;
            document.getElementById('editName').value = s.name;
            
            // Lưu tạm các thông tin khác để khi ghi vào 'students' không bị mất
            window.currentStudentData = s; 
        } else {
            alert("Không tìm thấy STT " + stt + " trong danh sách!");
        }
    }

    // Cập nhật hàm saveFinal để lưu đầy đủ các cột
    async function saveFinal() {
        const name = document.getElementById('editName').value;
        const video = document.getElementById('video');
        const snap = document.createElement('canvas');
        snap.width = 450; snap.height = 600;
        const ctx = snap.getContext('2d');
        const vW = video.videoWidth, vH = video.videoHeight;
        const sW = vH * (0.75), sx = (vW - sW) / 2;
        ctx.drawImage(video, sx, 0, sW, vH, 0, 0, 450, 600);

        // Hợp nhất dữ liệu gốc và dữ liệu mới
        const finalData = {
            ...window.currentStudentData, // Lấy lại các cột dob, position, company...
            name: name,
            descriptor: Array.from(lastDescriptor),
            photo: snap.toDataURL('image/jpeg', 0.8),
            checkinTime: new Date().toLocaleString('vi-VN')
        };

        await db.ref('students/' + finalData.stt).set(finalData);
        showResult(finalData);
    }
</script>
