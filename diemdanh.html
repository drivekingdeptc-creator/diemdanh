<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPC - Face ID Check-in</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #eef2f7; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #video-container { position: relative; margin: 15px 0; border-radius: 10px; overflow: hidden; background: #000; line-height: 0; }
        video { width: 100%; height: auto; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        .input-group { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loader { color: #555; font-size: 14px; margin-bottom: 10px; }
        .success-msg { color: #28a745; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #0056b3; margin-bottom: 5px;">HỆ THỐNG ĐIỂM DANH</h2>
    <p style="font-size: 14px; color: #666;">Dành cho lớp học ngày 21/04 - HEPC</p>

    <div id="loader">🚀 Đang khởi tạo AI (Chỉ tải lần đầu)...</div>

    <div class="input-group">
        <input type="text" id="stt" placeholder="Số thứ tự (STT)">
    </div>
    <div class="input-group">
        <input type="text" id="fullname" placeholder="Họ và tên học viên">
    </div>

    <div id="video-container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <button id="btnAction" disabled onclick="processEnrollment()">XÁC NHẬN ĐĂNG KÝ</button>
    <p id="statusText" style="margin-top:10px; font-weight:500;"></p>
    <div id="successMsg" class="success-msg">✅ Đã lưu thông tin xác thực!</div>
</div>

<script>
    const video = document.getElementById('video');
    const btnAction = document.getElementById('btnAction');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('statusText');

    // 1. Khởi tạo và tải Model (Sẽ được trình duyệt Cache)
    async function init() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            loader.innerText = "⚡ AI đã sẵn sàng!";
            startCamera();
        } catch (err) {
            loader.innerText = "❌ Lỗi tải Model. Kiểm tra kết nối mạng!";
        }
    }

    // 2. Mở Camera học viên
    function startCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                detectFace();
            })
            .catch(err => alert("Không thể mở Camera: " + err));
    }

    // 3. Nhận diện khuôn mặt liên tục tại điện thoại
    async function detectFace() {
        const canvas = document.getElementById('overlay');
        const displaySize = { width: video.clientWidth, height: video.clientHeight };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                        .withFaceLandmarks()
                                        .withFaceDescriptor();

            if (detections) {
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
                
                statusText.innerText = "🎯 Đã nhận diện khuôn mặt!";
                statusText.style.color = "green";
                btnAction.disabled = false;
                window.lastDescriptor = detections.descriptor; // Lưu lại chuỗi số
            } else {
                statusText.innerText = "🔍 Hãy đưa mặt vào khung hình...";
                statusText.style.color = "orange";
                btnAction.disabled = true;
            }
        }, 500);
    }

    // 4. Gửi chuỗi số (Vector) về GAS
    function processEnrollment() {
        const stt = document.getElementById('stt').value;
        const name = document.getElementById('fullname').value;

        if (!stt || !name) {
            alert("Vui lòng nhập đủ STT và Tên!");
            return;
        }

        btnAction.innerText = "Đang lưu...";
        btnAction.disabled = true;

        // Chụp ảnh nhỏ để làm ảnh đại diện (Preview)
        const snap = document.createElement('canvas');
        snap.width = 160; snap.height = 120;
        snap.getContext('2d').drawImage(video, 0, 0, 160, 120);

        const data = {
            stt: stt,
            name: name,
            descriptor: Array.from(window.lastDescriptor), // Gửi chuỗi 128 số
            image: snap.toDataURL('image/jpeg', 0.7)
        };

        // Gửi về Google Apps Script
        google.script.run.withSuccessHandler(() => {
            document.getElementById('successMsg').style.display = 'block';
            btnAction.innerText = "HOÀN TẤT";
        }).saveData(data);
    }

    init();
</script>
</body>
</html>
