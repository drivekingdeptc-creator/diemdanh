<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEPC AI - VDC SAFETY v1.3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        /* CSS giữ nguyên như bản v1.2.1 của anh */
        :root { --primary: #004085; --success: #155724; --bg: #e9ecef; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; text-align: center; }
        .app-container { max-width: 420px; width: 100%; background: white; border-radius: 20px; padding: 20px; margin: auto; box-sizing: border-box; }
        #video-container { position: relative; width: 260px; height: 347px; margin: auto; background: #000; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .face-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 80%); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .info-box { background: #fff3cd; padding: 15px; border-radius: 10px; text-align: left; margin-top: 15px; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="session-tag" style="font-size: 11px; background: #333; color: white; padding: 5px; border-radius: 5px; margin-bottom: 10px;">Đang tải phiên học...</div>
    <h3 style="color:var(--primary); margin: 5px 0;">HEPC SAFETY AI</h3>

    <div id="scanner-section">
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="face-guide"></div>
        </div>
        <p id="scan-status" style="font-weight:bold; margin: 10px 0;">Đang khởi tạo AI...</p>
        <button class="btn" id="btnCapture" style="background:var(--primary); color:white;" onclick="checkFace()" disabled>XÁC NHẬN KHUÔN MẶT</button>
    </div>

    <div id="search-section" style="display:none;">
        <p style="color:red; font-weight:bold;">⚠️ KHÔNG TÌM THẤY DỮ LIỆU MẶT</p>
        <input type="text" id="inputName" placeholder="Nhập chính xác Họ và Tên">
        <button class="btn" style="background:#555; color:white;" onclick="searchStudent()">TÌM THÔNG TIN</button>
    </div>

    <div id="verify-section" class="info-box" style="display:none;">
        <label>GIỚI TÍNH *</label><select id="c3"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
        <label>NGÀY SINH *</label><input type="date" id="c4">
        <label>BẬC AN TOÀN *</label><select id="c5"><option value="5/5">5/5</option><option value="4/5">4/5</option><option value="3/5">3/5</option><option value="2/5">2/5</option><option value="1/5">1/5</option></select>
        <label>CHỨC DANH *</label><input type="text" id="c6">
        <label>ĐƠN VỊ *</label><input type="text" id="c7">
        <button class="btn" style="background:var(--success); color:white;" onclick="saveFinal()">XÁC NHẬN THÔNG TIN</button>
    </div>

    <div id="result-screen" style="display:none;">
        <img id="res-photo" src="" style="width:150px; border-radius:10px;">
        <h3 id="res-name"></h3>
        <p id="res-msg" style="color:var(--success); font-weight:bold;"></p>
        <button class="btn" style="background:#eee;" onclick="location.reload()">TIẾP TỤC</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* ... copy config của anh ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting, faceMatcher, currentSession, currentStudent;

    async function init() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        
        // Lấy thông tin phiên học hiện tại từ Admin
        db.ref('current_session').on('value', snap => {
            currentSession = snap.val();
            if(currentSession) {
                document.getElementById('session-tag').innerText = `Lớp: ${currentSession.class} | Buổi: ${currentSession.session}`;
            }
        });

        startCamera();
        loadFaceDB();
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
        isDetecting = true;
        document.getElementById('video').onplay = () => {
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptor();
                if(det) {
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                    document.getElementById('scan-status').innerText = "✅ SẴN SÀNG";
                }
            }, 500);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref('students').once('value'); // Dùng làm kho lưu descriptor chung
        const data = snap.val() || {};
        const labeled = Object.values(data).map(u => new faceapi.LabeledFaceDescriptors(u.stt, [new Float32Array(u.descriptor)]));
        if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
    }

    async function checkFace() {
        if(faceMatcher && lastDescriptor) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                // Kiểm tra xem người này có trong lớp đang học không
                const snap = await db.ref(`master_list/${currentSession.location}/${currentSession.class}/${match.label}`).once('value');
                if(snap.val()) {
                    currentStudent = snap.val();
                    return saveAttendance(currentStudent);
                }
            }
        }
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('search-section').style.display = 'block';
    }

    async function searchStudent() {
        const name = document.getElementById('inputName').value.trim().toLowerCase();
        const snap = await db.ref(`master_list/${currentSession.location}/${currentSession.class}`).once('value');
        const list = snap.val() || {};
        const found = Object.values(list).find(u => u.name.toLowerCase() === name);
        
        if(found) {
            currentStudent = found;
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
            document.getElementById('c3').value = found.gender || "Nam";
            document.getElementById('c6').value = found.position || "";
            document.getElementById('c7').value = found.department || "";
        } else {
            alert(`Bạn không là học viên của lớp ${currentSession.class}!`);
        }
    }

    async function saveFinal() {
        const v4 = document.getElementById('c4').value;
        if(!v4) return alert("Vui lòng chọn Ngày sinh!");
        
        // Cập nhật descriptor vào kho chung và điểm danh vào buổi học
        const snap = document.createElement('canvas');
        snap.width = 450; snap.height = 600;
        snap.getContext('2d').drawImage(video, 0, 0, 450, 600);
        const photo = snap.toDataURL('image/jpeg', 0.8);

        const data = {
            ...currentStudent,
            gender: document.getElementById('c3').value,
            dob: v4,
            rank: document.getElementById('c5').value,
            position: document.getElementById('c6').value,
            department: document.getElementById('c7').value,
            descriptor: Array.from(lastDescriptor),
            photo: photo,
            time: new Date().toLocaleTimeString('vi-VN')
        };
        
        // Lưu Descriptor chung để lần sau nhận diện được ngay
        await db.ref('students/' + data.stt).set(data);
        saveAttendance(data);
    }

    async function saveAttendance(student) {
        const path = `attendance/${currentSession.date}/${currentSession.session}/${student.stt}`;
        await db.ref(path).set({
            name: student.name,
            time: new Date().toLocaleTimeString('vi-VN'),
            photo: student.photo || ""
        });
        showResult(student);
    }

    function showResult(user) {
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('verify-section').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-name').innerText = user.name.toUpperCase();
        document.getElementById('res-photo').src = user.photo || "";
        document.getElementById('res-msg').innerText = `✅ Đã ghi nhận buổi ${currentSession.session}`;
    }

    init();
</script>
</body>
</html>
