<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPC - VDC Face ID v1.0.8</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 420px; width: 100%; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; text-align: center; }
        #video-container { position: relative; width: 240px; height: 320px; margin: 15px auto; background: #000; border-radius: 15px; overflow: hidden; border: 4px solid var(--primary); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; text-transform: uppercase; }
        #btnCapture { background: var(--primary); color: white; }
        input { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        .form-verify { display: none; margin-top: 15px; text-align: left; }
        .result-card { display: none; background: #fff; border: 3px solid var(--success); border-radius: 20px; padding: 20px; }
        #res-photo { width: 150px; height: 200px; object-fit: cover; border-radius: 10px; border: 3px solid #eee; }
        footer { margin-top: 20px; font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 style="color: var(--primary); margin-bottom:5px;">HEPC SAFETY AI</h2>
    
    <div id="scanner-section">
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
        <p id="scan-status" style="font-weight:bold;">Đang tải AI...</p>
        <button class="btn" id="btnCapture" onclick="checkFace()" disabled>XÁC NHẬN KHUÔN MẶT</button>
    </div>

    <div id="search-section" style="display:none; margin-top:15px;">
        <p style="color:red; font-weight:bold;">CHƯA CÓ DỮ LIỆU KHUÔN MẶT</p>
        <input type="number" id="inputSTT" placeholder="Nhập Số Thứ Tự (STT)">
        <button class="btn" style="background:#555; color:white;" onclick="searchStudent()">TÌM THÔNG TIN</button>
    </div>

    <div id="verify-section" class="form-verify">
        <label style="font-size:12px; font-weight:bold;">HỌ VÀ TÊN (KIỂM TRA & SỬA NẾU SAI):</label>
        <input type="text" id="editName">
        <button class="btn" style="background:var(--success); color:white;" onclick="saveFinal()">XÁC NHẬN ĐIỂM DANH</button>
    </div>

    <div id="result-screen" class="result-card">
        <img id="res-photo" src="">
        <h3 id="res-name" style="margin:10px 0 5px 0;"></h3>
        <p id="res-stt" style="font-weight:bold; color:#666;"></p>
        <div style="color:var(--success); font-weight:bold;">✅ ĐÃ LƯU HỆ THỐNG</div>
        <button class="btn" style="background:#eee;" onclick="location.reload()">TIẾP TỤC</button>
    </div>
</div>

<footer>
    Phát triển bởi <strong>Mr. An Toàn (Trần Công Đẹp)</strong> | v1.0.8
</footer>

<script>
    // Cấu hình Firebase (Giữ nguyên của anh)
    const firebaseConfig = { /* ... copy config của anh vào đây ... */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting = true, faceMatcher;

    async function init() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
        ]);
        startCamera();
        loadFaceDB();
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.getElementById('video');
        video.srcObject = stream;
        video.onplay = () => {
            const canvas = document.getElementById('overlay');
            faceapi.matchDimensions(canvas, { width: 240, height: 320 });
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                if(det) {
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                    document.getElementById('scan-status').innerText = "✅ SẴN SÀNG";
                }
            }, 500);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref('students').once('value');
        const data = snap.val();
        if(data) {
            const labeled = Object.values(data).filter(u => u.descriptor).map(u => 
                new faceapi.LabeledFaceDescriptors(u.stt.toString(), [new Float32Array(u.descriptor)])
            );
            if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
        }
    }

    async function checkFace() {
        if(faceMatcher) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                const snap = await db.ref('students/' + match.label).once('value');
                return showResult(snap.val());
            }
        }
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('search-section').style.display = 'block';
    }

    async function searchStudent() {
        const stt = document.getElementById('inputSTT').value;
        const snap = await db.ref('master_list/' + stt).once('value');
        const student = snap.val();
        if(student) {
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
            document.getElementById('editName').value = student.name;
        } else {
            alert("Không tìm thấy STT này trong danh sách lớp!");
        }
    }

    async function saveFinal() {
        const stt = document.getElementById('inputSTT').value;
        const name = document.getElementById('editName').value;
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 600;
        canvas.getContext('2d').drawImage(video, 0, 0, 450, 600); // Tạm thời dùng draw cơ bản, anh có thể thay bằng Center Crop v1.0.7

        const userData = {
            stt: stt,
            name: name,
            descriptor: Array.from(lastDescriptor),
            photo: canvas.toDataURL('image/jpeg', 0.8),
            time: new Date().toLocaleString()
        };
        await db.ref('students/' + stt).set(userData);
        showResult(userData);
    }

    function showResult(user) {
        isDetecting = false;
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('verify-section').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-name').innerText = user.name.toUpperCase();
        document.getElementById('res-stt').innerText = "STT: " + user.stt;
        document.getElementById('res-photo').src = user.photo;
    }

    init();
</script>
</body>
</html>
