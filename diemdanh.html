<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC - ĐIỂM DANH v1.3.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #004085; --success: #155724; --bg: #e9ecef; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .app-container { max-width: 420px; width: 100%; background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        #video-container { position: relative; width: 260px; height: 347px; margin: 10px auto; background: #000; border-radius: 15px; overflow: hidden; border: 4px solid #fff; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .face-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 80%); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; margin-top: 10px; font-size: 16px; }
        .form-verify { display: none; text-align: left; background: #fff3cd; padding: 15px; border-radius: 12px; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .result-card { display: none; padding: 20px; border: 3px solid var(--success); border-radius: 20px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="session-info" style="font-size: 11px; background: #333; color: #fff; padding: 8px; border-radius: 8px; margin-bottom: 10px; line-height: 1.4;">Đang tải...</div>
    
    <div id="scanner-section">
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
            <div class="face-guide"></div>
        </div>
        <p id="scan-status" style="font-weight:bold; margin: 10px 0;">Đang khởi tạo AI...</p>
        <button class="btn" id="btnCapture" style="background:var(--primary); color:white;" onclick="checkFace()" disabled>XÁC NHẬN KHUÔN MẶT</button>
    </div>

    <div id="search-section" style="display:none;">
        <p style="color:red; font-weight:bold;">⚠️ KHÔNG TÌM THẤY DỮ LIỆU MẶT</p>
        <input type="text" id="inputName" placeholder="Nhập Họ và Tên của bạn">
        <button class="btn" style="background:#555; color:white;" onclick="searchStudent()">TÌM THÔNG TIN</button>
    </div>

    <div id="verify-section" class="form-verify">
        <label style="font-size:11px;">GIỚI TÍNH *</label><select id="c3"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
        <label style="font-size:11px;">NGÀY SINH *</label><input type="date" id="c4">
        <label style="font-size:11px;">BẬC AN TOÀN *</label><select id="c5"><option value="5/5">5/5</option><option value="4/5">4/5</option><option value="3/5">3/5</option><option value="2/5">2/5</option><option value="1/5">1/5</option></select>
        <label style="font-size:11px;">CHỨC DANH *</label><input type="text" id="c6">
        <label style="font-size:11px;">ĐƠN VỊ *</label><input type="text" id="c7">
        <button class="btn" style="background:var(--success); color:white;" onclick="saveFinal()">XÁC NHẬN THÔNG TIN</button>
    </div>

    <div id="result-screen" class="result-card">
        <img id="res-photo" src="" style="width:150px; border-radius:10px; border:3px solid #eee;">
        <h3 id="res-name" style="margin:10px 0;"></h3>
        <p id="res-msg" style="color:var(--success); font-weight:bold; font-size:14px;"></p>
        <button class="btn" style="background:#eee;" onclick="location.reload()">TIẾP TỤC</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting, faceMatcher, session, student;

    async function init() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri(URL),
            faceapi.nets.faceLandmark68Net.loadFromUri(URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(URL)
        ]);
        
        db.ref('current_session').on('value', snap => {
            session = snap.val();
            if(session) {
                document.getElementById('session-info').innerHTML = `ĐỊA ĐIỂM: ${session.location}<br>LỚP: ${session.class} | BUỔI: ${session.session}`;
            }
        });

        startCamera();
        loadFaceDB();
    }

    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
        isDetecting = true;
        document.getElementById('video').onplay = () => {
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceDescriptor();
                if(det) {
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                    document.getElementById('scan-status').innerText = "✅ SẴN SÀNG";
                }
            }, 500);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref('students').once('value');
        const data = snap.val() || {};
        const labeled = Object.values(data).map(u => new faceapi.LabeledFaceDescriptors(u.stt, [new Float32Array(u.descriptor)]));
        if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
    }

    async function checkFace() {
        if(faceMatcher && lastDescriptor) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                const snap = await db.ref(`master_list/${session.location}/${session.class}/${match.label}`).once('value');
                if(snap.val()) return saveAttendance(snap.val());
            }
        }
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('search-section').style.display = 'block';
    }

    async function searchStudent() {
        const name = document.getElementById('inputName').value.trim().toLowerCase();
        const snap = await db.ref(`master_list/${session.location}/${session.class}`).once('value');
        const list = snap.val() || {};
        const found = Object.values(list).find(u => u.name.toLowerCase() === name);
        if(found) {
            student = found;
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
            document.getElementById('c3').value = found.gender || "Nam";
            document.getElementById('c6').value = found.position || "";
            document.getElementById('c7').value = found.department || "";
        } else {
            alert(`Bạn không có tên trong danh sách lớp ${session.class} tại địa điểm này!`);
        }
    }

    async function saveFinal() {
        const v4 = document.getElementById('c4').value;
        if(!v4) return alert("Vui lòng nhập Ngày sinh!");
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 600;
        canvas.getContext('2d').drawImage(video, 0, 0, 450, 600);
        const data = {
            ...student,
            gender: document.getElementById('c3').value,
            dob: v4, rank: document.getElementById('c5').value,
            position: document.getElementById('c6').value,
            department: document.getElementById('c7').value,
            descriptor: Array.from(lastDescriptor),
            photo: canvas.toDataURL('image/jpeg', 0.8),
            time: new Date().toLocaleTimeString('vi-VN')
        };
        await db.ref('students/' + data.stt).set(data);
        saveAttendance(data);
    }

    async function saveAttendance(st) {
        const path = `attendance/${session.date}/${session.session}/${st.stt}`;
        const record = { name: st.name, time: new Date().toLocaleTimeString('vi-VN'), photo: st.photo || "" };
        await db.ref(path).set(record);
        
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('verify-section').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-name').innerText = st.name.toUpperCase();
        document.getElementById('res-photo').src = record.photo;
        document.getElementById('res-msg').innerText = `✅ Đã điểm danh buổi ${session.session}`;
    }

    init();
</script>
</body>
</html>
