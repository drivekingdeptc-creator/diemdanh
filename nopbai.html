<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - NỘP BÀI NHANH v2.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 95%; max-width: 420px; background: white; border-radius: 35px; box-shadow: 0 15px 45px rgba(0,0,0,0.12); overflow: hidden; max-height: 98vh; display: flex; flex-direction: column; }
        #video-container { position: relative; width: 100%; height: 300px; margin: 10px auto; background: #000; border-radius: 20px; overflow: hidden; border: 4px solid #fff; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn-vdc { background: #1e293b; color: white; transition: 0.3s; }
        .btn-vdc:disabled { opacity: 0.3; }
        .input-vdc { border: 2px solid #e2e8f0; border-radius: 15px; padding: 12px; font-weight: 900; text-align: center; font-size: 1.2rem; color: #1e293b; outline: none; transition: 0.3s; }
        .input-vdc:focus { border-color: #3b82f6; background: #eff6ff; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="session-info" class="bg-slate-900 text-white p-3 text-[10px] text-center font-black uppercase tracking-widest text-blue-400 font-mono italic">Hệ thống nộp bài VDC</div>

    <div class="p-6 text-center flex-1 flex flex-col justify-between">
        
        <div id="search-section" class="space-y-6">
            <div class="space-y-2">
                <h1 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Nộp bài kiểm tra</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">Vui lòng nhập số thứ tự trong danh sách</p>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="number" id="inputSTT" class="input-vdc" placeholder="STT CỦA ANH/CHỊ" oninput="fetchName(this.value)">
                <div id="name-display" class="hidden p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl animate-pulse">
                    <p class="text-[10px] text-blue-400 font-black uppercase tracking-widest">Học viên xác nhận:</p>
                    <p id="student-name" class="text-lg font-black text-blue-700 uppercase tracking-tighter"></p>
                </div>
            </div>

            <button id="btnGoToCapture" onclick="showCapture()" disabled class="btn-vdc w-full py-5 rounded-[2rem] font-black text-lg uppercase shadow-2xl">Bắt đầu chụp bài</button>
        </div>

        <div id="capture-section" class="hidden space-y-4">
            <div class="flex justify-between items-center px-2">
                <span class="text-[10px] font-black text-slate-400 uppercase">Chụp ảnh bài làm</span>
                <span id="display-stt" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black">STT: --</span>
            </div>
            
            <div id="video-container">
                <video id="videoExam" autoplay muted playsinline></video>
            </div>
            
            <p class="text-[9px] text-slate-400 font-bold italic">Hãy canh bài thi nằm gọn trong khung hình và rõ nét</p>
            
            <div class="space-y-3">
                <button onclick="takePhoto()" class="bg-blue-600 text-white w-full py-5 rounded-[2.5rem] font-black text-xl uppercase shadow-2xl hover:bg-blue-700 transition-all">Nộp bài ngay</button>
                <button onclick="location.reload()" class="text-[10px] font-bold text-slate-400 uppercase underline">Quay lại nhập STT</button>
            </div>
        </div>

        <div id="result-section" class="hidden py-10 space-y-6">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto text-white text-3xl shadow-xl border-4 border-white"><i class="fas fa-check"></i></div>
            <div>
                <h2 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">Đã nộp bài xong!</h2>
                <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Anh/Chị có thể về chỗ hoặc thoát trình duyệt.</p>
            </div>
            <button onclick="location.reload()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Nộp cho người khác</button>
        </div>
    </div>
</div>

<footer class="mt-6 mb-4 text-[9px] text-slate-400 uppercase tracking-[0.3em] font-black">VDC Safety v2.1 | <span class="text-slate-800">Mr. An Toàn</span></footer>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLK_ZNVHoMTInV_Mo-_-q6fMUYlR1uLElrev9h-HwLXg70NVZDyX0veXPDmDmAVk/exec";
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let session, currentStudent, stream;

    // Lấy thông tin lớp học đang mở
    db.ref('current_session').on('value', snap => {
        session = snap.val();
        if(session) console.log("Lớp hiện tại: " + session.class);
    });

    async function fetchName(stt) {
        if(!stt || !session) return;
        const snap = await db.ref(`classes/${session.source}/students/${stt}`).once('value');
        const student = snap.val();
        
        const display = document.getElementById('name-display');
        const btn = document.getElementById('btnGoToCapture');
        
        if(student) {
            currentStudent = student;
            document.getElementById('student-name').innerText = student.name;
            display.classList.remove('hidden');
            btn.disabled = false;
        } else {
            display.classList.add('hidden');
            btn.disabled = true;
        }
    }

    async function showCapture() {
        document.getElementById('search-section').classList.add('hidden');
        document.getElementById('capture-section').classList.remove('hidden');
        document.getElementById('display-stt').innerText = "STT: " + currentStudent.stt;
        
        const video = document.getElementById('videoExam');
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    }

    async function takePhoto() {
        const video = document.getElementById('videoExam');
        const canvas = document.createElement('canvas');
        canvas.width = 600; canvas.height = 800;
        canvas.getContext('2d').drawImage(video, 0, 0, 600, 800);
        const photoData = canvas.toDataURL('image/jpeg', 0.8);
        
        // Hiện trạng thái đang xử lý
        document.getElementById('capture-section').innerHTML = `
            <div class="py-20 flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-blue-600 font-black text-sm uppercase italic">Đang nộp bài... Vui lòng đợi</p>
            </div>`;
        
        // 1. Gửi về Google Drive qua Apps Script
        const payload = {
            action: "saveToDrive",
            params: {
                folderId: session.storage_id,
                stt: currentStudent.stt,
                name: removeAccents(currentStudent.name),
                photoData: photoData
            }
        };

        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            
            // 2. Cập nhật Realtime Database để Admin thấy bài ngay
            const today = new Date().toISOString().slice(0,10);
            await db.ref(`submissions/${today}/${currentStudent.stt}`).set({
                name: currentStudent.name,
                stt: currentStudent.stt,
                photo_exam: photoData,
                timestamp: Date.now(),
                signed: false
            });

            // Tắt camera
            if(stream) stream.getTracks().forEach(track => track.stop());

            document.getElementById('capture-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
        } catch (e) {
            alert("Lỗi nộp bài: " + e.message);
            location.reload();
        }
    }

    function removeAccents(str) {
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
    }
</script>
</body>
</html>
