<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - NỘP BÀI THI</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .loading-ring { border: 2px solid #f3f3f3; border-top: 2px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md space-y-6">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black tracking-tighter uppercase">VDC Safety</h1>
            <p class="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Hệ thống nộp bài thi OSH</p>
        </div>

        <div class="glass p-8 rounded-[2.5rem] shadow-2xl space-y-6">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1">Số thứ tự của anh</label>
                <div class="relative">
                    <input type="number" id="stt-input" oninput="handleSTTInput(this.value)" 
                           class="w-full bg-slate-800/50 border-2 border-slate-700 rounded-2xl py-5 px-6 text-2xl font-black text-white focus:border-blue-500 focus:outline-none transition-all" 
                           placeholder="Nhập số STT...">
                    <div id="search-loading" class="absolute right-6 top-1/2 -translate-y-1/2 hidden">
                        <div class="loading-ring"></div>
                    </div>
                </div>
            </div>

            <div id="student-info" class="hidden animate-fadeIn">
                <div class="bg-blue-600/10 border border-blue-500/30 rounded-3xl p-6 space-y-1">
                    <p class="text-[9px] font-black text-blue-400 uppercase">Học viên xác nhận:</p>
                    <h2 id="display-name" class="text-xl font-black uppercase text-white leading-tight">---</h2>
                    <p id="display-unit" class="text-xs font-bold text-slate-400 italic">---</p>
                </div>
            </div>

            <div id="upload-zone" class="hidden space-y-6 animate-fadeIn">
                <div class="relative group">
                    <div id="preview-container" class="hidden">
                        <img id="photo-preview" class="w-full h-72 object-cover rounded-3xl border-2 border-blue-500 shadow-2xl">
                        <button onclick="resetPhoto()" class="absolute -top-3 -right-3 bg-red-500 w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-times text-white"></i></button>
                    </div>
                    
                    <label id="camera-label" class="flex flex-col items-center justify-center w-full h-72 border-2 border-dashed border-slate-700 rounded-3xl bg-slate-800/30 cursor-pointer hover:bg-slate-800/50 transition-all">
                        <i class="fas fa-camera text-4xl text-slate-600 mb-4"></i>
                        <span class="text-xs font-bold text-slate-500 uppercase">Chụp ảnh bài thi</span>
                        <input type="file" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this)">
                    </label>
                </div>

                <button id="submit-btn" onclick="submitExam()" class="w-full py-5 btn-gradient rounded-2xl font-black text-lg uppercase shadow-xl hover:scale-[1.02] active:scale-95 transition-all">
                    Nộp bài ngay
                </button>
            </div>
        </div>

        <p class="text-center text-slate-600 text-[10px] font-bold uppercase tracking-widest">© 2026 VDC SAFETY SYSTEM</p>
    </div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let searchTimeout = null;
    let selectedStudent = null;
    let base64Photo = null;

    // --- XỬ LÝ NHẬP STT (DEBOUNCE 500MS) ---
    function handleSTTInput(val) {
        document.getElementById('student-info').classList.add('hidden');
        document.getElementById('upload-zone').classList.add('hidden');
        document.getElementById('search-loading').classList.remove('hidden');

        if (searchTimeout) clearTimeout(searchTimeout);
        
        searchTimeout = setTimeout(() => {
            findStudent(val);
        }, 500); // Đợi học viên gõ xong 0.5s mới tìm
    }

    async function findStudent(stt) {
        document.getElementById('search-loading').classList.add('hidden');
        if (!stt) return;

        try {
            const sessionSnap = await db.ref('current_session').once('value');
            const session = sessionSnap.val();
            
            if (session && session.source) {
                const studentSnap = await db.ref(`classes/${session.source}/students/${stt}`).once('value');
                const student = studentSnap.val();

                if (student) {
                    selectedStudent = student;
                    document.getElementById('display-name').innerText = student.name;
                    document.getElementById('display-unit').innerText = student.department || student.company || 'Tự do';
                    document.getElementById('student-info').classList.remove('hidden');
                    document.getElementById('upload-zone').classList.remove('hidden');
                } else {
                    alert("⚠️ Không tìm thấy học viên số " + stt);
                }
            }
        } catch (e) {
            console.error(e);
        }
    }

    // --- XỬ LÝ ẢNH ---
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Photo = e.target.result;
                document.getElementById('photo-preview').src = e.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                document.getElementById('camera-label').classList.add('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function resetPhoto() {
        base64Photo = null;
        document.getElementById('preview-container').classList.add('hidden');
        document.getElementById('camera-label').classList.remove('hidden');
    }

    // --- NỘP BÀI ---
    async function submitExam() {
        if (!base64Photo) return alert("Vui lòng chụp ảnh bài thi!");
        
        const btn = document.getElementById('submit-btn');
        btn.innerText = "ĐANG GỬI BÀI...";
        btn.disabled = true;

        const today = new Date().toISOString().slice(0,10);
        const submission = {
            stt: selectedStudent.stt,
            name: selectedStudent.name,
            dob: selectedStudent.dob || '',
            unit: selectedStudent.department || '',
            photo_exam: base64Photo,
            timestamp: Date.now(),
            signed: false,
            status: 'pending'
        };

        try {
            await db.ref(`submissions/${today}/${selectedStudent.stt}`).set(submission);
            alert("✅ Đã nộp bài thành công! Vui lòng chờ thầy gọi tên để ký xác nhận.");
            location.reload();
        } catch (e) {
            alert("Lỗi nộp bài: " + e.message);
            btn.innerText = "Nộp bài ngay";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
