<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY - NỘP BÀI THEO STT</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0g2jxFOY5KQGZeZWyJf0SDxA91sitpxE",
            authDomain: "chamdiemonline-898b1.firebaseapp.com",
            projectId: "chamdiemonline-898b1",
            databaseURL: "https://chamdiemonline-898b1-default-rtdb.firebaseio.com/",
            appId: "1:1073615877091:web:b70fa88f2cf740085fe6d6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentClassData = null;
        let currentFolderId = "";
        let typingTimer;

        // 1. LẤY THÔNG TIN LỚP ĐANG MỞ TỪ FIREBASE
        onValue(ref(db, 'control'), (snap) => {
            const ctrl = snap.val();
            if (ctrl && ctrl.status === "running") {
                currentFolderId = ctrl.current_folder_id;
                // Lấy danh sách học viên của lớp này
                get(ref(db, `current_results/${ctrl.current_folder_name}`)).then((s) => {
                    currentClassData = s.val();
                });
            }
        });

        // 2. XỬ LÝ NHẬP STT VỚI KHOẢNG TRỄ 1.5S
        window.handleSTTInput = function() {
            clearTimeout(typingTimer);
            const stt = document.getElementById('sttInput').value;
            const area = document.getElementById('displayArea');
            area.style.display = 'none';
            document.getElementById('uploadSection').style.display = 'none';

            if (stt && currentClassData) {
                document.getElementById('loader').style.display = 'block';
                typingTimer = setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    if (currentClassData[stt]) {
                        document.getElementById('studentName').innerText = currentClassData[stt].name;
                        area.style.display = 'block';
                    } else {
                        alert("Không tìm thấy học viên có STT này trong lớp hiện tại!");
                    }
                }, 1500);
            }
        };

        window.showUpload = function() {
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('confirmBtn').style.display = 'none';
            document.getElementById('sttInput').disabled = true;
        };

        window.performUpload = function() {
            const file = document.getElementById('fileInput').files[0];
            const stt = document.getElementById('sttInput').value;
            const name = document.getElementById('studentName').innerText;
            if(!file) return alert("Vui lòng chọn ảnh bài làm!");

            const fileName = `${stt}_${name}.jpg`;
            const reader = new FileReader();
            reader.onload = (e) => {
                const btn = document.getElementById('btnSubmit');
                btn.innerText = "⏳ Đang nộp bài...";
                btn.disabled = true;
                google.script.run.withSuccessHandler(msg => {
                    alert(msg);
                    window.location.reload();
                }).handleFileUpload(e.target.result, fileName, currentFolderId);
            };
            reader.readAsDataURL(file);
        };
    </script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        input[type="number"] { width: 70%; padding: 15px; font-size: 30px; text-align: center; border: 2px solid #e2e8f0; border-radius: 15px; margin-bottom: 10px; }
        .student-box { background: #ebf8ff; padding: 20px; border-radius: 15px; margin-top: 15px; border: 1px solid #bee3f8; }
        .btn-green { background: #38a169; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-blue { background: #3182ce; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
        .loader { display: none; margin: 10px auto; border: 3px solid #f3f3f3; border-top: 3px solid #3182ce; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#2d3748; margin-bottom:10px;">VDC SAFETY</h2>
        <p style="color:#718096; font-size:14px;">Nhập số thứ tự để nộp bài</p>
        
        <input type="number" id="sttInput" placeholder="00" oninput="handleSTTInput()">
        <div id="loader" class="loader"></div>

        <div id="displayArea" style="display:none;" class="student-box">
            <p style="margin:0; color:#4a5568;">Bạn là học viên:</p>
            <h3 id="studentName" style="color:#2b6cb0; margin:10px 0;">...</h3>
            <button id="confirmBtn" class="btn-green" onclick="showUpload()">ĐÚNG, LÀ TÔI</button>
        </div>

        <div id="uploadSection" style="display:none;">
            <input type="file" id="fileInput" accept="image/*" style="margin:15px 0;">
            <button id="btnSubmit" class="btn-blue" onclick="performUpload()">🚀 XÁC NHẬN NỘP BÀI</button>
        </div>
    </div>
</body>
</html>
