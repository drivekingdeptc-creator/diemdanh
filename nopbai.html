<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - NỘP BÀI NHANH</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .app-card { max-width: 450px; margin: auto; background: white; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); overflow: hidden; }
        .step-inactive { display: none; }
        .input-vdc { background: #f1f5f9; border: 2px solid transparent; transition: 0.3s; }
        .input-vdc:focus { border-color: #3b82f6; background: white; outline: none; }
        .btn-primary { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; }
        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

<div class="app-card w-full">
    <div class="bg-slate-900 p-6 text-center">
        <div class="flex justify-center items-center gap-2 mb-1">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-sm">V</div>
            <h1 class="text-white font-black text-xl uppercase tracking-tighter">VDC Safety</h1>
        </div>
        <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.2em]">Hệ thống nộp bài v3.2</p>
    </div>

    <div class="p-8">
        <div id="step-1" class="text-center">
            <i class="fas fa-user-circle text-5xl text-slate-200 mb-4"></i>
            <h2 class="text-sm font-black text-slate-800 uppercase mb-6">Nhập Số Thứ Tự (STT)</h2>
            
            <input type="number" id="input-stt" placeholder="VÍ DỤ: 15" 
                   class="w-full p-5 input-vdc rounded-2xl text-center text-3xl font-black text-slate-800 mb-4"
                   oninput="lookupStudent(this.value)">

            <div id="student-info" class="hidden bg-blue-50 p-5 rounded-2xl border border-blue-100 mb-6 animate-fadeIn">
                <p class="text-[10px] text-blue-600 font-black uppercase mb-1">Xác nhận có phải anh/chị:</p>
                <p id="student-name" class="text-xl font-black text-slate-800 uppercase leading-tight"></p>
                <p id="student-detail" class="text-[10px] text-slate-400 font-bold mt-1 uppercase"></p>
            </div>

            <button id="btn-next-1" disabled onclick="goToStep2()" 
                    class="w-full py-5 btn-primary rounded-2xl font-black uppercase shadow-xl opacity-30 transition-all">
                Đúng là tôi, tiếp tục
            </button>
        </div>

        <div id="step-2" class="step-inactive text-center">
            <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Chụp ảnh phiếu bài làm</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-6 uppercase tracking-wider">Lưu ý: Chụp rõ nét, không bị lóa sáng</p>
            
            <div id="preview-container" onclick="document.getElementById('file-input').click()" 
                 class="relative rounded-3xl overflow-hidden bg-slate-50 border-2 border-dashed border-slate-200 mb-8 cursor-pointer min-h-[250px] flex items-center justify-center">
                <img id="exam-preview" class="hidden w-full h-auto">
                <div id="placeholder-icon" class="text-slate-300 flex flex-col items-center">
                    <i class="fas fa-camera text-6xl mb-3"></i>
                    <span class="text-[10px] font-black uppercase">Bấm để mở camera</span>
                </div>
            </div>

            <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden" onchange="processPhoto(this)">
            
            <button id="btn-submit" disabled onclick="finalSubmit()" 
                    class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-2xl opacity-30 pulse-blue">
                Gửi bài thi ngay
            </button>
            <button onclick="location.reload()" class="mt-6 text-slate-400 font-bold text-[10px] uppercase underline">Quay lại nhập STT</button>
        </div>

        <div id="step-3" class="step-inactive text-center py-10">
            <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-4xl shadow-2xl animate-bounce">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-2">Thành công!</h2>
            <p class="text-slate-500 text-xs font-bold px-6 leading-relaxed uppercase">Bài thi của anh/chị đã được gửi.<br>Mời lên bàn giảng viên để ký tên.</p>
            <button onclick="location.reload()" class="mt-10 py-3 px-8 bg-slate-100 rounded-xl text-slate-600 font-black uppercase text-[10px]">Nộp bài khác</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentStudent = null;
    let compressedPhoto = null;

    // 1. TÌM KIẾM HỌC VIÊN THEO STT
    async function lookupStudent(stt) {
        if (!stt) { hideStudent(); return; }
        
        // Lấy thông tin phiên làm việc hiện tại
        const sessionSnap = await db.ref('current_session').once('value');
        const session = sessionSnap.val();
        if (!session) return;

        // Truy vấn học viên từ đúng lớp đang mở
        const studentSnap = await db.ref(`classes/${session.source}/students/${stt}`).once('value');
        const student = studentSnap.val();

        if (student) {
            currentStudent = student;
            document.getElementById('student-info').classList.remove('hidden');
            document.getElementById('student-name').innerText = student.name;
            document.getElementById('student-detail').innerText = `${student.dob} | ${student.department || student.company || ''}`;
            document.getElementById('btn-next-1').disabled = false;
            document.getElementById('btn-next-1').classList.remove('opacity-30');
        } else {
            hideStudent();
        }
    }

    function hideStudent() {
        document.getElementById('student-info').classList.add('hidden');
        document.getElementById('btn-next-1').disabled = true;
        document.getElementById('btn-next-1').classList.add('opacity-30');
        currentStudent = null;
    }

    // 2. CHUYỂN BƯỚC CHỤP ẢNH
    function goToStep2() {
        document.getElementById('step-1').classList.add('step-inactive');
        document.getElementById('step-2').classList.remove('step-inactive');
    }

    // 3. NÉN ẢNH VÀ PREVIEW
    function processPhoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // Nén về chiều ngang 1200px để Gemini đọc tốt nhất
                    const scale = 1200 / img.width;
                    canvas.width = 1200;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    compressedPhoto = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('exam-preview').src = compressedPhoto;
                    document.getElementById('exam-preview').classList.remove('hidden');
                    document.getElementById('placeholder-icon').classList.add('hidden');
                    document.getElementById('btn-submit').disabled = false;
                    document.getElementById('btn-submit').classList.remove('opacity-30');
                }
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 4. GỬI LÊN FIREBASE (QUEUE SYSTEM)
    async function finalSubmit() {
        const btn = document.getElementById('btn-submit');
        btn.innerText = "ĐANG GỬI...";
        btn.disabled = true;

        const today = new Date().toISOString().slice(0,10);
        const payload = {
            stt: currentStudent.stt,
            name: currentStudent.name,
            dob: currentStudent.dob,
            unit: currentStudent.department || currentStudent.company || '',
            photo_exam: compressedPhoto,
            timestamp: Date.now(),
            signed: false,
            status: "pending"
        };

        try {
            await db.ref(`submissions/${today}/${currentStudent.stt}`).set(payload);
            document.getElementById('step-2').classList.add('step-inactive');
            document.getElementById('step-3').classList.remove('step-inactive');
        } catch (error) {
            alert("Lỗi kết nối: " + error.message);
            btn.innerText = "THỬ LẠI";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
