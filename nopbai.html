<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - NỘP BÀI v2.1.1</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .app-container { width: 100%; height: 100vh; max-width: 450px; background: white; overflow: hidden; display: flex; flex-direction: column; }
        
        #video-container { position: relative; width: 90%; height: 60vh; max-height: 450px; margin: 10px auto; background: #000; border-radius: 24px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .input-vdc { border: 2.5px solid #e2e8f0; border-radius: 20px; padding: 18px; font-weight: 900; text-align: center; font-size: 1.5rem; color: #1e293b; outline: none; transition: 0.3s; background: #f8fafc; width: 100%; }
        .input-vdc:focus { border-color: #3b82f6; background: #fff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        
        .btn-main { background: #1e293b; color: white; border-radius: 24px; font-weight: 900; font-size: 1.1rem; padding: 22px; width: 100%; transition: 0.3s; box-shadow: 0 10px 25px rgba(30, 41, 59, 0.2); text-transform: uppercase; }
        .btn-main:disabled { background: #cbd5e1; box-shadow: none; transform: scale(0.98); }
        .btn-capture { background: #3b82f6; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="session-info" class="bg-slate-900 text-white p-3 text-[9px] text-center font-black uppercase tracking-[0.2em] border-b border-slate-700 italic text-blue-400">HỆ THỐNG NỘP BÀI VDC SAFETY</div>

    <div class="p-6 flex-1 flex flex-col justify-between overflow-y-auto">
        
        <div id="search-section" class="space-y-6 pt-4 fade-in">
            <div class="text-center space-y-2">
                <h1 class="text-2xl font-black text-slate-800 tracking-tighter uppercase">Xác nhận thông tin</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">Vui lòng nhập STT để tìm tên</p>
            </div>
            
            <div class="space-y-4">
                <input type="number" id="inputSTT" inputmode="numeric" class="input-vdc" placeholder="STT: 1, 2, 3..." oninput="fetchName(this.value)">
                
                <div id="name-display" class="hidden p-6 bg-blue-600 rounded-[2rem] shadow-xl transform scale-100 transition-all duration-300">
                    <p class="text-[9px] text-blue-100 font-black uppercase tracking-[0.2em] mb-1">Thí sinh nộp bài:</p>
                    <p id="student-name" class="text-xl font-black text-white uppercase tracking-tighter"></p>
                </div>
            </div>

            <button id="btnGoToCapture" onclick="showCapture()" disabled class="btn-main">Bắt đầu chụp bài</button>
        </div>

        <div id="capture-section" class="hidden space-y-4 fade-in">
            <div class="flex justify-between items-center px-1">
                <div class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-[10px] font-black uppercase" id="display-stt-name">--</div>
                <button onclick="location.reload()" class="text-[10px] font-black text-slate-400 uppercase underline">Đổi người</button>
            </div>
            
            <div id="video-container">
                <video id="videoExam" autoplay muted playsinline></video>
                <div class="absolute inset-0 border-[15px] border-black/20 pointer-events-none rounded-2xl"></div>
                <div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">
                    <i class="fas fa-expand text-6xl text-white"></i>
                </div>
            </div>
            
            <p class="text-[9px] text-center text-slate-400 font-bold italic uppercase px-4 leading-relaxed">Áp bài thi vào khung hình và đảm bảo chữ rõ nét trước khi chụp</p>
            
            <button onclick="takePhoto()" class="btn-main btn-capture">Chụp bài & Nộp ngay</button>
        </div>

        <div id="result-section" class="hidden py-10 space-y-8 fade-in">
            <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto text-white text-4xl shadow-2xl border-8 border-green-50 animate-bounce"><i class="fas fa-check"></i></div>
            <div class="text-center space-y-2">
                <h2 class="text-3xl font-black text-slate-800 uppercase tracking-tighter leading-none">Nộp bài xong!</h2>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest px-8">Hệ thống đã ghi nhận bài thi của anh/chị.</p>
            </div>
            <button onclick="location.reload()" class="btn-main bg-slate-900">Người tiếp theo</button>
        </div>
    </div>
</div>

<footer class="p-4 text-center text-[9px] text-slate-300 uppercase tracking-[0.3em] font-black">VDC SAFETY SYSTEM v2.1.1</footer>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxzLK_ZNVHoMTInV_Mo-_-q6fMUYlR1uLElrev9h-HwLXg70NVZDyX0veXPDmDmAVk/exec";
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let session, currentStudent, stream;

    // Tự động lấy lớp đang hoạt động
    db.ref('current_session').on('value', snap => { session = snap.val(); });

    async function fetchName(stt) {
        if(!stt || !session) return;
        const snap = await db.ref(`classes/${session.source}/students/${stt}`).once('value');
        const student = snap.val();
        
        const display = document.getElementById('name-display');
        const btn = document.getElementById('btnGoToCapture');
        
        if(student) {
            currentStudent = student;
            document.getElementById('student-name').innerText = student.name;
            display.classList.remove('hidden');
            btn.disabled = false;
            // Thu bàn phím trên mobile sau khi tìm thấy
            if(stt.length >= 2) document.getElementById('inputSTT').blur(); 
        } else {
            display.classList.add('hidden');
            btn.disabled = true;
        }
    }

    async function showCapture() {
        document.getElementById('search-section').classList.add('hidden');
        document.getElementById('capture-section').classList.remove('hidden');
        document.getElementById('display-stt-name').innerText = "STT: " + currentStudent.stt + " - " + currentStudent.name;
        
        const video = document.getElementById('videoExam');
        // Ép bật camera sau với độ phân giải tối ưu
        const constraints = { video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1440 } } };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
    }

    async function takePhoto() {
        const video = document.getElementById('videoExam');
        const canvas = document.createElement('canvas');
        // Tỉ lệ bài thi 3:4 chuẩn
        canvas.width = 900; canvas.height = 1200;
        canvas.getContext('2d').drawImage(video, 0, 0, 900, 1200);
        const photoData = canvas.toDataURL('image/jpeg', 0.7); // Nén nhẹ để nộp bài nhanh hơn
        
        // Trạng thái chờ
        document.body.innerHTML = `
            <div class="h-screen w-screen flex flex-col items-center justify-center bg-white p-10 text-center">
                <div class="w-16 h-16 border-8 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                <p class="text-blue-600 font-black text-xl uppercase italic tracking-tighter">Đang nộp bài...</p>
                <p class="text-[10px] text-slate-400 mt-2 font-bold">Vui lòng không đóng trình duyệt lúc này</p>
            </div>`;
        
        const payload = {
            action: "saveToDrive",
            params: {
                folderId: session.storage_id,
                stt: currentStudent.stt,
                name: removeAccents(currentStudent.name),
                photoData: photoData
            }
        };

        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
            const today = new Date().toISOString().slice(0,10);
            await db.ref(`submissions/${today}/${currentStudent.stt}`).set({
                name: currentStudent.name,
                stt: currentStudent.stt,
                photo_exam: photoData,
                timestamp: Date.now(),
                signed: false
            });

            if(stream) stream.getTracks().forEach(track => track.stop());
            location.reload(); // Tự động load lại để hiện màn hình thành công hoặc cho người tiếp theo
        } catch (e) {
            alert("Lỗi mạng! Vui lòng thử lại.");
            location.reload();
        }
    }

    function removeAccents(str) {
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D');
    }
</script>
</body>
</html>
