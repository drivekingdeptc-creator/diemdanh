<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPC - Nộp Bài Kiểm Tra</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #004a99; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 8px; background: #004a99; color: white; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class="card">
        <h2>HEPC - NỘP BÀI</h2>
        <label>Số thứ tự (STT):</label>
        <input type="number" id="stt" placeholder="Ví dụ: 15">
        
        <label>Họ và tên:</label>
        <input type="text" id="hoTen" placeholder="Nhập đầy đủ họ tên">
        
        <label>Chụp ảnh phiếu làm bài:</label>
        <input type="file" id="fileAnh" accept="image/*" capture="environment">
        
        <button id="btnNop" onclick="nopBai()">NỘP BÀI NGAY</button>
        <p id="status"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
            authDomain: "hepc-ed95d.firebaseapp.com",
            projectId: "hepc-ed95d",
            storageBucket: "hepc-ed95d.firebasestorage.app",
            messagingSenderId: "536861347284",
            appId: "1:536861347284:web:61d162705878577f741a41"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const storage = firebase.storage();

        async function nopBai() {
            const stt = document.getElementById('stt').value;
            const hoTen = document.getElementById('hoTen').value;
            const file = document.getElementById('fileAnh').files[0];
            const btn = document.getElementById('btnNop');
            const statusLabel = document.getElementById('status');

            if(!stt || !hoTen || !file) return alert("Vui lòng điền đủ thông tin!");

            btn.disabled = true;
            statusLabel.innerText = "⏳ Đang nén ảnh (vui lòng chờ)...";

            try {
                // Nén ảnh xuống còn ~800KB
                const compressedFile = await imageCompression(file, { maxSizeMB: 0.8, maxWidthOrHeight: 1920 });
                
                statusLabel.innerText = "🚀 Đang tải bài lên hệ thống...";
                const fileName = `bai_thi/${stt}_${Date.now()}.jpg`;
                const storageRef = storage.ref(fileName);
                await storageRef.put(compressedFile);
                const url = await storageRef.getDownloadURL();

                // Gửi dữ liệu vào Realtime Database
                await database.ref('danh_sach_nop/' + stt).set({
                    stt: parseInt(stt),
                    hoTen: hoTen,
                    urlAnh: url,
                    status: "cho_cham",
                    diem: "...",
                    thoiGian: new Date().toLocaleTimeString('vi-VN')
                });

                statusLabel.style.color = "green";
                statusLabel.innerText = "✅ ĐÃ NỘP BÀI THÀNH CÔNG!";
                alert("Hệ thống đã ghi nhận bài làm của bạn.");
            } catch (e) {
                statusLabel.innerText = "❌ Lỗi: " + e.message;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
