<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY - NỘP BÀI ONLINE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1a73e8; color: white; width: 100%; padding: 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Đồng bộ khung quét khuôn mặt tròn từ diemdanh.html */
        .camera-container { position: relative; width: 280px; height: 280px; margin-top: 30px; border-radius: 50%; overflow: hidden; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Hiệu ứng Radar quét */
        .scanner-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(26, 115, 232, 0.6); box-shadow: 0 0 15px #1a73e8; animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .status-msg { margin-top: 20px; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; background: #e8f0fe; color: #1a73e8; }
        
        /* Phần chọn file bài làm - ẩn đi cho đến khi nhận diện xong */
        .upload-section { display: none; width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input[type="file"] { width: 100%; padding: 10px; margin: 10px 0; }
        .btn-submit { background: #28a745; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">HỆ THỐNG NỘP BÀI VDC SAFETY</div>

    <div class="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanner-line"></div>
    </div>

    <div id="status" class="status-msg">🔍 Đang nhận diện khuôn mặt học viên...</div>

    <div id="uploadArea" class="upload-section">
        <h3 style="margin-top:0; color:#333;">Xác thực thành công!</h3>
        <p id="studentName" style="color:#666; font-size:14px;"></p>
        <label>Chọn ảnh bài làm (STT_HoTen_...):</label>
        <input type="file" id="fileInput" accept="image/*">
        <button class="btn-submit" onclick="uploadPaper()">🚀 NỘP BÀI NGAY</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const uploadArea = document.getElementById('uploadArea');

        // Mở Camera ngay khi load
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; setTimeout(captureAndVerify, 2000); })
        .catch(err => { status.innerText = "❌ Không thể mở Camera"; });

        function captureAndVerify() {
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64 = canvas.toDataURL('image/jpeg');
            
            // Gọi GAS để nhận diện (Đồng bộ logic diemdanh.html)
            google.script.run.withSuccessHandler(res => {
                if (res.verified) {
                    status.style.display = "none";
                    uploadArea.style.display = "block";
                    document.getElementById('studentName').innerText = "Chào bạn: " + res.name;
                    // Dừng camera để tiết kiệm pin
                    video.srcObject.getTracks().forEach(track => track.stop());
                } else {
                    status.innerText = "⚠️ Không khớp khuôn mặt, đang thử lại...";
                    setTimeout(captureAndVerify, 3000);
                }
            }).processFaceRecognition(base64);
        }

        function uploadPaper() {
            const file = document.getElementById('fileInput').files[0];
            if(!file) return alert("Vui lòng chọn ảnh bài làm!");
            
            status.style.display = "block";
            status.innerText = "📤 Đang tải bài làm lên hệ thống...";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                google.script.run.withSuccessHandler(msg => {
                    alert("✅ " + msg);
                    window.location.reload();
                }).handleFileUpload(e.target.result, file.name);
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
