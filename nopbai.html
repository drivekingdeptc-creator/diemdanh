<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - NỘP BÀI THI AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .app-card { max-width: 450px; margin: auto; background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        #video-preview { width: 100%; height: 250px; object-fit: cover; background: #000; border-radius: 20px; }
        .btn-primary { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; }
        .step-inactive { display: none; }
        .pulse-blue { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

<div class="app-card w-full">
    <div class="bg-slate-900 p-5 text-center">
        <div class="flex justify-center items-center gap-2 mb-1">
            <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center font-black text-white text-xs">V</div>
            <h1 class="text-white font-black text-lg uppercase tracking-tighter">VDC Safety AI</h1>
        </div>
        <p class="text-blue-400 text-[9px] font-bold uppercase tracking-widest italic">Hệ thống nộp bài thi v3.1 Lite</p>
    </div>

    <div class="p-6">
        <div id="step-1" class="text-center">
            <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Bước 1: Xác nhận danh tính</h2>
            <div class="relative mb-4">
                <video id="video" autoplay muted playsinline class="rounded-2xl border-4 border-white shadow-lg"></video>
                <div id="face-status" class="absolute bottom-4 left-1/2 -translate-x-1/2 px-4 py-1 bg-black/50 text-white text-[10px] rounded-full backdrop-blur-md">
                    🔍 ĐANG QUÉT KHUÔN MẶT...
                </div>
            </div>
            <div id="user-info" class="hidden bg-green-50 p-4 rounded-2xl border border-green-100 mb-4 animate-bounce">
                <p class="text-[10px] text-green-600 font-black uppercase">Chào anh/chị:</p>
                <p id="student-name" class="text-lg font-black text-slate-800 uppercase leading-none"></p>
            </div>
            <button id="btn-next-1" disabled onclick="goToStep2()" class="w-full py-4 btn-primary rounded-2xl font-black uppercase shadow-xl opacity-50">Tiếp theo: Chụp bài thi</button>
        </div>

        <div id="step-2" class="step-inactive text-center">
            <h2 class="text-sm font-black text-slate-800 uppercase mb-4">Bước 2: Chụp ảnh phiếu trả lời</h2>
            <p class="text-[10px] text-slate-400 font-bold mb-4 uppercase">Vuông góc, rõ nét và đủ ánh sáng</p>
            
            <div id="exam-capture-zone" class="relative rounded-2xl overflow-hidden bg-slate-100 border-2 border-dashed border-slate-300 mb-6">
                <img id="exam-preview" class="hidden w-full h-auto">
                <div id="camera-icon" class="py-20 text-slate-300">
                    <i class="fas fa-camera text-5xl"></i>
                </div>
            </div>

            <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden" onchange="previewExam(this)">
            
            <div class="flex gap-3">
                <button onclick="document.getElementById('file-input').click()" class="flex-1 py-4 bg-slate-100 text-slate-700 rounded-2xl font-black uppercase text-xs border">
                    <i class="fas fa-camera mr-2"></i> Chụp ảnh
                </button>
                <button id="btn-submit" disabled onclick="finalSubmit()" class="flex-[2] py-4 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl opacity-50 pulse-blue">
                    Nộp bài thi ngay
                </button>
            </div>
        </div>

        <div id="step-3" class="step-inactive text-center py-10">
            <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 text-white text-3xl shadow-2xl">
                <i class="fas fa-check"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-2">Đã gửi bài thi!</h2>
            <p class="text-slate-500 text-xs font-bold px-6 leading-relaxed uppercase">Mời anh/chị ngồi tại chỗ. <br> Chờ giảng viên gọi tên lên ký tên xác nhận.</p>
            <button onclick="location.reload()" class="mt-8 text-blue-600 font-black uppercase text-[10px] tracking-widest">Nộp bài khác</button>
        </div>
    </div>
</div>

<script>
    // CẤU HÌNH FIREBASE (Dùng lại config cũ của anh)
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentStudent = null;
    let examBase64 = null;

    // 1. KHỞI CHẠY FACE ID
    async function initFaceID() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        await Promise.all([
            faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
            faceapi.nets.faceRecognitionNet.loadFromUri(URL)
        ]);
        startCamera();
    }

    async function startCamera() {
        const video = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        
        // Mock nhận diện: Trong thực tế sẽ dùng hàm matchFace như file cũ
        // Ở đây giả định sau 3s sẽ tìm thấy học viên để anh test flow
        setTimeout(() => {
            currentStudent = { stt: "51", name: "Lê Nguyễn Huy Hùng", dob: "09011980" };
            document.getElementById('face-status').innerHTML = "✅ NHẬN DIỆN THÀNH CÔNG";
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('student-name').innerText = currentStudent.name;
            document.getElementById('btn-next-1').disabled = false;
            document.getElementById('btn-next-1').classList.remove('opacity-50');
        }, 3000);
    }

    // 2. XỬ LÝ CHỤP ẢNH BÀI THI
    function goToStep2() {
        document.getElementById('step-1').classList.add('step-inactive');
        document.getElementById('step-2').classList.remove('step-inactive');
    }

    function previewExam(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Nén ảnh bằng Canvas
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 1000; // Nén về chiều ngang 1000px
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    examBase64 = canvas.toDataURL('image/jpeg', 0.7); // Nén chất lượng 70%
                    document.getElementById('exam-preview').src = examBase64;
                    document.getElementById('exam-preview').classList.remove('hidden');
                    document.getElementById('camera-icon').classList.add('hidden');
                    document.getElementById('btn-submit').disabled = false;
                    document.getElementById('btn-submit').classList.remove('opacity-50');
                }
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 3. NỘP BÀI LÊN FIREBASE (HÀNG ĐỢI)
    async function finalSubmit() {
        const btn = document.getElementById('btn-submit');
        btn.innerText = "ĐANG GỬI...";
        btn.disabled = true;

        const timestamp = Date.now();
        const payload = {
            stt: currentStudent.stt,
            name: currentStudent.name,
            dob: currentStudent.dob,
            photo_exam: examBase64, // Gửi ảnh đã nén
            timestamp: timestamp,
            status: "pending",
            signed: false
        };

        // Đẩy vào nhánh 'submissions' để Admin Queue bắt được
        await db.ref(`submissions/${new Date().toISOString().slice(0,10)}/${currentStudent.stt}`).set(payload);
        
        document.getElementById('step-2').classList.add('step-inactive');
        document.getElementById('step-3').classList.remove('step-inactive');
    }

    window.onload = initFaceID;
</script>
</body>
</html>
