<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin v1.8.0 - Quản lý Face ID & Lớp học</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 80px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        
        /* Sidebar Toggle */
        #sidebar { transition: all 0.3s ease; width: 260px; }
        #sidebar.collapsed { width: 80px; }
        #sidebar.collapsed .nav-text, #sidebar.collapsed .logo-text { display: none; }
        #sidebar.collapsed .nav-btn { justify-content: center; padding: 12px; }

        /* Popup Xem ảnh */
        .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; }
        .popup-content { max-width: 90%; max-height: 85%; border-radius: 20px; border: 4px solid white; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="imagePopup" class="popup-overlay" onclick="this.style.display='none'">
        <img id="popupImg" class="popup-content" src="">
    </div>

    <aside id="sidebar" class="bg-[#1e293b] text-white flex flex-col sticky top-0 h-screen shadow-2xl z-50 no-print">
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-xl">V</div>
                <span class="logo-text font-bold text-lg uppercase tracking-tighter">VDC Safety</span>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><i class="fas fa-bars"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-3 rounded-xl transition-all">
                <i class="fas fa-university w-6 text-center"></i> <span class="nav-text ml-2">Lớp học</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-check-double w-6 text-center"></i> <span class="nav-text ml-2">Điểm danh</span>
            </button>
            <button onclick="switchTab('tab-faces', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-user-shield w-6 text-center"></i> <span class="nav-text ml-2">Quản lý Face ID</span>
            </button>
            <button onclick="switchTab('tab-upload', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-plus-circle w-6 text-center"></i> <span class="nav-text ml-2">Nạp danh sách</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-6 overflow-hidden">

        <section id="tab-classes" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 uppercase">🏫 Danh sách lớp huấn luyện</h2>
            </div>
            <div id="class-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <section id="tab-attendance" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase">📊 Dữ liệu điểm danh</h2>
                    <p id="active-class-tag" class="text-blue-600 font-bold text-xs uppercase mt-1"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="setFilter('absent')" class="px-4 py-2 bg-red-50 text-red-500 rounded-xl text-[10px] font-black uppercase">Vắng: <span id="count-absent">0</span></button>
                    <button onclick="setFilter('present')" class="px-4 py-2 bg-green-50 text-green-600 rounded-xl text-[10px] font-black uppercase">Có mặt: <span id="count-present">0</span></button>
                    <button onclick="setFilter('all')" class="px-4 py-2 bg-slate-100 text-slate-500 rounded-xl text-[10px] font-black uppercase underline">Tổng: <span id="count-all">0</span></button>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left text-[12px]">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 font-bold uppercase text-[10px]">
                            <th class="p-4 w-10 text-center">TT</th>
                            <th class="p-4 w-12 text-center">Ảnh</th>
                            <th class="p-4">Học viên</th>
                            <th class="p-4">Đơn vị</th>
                            <th class="p-4">Giờ quét</th>
                            <th class="p-4 w-10 text-center">Hủy</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-faces" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 uppercase">🛡️ Quản lý khuôn mặt học viên</h2>
                <div class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold text-xs">Tổng: <span id="total-faces">0</span></div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6">
                <div class="relative">
                    <input type="text" id="face-search" oninput="renderFaceList()" placeholder="Tìm tên học viên để xóa Face ID..." class="w-full p-4 pl-12 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>
            <div id="face-list-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </section>

        <section id="tab-upload" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">📥 Nạp lớp mới</h2>
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="new-class-name" class="p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Tên lớp">
                    <input type="text" id="new-location" class="p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Địa điểm">
                </div>
                <textarea id="csvData" rows="10" class="w-full p-4 bg-slate-50 border rounded-2xl font-mono text-[10px]" placeholder="Dán Excel dd/MM/yyyy tại đây..."></textarea>
                <button onclick="uploadData()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">LƯU TRỮ LỚP HỌC</button>
            </div>
        </section>
    </main>

<script>
    // FIREBASE CONFIG - Mr. Trần Công Đẹp
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentFilter = 'all';

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-faces') renderFaceList();
        if(id === 'tab-attendance') renderAttendance();
        if(id === 'tab-classes') renderClassList();
    }

    function openPopup(src) { document.getElementById('popupImg').src = src; document.getElementById('imagePopup').style.display = 'flex'; }

    // --- QUẢN LÝ LỚP ---
    async function uploadData() {
        const className = document.getElementById('new-class-name').value.trim();
        const loc = document.getElementById('new-location').value.trim();
        const raw = document.getElementById('csvData').value.trim();
        if(!className || !raw) return alert("Thiếu thông tin!");
        
        const students = {};
        raw.split('\n').forEach(line => {
            const c = line.split('\t');
            if(c.length >= 2) students[c[0].trim()] = { stt: c[0], name: c[1], gender: c[2]||"", dob: c[3]||"", rank: c[4]||"", position: c[5]||"", department: c[6]||"", company: c[7]||"" };
        });
        await db.ref(`classes/${className}`).set({ name: className, location: loc, students: students, createdAt: new Date().toLocaleDateString('vi-VN') });
        alert("Đã nạp lớp thành công!"); renderClassList(); switchTab('tab-classes', document.querySelector('[onclick*="tab-classes"]'));
    }

    async function renderClassList() {
        const snap = await db.ref('classes').once('value');
        const container = document.getElementById('class-list-container');
        container.innerHTML = '';
        Object.keys(snap.val() || {}).forEach(id => {
            const cls = snap.val()[id];
            container.innerHTML += `
                <div class="bg-white p-5 rounded-3xl border shadow-sm relative group">
                    <button onclick="deleteClass('${id}')" class="absolute top-3 right-3 text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    <h3 class="font-black text-slate-800 text-sm uppercase truncate pr-6">${cls.name}</h3>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase">${cls.location}</p>
                    <button onclick="activateClass('${id}')" class="w-full mt-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-bold uppercase hover:bg-blue-700">Mở điểm danh</button>
                </div>`;
        });
    }

    async function activateClass(id) {
        const snap = await db.ref(`classes/${id}`).once('value');
        const cls = snap.val(); const now = new Date();
        const dateStr = `${now.getDate().toString().padStart(2,'0')}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getFullYear()}`;
        await db.ref('current_session').set({ class: cls.name, location: cls.location, date: dateStr, session: now.getHours() < 12 ? "Sáng" : "Chiều", source: id });
        alert("Đã chọn lớp: " + cls.name); renderAttendance(); switchTab('tab-attendance', document.querySelector('[onclick*="tab-attendance"]'));
    }

    async function deleteClass(id) {
        if(confirm(`Bạn có chắc chắn muốn XÓA VĨNH VIỄN lớp: ${id}?`)) {
            await db.ref(`classes/${id}`).remove();
            renderClassList();
        }
    }

    // --- ĐIỂM DANH ---
    function setFilter(type) { currentFilter = type; renderAttendance(); }
    async function renderAttendance() {
        const snap = await db.ref().once('value');
        const data = snap.val() || {};
        const sess = data.current_session || {};
        if(!sess.class) return;
        document.getElementById('active-class-tag').innerText = `LỚP: ${sess.class} | ${sess.date} (${sess.session})`;
        
        const students = data.classes[sess.source]?.students || {};
        const attRecords = data.attendance?.[sess.date]?.[sess.session] || {};
        let present = 0; let html = '';

        Object.values(students).sort((a,b)=>a.stt-b.stt).forEach(s => {
            const hasAtt = attRecords[s.stt];
            if(hasAtt) present++;
            if(currentFilter === 'present' && !hasAtt) return;
            if(currentFilter === 'absent' && hasAtt) return;

            html += `
                <tr class="hover:bg-slate-50 transition-all ${!hasAtt ? 'opacity-50' : ''}">
                    <td class="p-4 text-center text-slate-400 font-mono">${s.stt}</td>
                    <td class="p-2 text-center">
                        ${hasAtt ? `<img src="${hasAtt.photo}" onclick="openPopup(this.src)" class="w-10 h-12 object-cover rounded mx-auto border cursor-zoom-in">` : '<i class="fas fa-user-clock text-slate-200"></i>'}
                    </td>
                    <td class="p-4 font-bold text-slate-700 uppercase">${s.name}</td>
                    <td class="p-4 text-slate-500">${s.department || s.company || '-'}</td>
                    <td class="p-4 font-mono text-blue-500 font-bold">${hasAtt ? hasAtt.time.split(' ngày ')[0] : '--:--'}</td>
                    <td class="p-4 text-center">
                        ${hasAtt ? `<i class="fas fa-times-circle text-red-300 hover:text-red-500 cursor-pointer" onclick="deleteAtt('${sess.date}','${sess.session}','${s.stt}')"></i>` : ''}
                    </td>
                </tr>`;
        });
        document.getElementById('attendance-body').innerHTML = html;
        document.getElementById('count-all').innerText = Object.keys(students).length;
        document.getElementById('count-present').innerText = present;
        document.getElementById('count-absent').innerText = Object.keys(students).length - present;
    }

    async function deleteAtt(date, sess, stt) {
        if(confirm("Xóa điểm danh người này?")) { await db.ref(`attendance/${date}/${sess}/${stt}`).remove(); renderAttendance(); }
    }

    // --- QUẢN LÝ FACE ID ---
    async function renderFaceList() {
        const snap = await db.ref('students').once('value');
        const faces = snap.val() || {};
        const query = document.getElementById('face-search').value.toLowerCase();
        const container = document.getElementById('face-list-container');
        container.innerHTML = '';
        
        let count = 0;
        Object.values(faces).forEach(s => {
            if(!s.name.toLowerCase().includes(query)) return;
            count++;
            container.innerHTML += `
                <div class="bg-white p-3 rounded-2xl border shadow-sm flex flex-col items-center text-center">
                    <img src="${s.photo}" class="w-16 h-20 object-cover rounded-lg mb-2 bg-slate-50">
                    <div class="text-[10px] font-black uppercase text-slate-700 truncate w-full mb-1">${s.name}</div>
                    <div class="text-[9px] text-slate-400 mb-3">STT: ${s.stt}</div>
                    <button onclick="deleteFace('${s.stt}')" class="w-full py-2 bg-red-50 text-red-500 rounded-lg text-[9px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Xóa Face ID</button>
                </div>`;
        });
        document.getElementById('total-faces').innerText = count;
    }

    async function deleteFace(id) {
        if(confirm("XÓA DỮ LIỆU KHUÔN MẶT?\nHành động này giúp học viên đăng ký lại từ đầu nếu nhầm tên. Hồ sơ gốc của lớp không bị ảnh hưởng.")) {
            await db.ref(`students/${id}`).remove();
            renderFaceList();
        }
    }

    window.onload = () => { renderClassList(); db.ref('attendance').on('value', () => renderAttendance()); };
</script>
</body>
</html>
