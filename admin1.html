<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin v1.6.0 - Multi-Class Management</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background: var(--accent); color: white; shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#1e293b] text-white flex flex-col sticky top-0 h-screen no-print shadow-2xl">
        <div class="p-6 border-b border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl">V</div>
                <span class="font-bold text-lg uppercase">VDC Safety</span>
            </div>
            <p class="text-[10px] text-blue-400 mt-1 font-bold tracking-widest">VERSION 1.6.0</p>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-3 rounded-xl transition-all hover:bg-slate-800">
                <i class="fas fa-university mr-3 w-5"></i> <span>Quản lý lớp học</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-check-double mr-3 w-5"></i> <span>Điểm danh thực tế</span>
            </button>
            <button onclick="switchTab('tab-upload', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-plus-circle mr-3 w-5"></i> <span>Nạp lớp mới</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">

        <section id="tab-classes" class="tab-content active">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">🏫 Danh sách lớp huấn luyện</h2>
            <div id="class-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="tab-attendance" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 uppercase">📊 Dữ liệu điểm danh lớp</h2>
                <div id="active-class-tag" class="px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-bold shadow-lg">Đang tải...</div>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-500 font-bold uppercase text-[10px] tracking-wider">
                        <tr>
                            <th class="p-4 border-b">Học viên</th>
                            <th class="p-4 border-b">Đơn vị</th>
                            <th class="p-4 border-b">Trạng thái</th>
                            <th class="p-4 border-b">Giờ quét</th>
                            <th class="p-4 border-b text-right">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-upload" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6 tracking-tight">📥 Nạp danh sách lớp mới</h2>
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Tên Lớp (VD: An toàn điện nhóm 3)</label>
                        <input type="text" id="new-class-name" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Địa điểm / Khách hàng</label>
                        <input type="text" id="new-location" class="w-full p-3 bg-slate-50 border rounded-xl outline-none" placeholder="VD: HEPC">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Dữ liệu Excel (10 Cột)</label>
                    <textarea id="csvData" rows="10" class="w-full p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl font-mono text-xs" placeholder="Dán dữ liệu tại đây..."></textarea>
                </div>
                <button onclick="uploadData()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 shadow-xl shadow-blue-100">LƯU TRỮ LỚP HỌC</button>
            </div>
        </section>

    </main>

<script>
    // FIREBASE CONFIG (Giữ nguyên của anh)
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => {
            l.classList.remove('active', 'bg-blue-600', 'text-white', 'shadow-lg');
            l.classList.add('text-slate-400');
        });
        btn.classList.add('active');
        btn.classList.remove('text-slate-400');
    }

    // --- NẠP LỚP MỚI ---
    async function uploadData() {
        const className = document.getElementById('new-class-name').value.trim();
        const locationName = document.getElementById('new-location').value.trim();
        const raw = document.getElementById('csvData').value.trim();
        
        if(!className || !locationName || !raw) return alert("Vui lòng nhập đầy đủ Tên lớp, Địa điểm và Dữ liệu!");

        const lines = raw.split('\n');
        let students = {};
        lines.forEach(line => {
            const c = line.split('\t');
            if(c.length >= 1) {
                students[c[0].trim()] = {
                    stt: c[0], name: c[1] || "", gender: c[2] || "", dob: c[3] || "", 
                    rank: c[4] || "", position: c[5] || "", department: c[6] || "", company: c[7] || ""
                };
            }
        });

        await db.ref(`classes/${className}`).set({
            name: className,
            location: locationName,
            createdAt: new Date().toLocaleDateString('vi-VN'),
            students: students
        });

        alert("Đã lưu lớp " + className + " thành công!");
        document.getElementById('new-class-name').value = '';
        document.getElementById('csvData').value = '';
        renderClassList();
        switchTab('tab-classes', document.querySelector('[onclick*="tab-classes"]'));
    }

    // --- HIỂN THỊ DANH SÁCH LỚP ---
    async function renderClassList() {
        const snap = await db.ref('classes').once('value');
        const classes = snap.val() || {};
        const container = document.getElementById('class-list-container');
        container.innerHTML = '';

        Object.keys(classes).forEach(id => {
            const cls = classes[id];
            const studentCount = Object.keys(cls.students || {}).length;
            container.innerHTML += `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 hover:shadow-xl transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl font-bold">
                            <i class="fas fa-graduation-cap"></i>
                        </div>
                        <button onclick="deleteClass('${id}')" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fas fa-trash-alt"></i></button>
                    </div>
                    <h3 class="font-black text-slate-800 uppercase text-lg leading-tight mb-1">${cls.name}</h3>
                    <p class="text-xs text-slate-400 font-medium uppercase mb-4 tracking-wider"><i class="fas fa-map-marker-alt mr-1"></i> ${cls.location}</p>
                    <div class="flex items-center gap-4 py-3 border-y border-slate-50 mb-4">
                        <div class="text-center flex-1 border-r border-slate-50"><p class="text-[10px] text-slate-400 uppercase font-bold">Sĩ số</p><p class="font-black text-slate-700">${studentCount}</p></div>
                        <div class="text-center flex-1"><p class="text-[10px] text-slate-400 uppercase font-bold">Ngày tạo</p><p class="font-bold text-slate-700 text-xs">${cls.createdAt}</p></div>
                    </div>
                    <button onclick="activateClass('${id}')" class="w-full py-3 bg-slate-900 text-white rounded-xl font-bold hover:bg-blue-600 transition-all text-xs tracking-widest">CHỌN ĐIỂM DANH</button>
                </div>
            `;
        });
    }

    // --- KÍCH HOẠT LỚP ĐIỂM DANH ---
    async function activateClass(id) {
        const snap = await db.ref(`classes/${id}`).once('value');
        const cls = snap.val();
        const now = new Date();
        const dateStr = `${now.getDate().toString().padStart(2,'0')}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getFullYear()}`;
        
        await db.ref('current_session').set({
            class: cls.name,
            location: cls.location,
            date: dateStr,
            session: now.getHours() < 12 ? "Sáng" : "Chiều",
            source: id // Lưu ID lớp để truy xuất student list
        });

        alert("Đã kích hoạt lớp: " + cls.name + ". Học viên có thể quét mã ngay bây giờ!");
        renderAttendance();
        switchTab('tab-attendance', document.querySelector('[onclick*="tab-attendance"]'));
    }

    // --- HIỂN THỊ ĐIỂM DANH THỰC TẾ ---
    async function renderAttendance() {
        const snap = await db.ref().once('value');
        const data = snap.val() || {};
        const sess = data.current_session || {};
        if(!sess.class) return;

        document.getElementById('active-class-tag').innerText = `ĐANG MỞ: ${sess.class}`;

        const clsData = data.classes[sess.source] || {};
        const students = clsData.students || {};
        const att = (data.attendance?.[sess.date]?.[sess.session]) || {};
        
        const tbody = document.getElementById('attendance-body');
        tbody.innerHTML = '';
        
        Object.values(students).sort((a,b)=>parseInt(a.stt)-parseInt(b.stt)).forEach(s => {
            const present = att[s.stt];
            tbody.innerHTML += `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-bold text-slate-700">${s.name}</td>
                    <td class="p-4 text-xs text-slate-500">${s.department || s.company || ""}</td>
                    <td class="p-4">${present ? '<span class="text-green-600 font-black text-[10px] uppercase">Có mặt</span>' : '<span class="text-slate-300 text-[10px] uppercase">Vắng</span>'}</td>
                    <td class="p-4 text-xs font-mono text-slate-400">${present ? present.time.split(' ngày ')[0] : '--:--'}</td>
                    <td class="p-4 text-right">
                        ${present ? `<button onclick="deleteAtt('${sess.date}','${sess.session}','${s.stt}')" class="text-red-400 hover:text-red-600"><i class="fas fa-undo"></i></button>` : ''}
                    </td>
                </tr>
            `;
        });
    }

    async function deleteClass(id) {
        if(confirm("BẠN CÓ CHẮC MUỐN XÓA HẲN LỚP NÀY? Thao tác này sẽ xóa toàn bộ danh sách học viên của lớp.")) {
            await db.ref(`classes/${id}`).remove();
            renderClassList();
        }
    }

    async function deleteAtt(date, sess, stt) {
        if(confirm("Hủy kết quả điểm danh của học viên này?")) {
            await db.ref(`attendance/${date}/${sess}/${stt}`).remove();
            renderAttendance();
        }
    }

    // Khởi tạo
    window.onload = () => {
        renderClassList();
        db.ref('attendance').on('value', () => renderAttendance());
    };
</script>
</body>
</html>
