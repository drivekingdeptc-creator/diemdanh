<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VDC Admin v1.7.0 - Quản lý Chuyên sâu</title>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; }
        body { background: #f1f5f9; font-family: 'Inter', sans-serif; overflow: hidden; }
        .tab-content { display: none; height: calc(100vh - 40px); overflow-y: auto; padding-bottom: 50px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        
        /* Sidebar Toggle */
        #sidebar { transition: all 0.3s ease; width: 260px; }
        #sidebar.collapsed { width: 80px; }
        #sidebar.collapsed .nav-text, #sidebar.collapsed .logo-text { display: none; }
        #sidebar.collapsed .nav-btn { justify-content: center; padding: 12px; }
        #sidebar.collapsed .nav-btn i { margin-right: 0; font-size: 1.2rem; }

        .stat-card { transition: all 0.3s ease; cursor: pointer; border: 2px solid transparent; }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card.active-filter { border-color: var(--accent); background: white !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside id="sidebar" class="bg-[#1e293b] text-white flex flex-col sticky top-0 h-screen shadow-2xl z-50">
        <div class="p-6 border-b border-slate-700 flex items-center justify-between">
            <div class="flex items-center gap-3 overflow-hidden">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex-shrink-0 flex items-center justify-center font-black text-xl">V</div>
                <span class="logo-text font-bold text-lg uppercase whitespace-nowrap">VDC Safety</span>
            </div>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-white"><i class="fas fa-bars"></i></button>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('tab-classes', this)" class="nav-btn active w-full flex items-center p-3 rounded-xl transition-all hover:bg-slate-800">
                <i class="fas fa-university w-6"></i> <span class="nav-text ml-2">Lớp học</span>
            </button>
            <button onclick="switchTab('tab-attendance', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-check-double w-6"></i> <span class="nav-text ml-2">Điểm danh</span>
            </button>
            <button onclick="switchTab('tab-faces', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-user-shield w-6"></i> <span class="nav-text ml-2">Quản lý khuôn mặt</span>
            </button>
            <button onclick="switchTab('tab-upload', this)" class="nav-btn w-full flex items-center p-3 rounded-xl text-slate-400 hover:bg-slate-800 transition-all">
                <i class="fas fa-file-import w-6"></i> <span class="nav-text ml-2">Nạp danh sách</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-hidden">

        <section id="tab-classes" class="tab-content active">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">🏫 Danh sách lớp huấn luyện</h2>
            <div id="class-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>

        <section id="tab-attendance" class="tab-content">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h2 class="text-2xl font-black text-slate-800 uppercase" id="att-title">Dữ liệu điểm danh</h2>
                    <p id="active-class-tag" class="text-blue-600 font-bold text-sm uppercase"></p>
                </div>
                <button onclick="renderAttendance()" class="bg-white p-2 rounded-lg shadow-sm border text-slate-400 hover:text-blue-600"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-8">
                <div onclick="setFilter('all')" id="stat-all" class="stat-card bg-slate-800 text-white p-6 rounded-[2rem] shadow-xl">
                    <p class="text-[10px] uppercase font-bold opacity-60">Sĩ số lớp</p>
                    <h3 class="text-4xl font-black mt-1" id="count-all">0</h3>
                </div>
                <div onclick="setFilter('present')" id="stat-present" class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-green-600">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Đã điểm danh</p>
                    <h3 class="text-4xl font-black mt-1" id="count-present">0</h3>
                </div>
                <div onclick="setFilter('absent')" id="stat-absent" class="stat-card bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 text-red-400">
                    <p class="text-[10px] uppercase font-bold text-slate-400">Vắng mặt</p>
                    <h3 class="text-4xl font-black mt-1" id="count-absent">0</h3>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-[10px] tracking-widest">
                        <tr>
                            <th class="p-4">STT</th>
                            <th class="p-4">Học viên</th>
                            <th class="p-4">Đơn vị</th>
                            <th class="p-4 text-center">Trạng thái</th>
                            <th class="p-4">Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-faces" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">🛡️ Quản lý dữ liệu khuôn mặt</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
                <div class="flex gap-4">
                    <input type="text" id="face-search" oninput="renderFaceList()" placeholder="Tìm tên học viên để xóa Face ID..." class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                    <div class="bg-blue-50 text-blue-600 px-6 py-4 rounded-2xl flex items-center font-bold">
                        <span id="count-faces">0</span> &nbsp;Khuôn mặt
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="face-list-container"></div>
        </section>

        <section id="tab-upload" class="tab-content">
            <h2 class="text-2xl font-black text-slate-800 uppercase mb-6">📥 Nạp danh sách lớp</h2>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="new-class-name" class="p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Tên lớp (VD: ATĐ Nhóm 3)">
                    <input type="text" id="new-location" class="p-4 bg-slate-50 border rounded-2xl outline-none" placeholder="Địa điểm (VD: HEPC)">
                </div>
                <textarea id="csvData" rows="10" class="w-full p-4 bg-slate-50 border-2 border-dashed rounded-2xl font-mono text-xs" placeholder="STT [Tab] Họ Tên [Tab] Giới Tính..."></textarea>
                <button onclick="uploadData()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg shadow-xl">LƯU TRỮ LỚP HỌC</button>
            </div>
        </section>
    </main>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentFilter = 'all'; // all, present, absent

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(l => l.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'tab-faces') renderFaceList();
        if(id === 'tab-attendance') renderAttendance();
    }

    function setFilter(type) {
        currentFilter = type;
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
        document.getElementById('stat-' + type).classList.add('active-filter');
        renderAttendance();
    }

    // --- QUẢN LÝ LỚP ---
    async function uploadData() {
        const className = document.getElementById('new-class-name').value.trim();
        const locationName = document.getElementById('new-location').value.trim();
        const raw = document.getElementById('csvData').value.trim();
        if(!className || !raw) return alert("Vui lòng điền thông tin!");

        const students = {};
        raw.split('\n').forEach(line => {
            const c = line.split('\t');
            if(c.length >= 2) {
                students[c[0].trim()] = { stt: c[0], name: c[1], gender: c[2]||"", company: c[7]||"" };
            }
        });

        await db.ref(`classes/${className}`).set({ name: className, location: locationName, students: students, createdAt: new Date().toLocaleDateString() });
        alert("Thành công!");
        location.reload();
    }

    async function renderClassList() {
        const snap = await db.ref('classes').once('value');
        const container = document.getElementById('class-list-container');
        container.innerHTML = '';
        Object.keys(snap.val() || {}).forEach(id => {
            const cls = snap.val()[id];
            container.innerHTML += `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="font-black text-slate-800 uppercase truncate">${cls.name}</h3>
                    <p class="text-xs text-slate-400 mb-4">${cls.location}</p>
                    <button onclick="activateClass('${id}')" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-xs">CHỌN LỚP NÀY</button>
                    <button onclick="deleteClass('${id}')" class="w-full mt-2 text-slate-300 text-[10px] uppercase font-bold hover:text-red-500">Xóa lớp</button>
                </div>`;
        });
    }

    async function activateClass(id) {
        const snap = await db.ref(`classes/${id}`).once('value');
        const cls = snap.val();
        const now = new Date();
        const dateStr = `${now.getDate().toString().padStart(2,'0')}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getFullYear()}`;
        await db.ref('current_session').set({ class: cls.name, location: cls.location, date: dateStr, session: now.getHours() < 12 ? "Sáng" : "Chiều", source: id });
        renderAttendance();
        switchTab('tab-attendance', document.querySelector('[onclick*="tab-attendance"]'));
    }

    // --- ĐIỂM DANH & LỌC ---
    async function renderAttendance() {
        const snap = await db.ref().once('value');
        const data = snap.val() || {};
        const sess = data.current_session || {};
        if(!sess.class) return;

        document.getElementById('active-class-tag').innerText = `Lớp hiện tại: ${sess.class}`;
        const students = data.classes[sess.source]?.students || {};
        const att = data.attendance?.[sess.date]?.[sess.session] || {};
        
        let presentCount = 0;
        let listHTML = '';

        Object.values(students).sort((a,b)=>a.stt-b.stt).forEach(s => {
            const isPresent = att[s.stt];
            if(isPresent) presentCount++;

            // Logic lọc
            if(currentFilter === 'present' && !isPresent) return;
            if(currentFilter === 'absent' && isPresent) return;

            listHTML += `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 font-mono text-slate-400 text-xs">${s.stt}</td>
                    <td class="p-4 font-bold text-slate-700 uppercase text-xs">${s.name}</td>
                    <td class="p-4 text-xs text-slate-500">${s.company || ""}</td>
                    <td class="p-4 text-center">
                        ${isPresent ? '<span class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-[10px] font-black uppercase">Có mặt</span>' : '<span class="px-3 py-1 bg-slate-100 text-slate-300 rounded-full text-[10px] font-black uppercase">Vắng</span>'}
                    </td>
                    <td class="p-4 font-mono text-xs text-slate-400">${isPresent ? isPresent.time.split(' ngày ')[0] : '--:--'}</td>
                </tr>`;
        });

        document.getElementById('attendance-body').innerHTML = listHTML;
        document.getElementById('count-all').innerText = Object.keys(students).length;
        document.getElementById('count-present').innerText = presentCount;
        document.getElementById('count-absent').innerText = Object.keys(students).length - presentCount;
    }

    // --- QUẢN LÝ KHUÔN MẶT ---
    async function renderFaceList() {
        const query = document.getElementById('face-search').value.toLowerCase();
        const snap = await db.ref('students').once('value');
        const faces = snap.val() || {};
        const container = document.getElementById('face-list-container');
        container.innerHTML = '';
        
        let count = 0;
        Object.keys(faces).forEach(id => {
            const s = faces[id];
            if(!s.name.toLowerCase().includes(query)) return;
            count++;
            container.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col items-center text-center">
                    <img src="${s.photo || ''}" class="w-20 h-20 object-cover rounded-full mb-3 bg-slate-100">
                    <h4 class="text-xs font-bold uppercase text-slate-700 leading-tight h-8 overflow-hidden">${s.name}</h4>
                    <p class="text-[10px] text-slate-400 mb-3">STT: ${s.stt}</p>
                    <button onclick="deleteFace('${id}')" class="w-full py-2 bg-red-50 text-red-500 rounded-lg text-[10px] font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Xóa Face ID</button>
                </div>`;
        });
        document.getElementById('count-faces').innerText = count;
    }

    async function deleteFace(id) {
        if(confirm("Xóa dữ liệu khuôn mặt này? Học viên sẽ phải đăng ký lại khi quét mặt.")) {
            await db.ref(`students/${id}`).remove();
            renderFaceList();
        }
    }

    async function deleteClass(id) {
        if(confirm("Xóa lớp này?")) { await db.ref(`classes/${id}`).remove(); renderClassList(); }
    }

    window.onload = () => {
        renderClassList();
        db.ref('attendance').on('value', () => renderAttendance());
    };
</script>
</body>
</html>
