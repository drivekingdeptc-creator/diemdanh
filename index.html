<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC - ĐIỂM DANH AI v1.5.1 (GPS)</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #004085; --success: #155724; --bg: #f0f2f5; --danger: #d9534f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-container { max-width: 420px; width: 100%; background: white; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; text-align: center; box-sizing: border-box; }
        
        #video-container { position: relative; width: 260px; height: 347px; margin: 10px auto; background: #000; border-radius: 20px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        
        .face-guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.7) 80%); pointer-events: none; }
        .face-guide::after { content: ''; position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%); width: 65%; height: 70%; border: 2px dashed rgba(255,255,255,0.6); border-radius: 50% 50% 45% 45%; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; text-transform: uppercase; }
        #btnCapture { background: var(--primary); color: white; }
        #btnCapture:disabled { background: #ccc; }

        input, select { width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        .form-verify { display: none; text-align: left; background: #fff3cd; padding: 15px; border-radius: 15px; margin-top: 15px; border: 1px solid #ffeeba; }
        #preview-photo { width: 120px; height: 160px; object-fit: cover; border-radius: 8px; border: 3px solid #fff; display: block; margin: 0 auto 15px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .result-card { display: none; background: #fff; border-radius: 20px; padding: 15px; }
        .info-row { border-bottom: 1px dashed #ddd; padding: 8px 0; font-size: 15px; color: #333; }
        .info-row strong { color: var(--primary); }
        
        /* Cảnh báo GPS */
        #gps-status { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .gps-error { color: var(--danger) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="app-container">
    <div id="session-info" style="font-size: 11px; background: #333; color: white; padding: 8px; border-radius: 10px; margin-bottom: 5px;">Kết nối phiên...</div>
    <div id="gps-status">📍 Đang xác định vị trí...</div>

    <h3 style="margin:5px 0; color: var(--primary);">HEPC SAFETY AI</h3>
    <p id="loading-msg" style="font-size:12px; color:var(--danger); font-weight:bold;">⌛ ĐANG TẢI AI...</p>

    <div id="scanner-section">
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
            <div class="face-guide"></div>
        </div>
        <p id="scan-status" style="font-size:14px; font-weight:bold; color: #555;">Sẵn sàng quét...</p>
        <button class="btn" id="btnCapture" onclick="checkFace()" disabled>XÁC NHẬN KHUÔN MẶT</button>
    </div>

    <div id="search-section" style="display:none; margin-top:15px; border-top: 1px dashed #ccc; padding-top: 15px;">
        <p style="color:var(--danger); font-weight:bold;">⚠️ CHƯA CÓ DỮ LIỆU MẶT</p>
        <input type="text" id="inputName" placeholder="Nhập đầy đủ Họ và Tên">
        <button class="btn" style="background:#495057; color:white;" onclick="searchStudent()">TÌM THÔNG TIN</button>
    </div>

    <div id="verify-section" class="form-verify">
        <img id="preview-photo" src="">
        <input type="text" id="c1" disabled style="background:#eee; font-size:12px;">
        <input type="text" id="c2" disabled style="background:#eee; font-weight:bold;">
        
        <select id="c3"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
        <input type="date" id="c4">
        <select id="c5"><option value="5/5">5/5</option><option value="4/5">4/5</option><option value="3/5">3/5</option><option value="2/5">2/5</option><option value="1/5">1/5</option></select>
        <input type="text" id="c6" placeholder="Chức danh">
        <input type="text" id="c7" placeholder="Đơn vị công tác">
        
        <button class="btn" id="btnSaveFinal" style="background:var(--success); color:white;" onclick="saveFinal()">XÁC NHẬN THÔNG TIN</button>
    </div>

    <div id="result-screen" class="result-card">
        <img id="res-photo" src="">
        <div style="text-align: left;">
            <div class="info-row">Họ tên: <strong id="res-name"></strong></div>
            <div class="info-row">Đơn vị: <strong id="res-unit"></strong></div>
        </div>
        <div id="res-time" style="background:#d4edda; color:#155724; padding:10px; border-radius:10px; font-weight:bold; font-size:13px; margin-top:10px;"></div>
        <button class="btn" style="background:#eee;" onclick="location.reload()">TIẾP TỤC</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting, faceMatcher, session, currentStudent, capturedPhoto;
    let userCoords = null;

    // --- LOGIC GPS ---
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // Bán kính trái đất (m)
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(pos => {
                userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                checkGPSStatus();
            }, err => {
                document.getElementById('gps-status').innerHTML = "⚠️ Vui lòng bật định vị GPS!";
                document.getElementById('gps-status').className = "gps-error";
            }, { enableHighAccuracy: true });
        }
    }

    function checkGPSStatus() {
        if(!session || !session.lat || !session.lng || !userCoords) return;
        const dist = getDistance(userCoords.lat, userCoords.lng, session.lat, session.lng);
        const statusEl = document.getElementById('gps-status');
        
        if(dist > 150) { // Giới hạn 150m
            statusEl.innerHTML = `⚠️ Sai vị trí (${Math.round(dist)}m). Vui lòng đến lớp học!`;
            statusEl.className = "gps-error";
            return false;
        } else {
            statusEl.innerHTML = `📍 Vị trí hợp lệ (${Math.round(dist)}m)`;
            statusEl.className = "";
            return true;
        }
    }

    // --- LOGIC AI ---
    async function initAI() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await Promise.all([faceapi.nets.tinyFaceDetector.loadFromUri(URL), faceapi.nets.faceLandmark68Net.loadFromUri(URL), faceapi.nets.faceRecognitionNet.loadFromUri(URL)]);
            document.getElementById('loading-msg').style.display = 'none';
            db.ref('current_session').on('value', snap => {
                session = snap.val();
                if(session) document.getElementById('session-info').innerHTML = `LỚP: ${session.class} | BUỔI: ${session.session}`;
            });
            updateLocation();
            startCamera();
            loadFaceDB();
        } catch (e) { document.getElementById('loading-msg').innerText = "❌ LỖI TẢI AI!"; }
    }

    async function startCamera() {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.getElementById('video');
        video.srcObject = s;
        isDetecting = true;
        video.onplay = () => {
            const canvas = document.getElementById('overlay');
            faceapi.matchDimensions(canvas, { width: 260, height: 347 });
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                if(det) {
                    faceapi.draw.drawDetections(canvas, faceapi.resizeResults(det, { width: 260, height: 347 }));
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                }
            }, 600);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref('students').once('value');
        const labeled = Object.values(snap.val() || {}).filter(u => u.descriptor).map(u => new faceapi.LabeledFaceDescriptors(u.stt.toString(), [new Float32Array(u.descriptor)]));
        if(labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.55);
    }

    async function checkFace() {
        if(!checkGPSStatus()) return alert("Hệ thống từ chối! Bạn đang đứng quá xa lớp học.");
        
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 600;
        const v = document.getElementById('video');
        canvas.getContext('2d').drawImage(v, (v.videoWidth-(v.videoHeight*0.75))/2, v.videoHeight*0.05, v.videoHeight*0.75, v.videoHeight*0.95, 0, 0, 450, 600);
        capturedPhoto = canvas.toDataURL('image/jpeg', 0.8);

        if(faceMatcher && lastDescriptor) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                const snap = await db.ref(`master_list/${session.location}/${session.class}/${match.label}`).once('value');
                if(snap.val()) {
                    currentStudent = snap.val();
                    currentStudent.photo = capturedPhoto;
                    return saveAttendance(currentStudent);
                }
            }
        }
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('search-section').style.display = 'block';
    }

    async function searchStudent() {
        const name = document.getElementById('inputName').value.trim().toLowerCase();
        const snap = await db.ref(`master_list/${session.location}/${session.class}`).once('value');
        const found = Object.values(snap.val() || {}).find(u => u.name && u.name.toLowerCase() === name);
        if(found) {
            currentStudent = found;
            document.getElementById('search-section').style.display = 'none';
            document.getElementById('verify-section').style.display = 'block';
            document.getElementById('preview-photo').src = capturedPhoto;
            document.getElementById('c1').value = "STT: " + found.stt;
            document.getElementById('c2').value = found.name;
            document.getElementById('c3').value = found.gender || "Nam";
            document.getElementById('c6').value = found.position || "";
            document.getElementById('c7').value = found.department || "";
        } else { alert("Không tìm thấy tên!"); }
    }

    async function saveFinal() {
        if(!checkGPSStatus()) return alert("Lỗi vị trí! Vui lòng không di chuyển xa khi đang xác nhận.");
        const v4 = document.getElementById('c4').value;
        if(!v4) return alert("Chọn Ngày sinh!");
        
        const d = new Date(v4);
        const data = {
            ...currentStudent,
            gender: document.getElementById('c3').value,
            dob: `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`,
            rank: document.getElementById('c5').value,
            position: document.getElementById('c6').value.trim(),
            department: document.getElementById('c7').value.trim(),
            descriptor: Array.from(lastDescriptor),
            photo: capturedPhoto,
            time: new Date().toLocaleTimeString('vi-VN'),
            coords: userCoords // Lưu tọa độ lúc điểm danh để hậu kiểm
        };
        await db.ref('students/' + data.stt).set(data);
        saveAttendance(data);
    }

    async function saveAttendance(st) {
        const timeStr = new Date().toLocaleTimeString('vi-VN') + " ngày " + new Date().toLocaleDateString('vi-VN');
        await db.ref(`attendance/${session.date}/${session.session}/${st.stt}`).set({ name: st.name, time: timeStr, photo: st.photo || "" });
        isDetecting = false;
        document.getElementById('scanner-section').style.display = 'none';
        document.getElementById('verify-section').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('res-photo').src = st.photo || "";
        document.getElementById('res-name').innerText = st.name.toUpperCase();
        document.getElementById('res-unit').innerText = st.department || "";
        document.getElementById('res-time').innerText = "THÀNH CÔNG: " + timeStr;
    }
    initAI();
</script>
</body>
</html>
