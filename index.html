<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC AI Check-in - PC Vĩnh Long</title>
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; padding: 15px; text-align: center; }
        .container { background: white; max-width: 450px; margin: auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo { font-weight: bold; color: #0055a5; font-size: 22px; margin-bottom: 5px; }
        .sub-title { color: #666; font-size: 13px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        video { width: 100%; transform: scaleX(-1); }
        .form-group { margin: 15px 0; }
        input { width: 90%; padding: 14px; border: 2px solid #0055a5; border-radius: 10px; font-size: 16px; outline: none; }
        button { background: #0055a5; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #cbd5e0; }
        .info-card { background: #eef6ff; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; border-left: 5px solid #0055a5; display: none; }
        #statusMsg { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .loading-text { color: #0055a5; font-size: 14px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">VDC SMART CHECK-IN</div>
    <div class="sub-title">Lớp Huấn Luyện ATVSLĐ - PC Vĩnh Long</div>
    
    <div id="loading-overlay" class="loading-text">Đang khởi động AI...</div>

    <div id="registration-form" style="display:none;">
        <p style="font-size: 14px; color: #444;">Nhập Họ tên để đăng ký khuôn mặt lần đầu</p>
        <input type="text" id="nameInput" placeholder="Ví dụ: Tran Trung Thong..." onkeyup="handleEnter(event)">
        <button id="btnCheck" onclick="verifyStudent()" style="margin-top: 10px;">KIỂM TRA THÔNG TIN</button>
    </div>

    <div id="main-ui" style="display:none;">
        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
        </div>
        
        <div id="infoCard" class="info-card">
            <div id="studentDetail" style="line-height: 1.6;"></div>
        </div>

        <button id="btnAction" onclick="processAttendance()">ĐANG KHỞI TẠO...</button>
        <button onclick="resetUser()" style="background: none; color: #666; font-size: 12px; margin-top: 10px; text-decoration: underline; border: none; cursor: pointer;">Đăng ký lại bằng tên khác</button>
    </div>

    <div id="statusMsg"></div>
</div>

        {stt:68, name:"Trần Văn Thảo", unit:"Điện lực Thạnh Phú"},
        {stt:69, name:"Lê Nguyễn Nhật Tân", unit:"Điện lực Thạnh Phú"},
        {stt:70, name:"Đặng Duy Khiêm", unit:"Điện lực Thạnh Phú"},
        {stt:71, name:"Ngô Trọng Tín", unit:"Điện lực Thạnh Phú"},
        {stt:72, name:"Bùi Văn Thành", unit:"Điện lực Thạnh Phú"},
        {stt:73, name:"Trần Quốc Đạt", unit:"Điện lực Thạnh Phú"},
        {stt:74, name:"Nguyễn Văn Đạt", unit:"Điện lực Thạnh Phú"},
        {stt:75, name:"Trương Minh Hiếu", unit:"Điện lực Thạnh Phú"},
        {stt:76, name:"Nguyễn Thanh Phong", unit:"Phòng Kỹ thuật"},
        {stt:77, name:"Lê Văn Bình", unit:"Phòng An toàn"}
    ];

    let currentStudent = null;
    let isRegistered = false;

    // Chuẩn hóa chuỗi (không dấu, không hoa)
    function cleanString(str) {
        return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    }

    async function initAI() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);
            document.getElementById('loading-overlay').style.display = 'none';
            checkLocalUser();
        } catch (e) {
            document.getElementById('loading-overlay').innerText = "Lỗi nạp mô hình AI. Vui lòng reload trang.";
        }
    }

    function checkLocalUser() {
        const saved = localStorage.getItem('vdc_user_id');
        if (saved) {
            currentStudent = JSON.parse(saved);
            isRegistered = true;
            startUI();
        } else {
            document.getElementById('registration-form').style.display = 'block';
        }
    }

    function verifyStudent() {
        const input = cleanString(document.getElementById('nameInput').value);
        if (input.length < 3) return alert("Vui lòng nhập đầy đủ họ tên");

        const found = studentList.find(s => cleanString(s.name) === input);
        
        if (found) {
            currentStudent = found;
            isRegistered = false;
            startUI();
        } else {
            alert("Không tìm thấy tên trong danh sách 77 học viên!");
        }
    }

    async function startUI() {
        document.getElementById('registration-form').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('studentDetail').innerHTML = `
            <b>STT:</b> ${currentStudent.stt} <br>
            <b>Họ tên:</b> ${currentStudent.name} <br>
            <b>Đơn vị:</b> ${currentStudent.unit}
        `;
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('btnAction').innerText = isRegistered ? "CHỤP ẢNH ĐIỂM DANH" : "ĐĂNG KÝ KHUÔN MẶT LẦN ĐẦU";

        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById('video').srcObject = stream;
    }

    async function processAttendance() {
        const video = document.getElementById('video');
        const status = document.getElementById('statusMsg');
        const btn = document.getElementById('btnAction');
        btn.disabled = true;
        status.innerText = "⌛ Đang phân tích khuôn mặt...";

        const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                                       .withFaceLandmarks()
                                       .withFaceDescriptor();

        if (!detection) {
            status.innerText = "❌ Không nhận diện được mặt! Hãy nhìn thẳng.";
            status.style.color = "red";
            btn.disabled = false;
            return;
        }

        if (!isRegistered) {
            const userData = { ...currentStudent, descriptor: Array.from(detection.descriptor) };
            localStorage.setItem('vdc_user_id', JSON.stringify(userData));
            status.innerText = "✅ Đã lưu khuôn mặt! Đang chuyển sang điểm danh...";
            status.style.color = "green";
            setTimeout(() => location.reload(), 1500);
        } else {
            const savedDescriptor = new Float32Array(currentStudent.descriptor);
            const distance = faceapi.euclideanDistance(savedDescriptor, detection.descriptor);

            if (distance < 0.55) {
                status.innerText = `✅ ĐÃ ĐIỂM DANH XONG! (STT: ${currentStudent.stt})`;
                status.style.color = "#0055a5";
                btn.innerText = "THÀNH CÔNG";
            } else {
                status.innerText = "❌ Sai khuôn mặt hoặc ảnh quá tối!";
                status.style.color = "red";
                btn.disabled = false;
            }
        }
    }

    function resetUser() {
        if(confirm("Bạn muốn xóa dữ liệu đăng ký cũ để nhập tên khác?")) {
            localStorage.removeItem('vdc_user_id');
            location.reload();
        }
    }

    function handleEnter(e) { if(e.key === 'Enter') verifyStudent(); }

    initAI();
</script>
</body>
</html>
