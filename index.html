<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY - ĐIỂM DANH</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #004085; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .camera-box { position: relative; width: 300px; height: 380px; border: 5px solid white; border-radius: 150px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #status { margin-top: 20px; font-weight: bold; color: #ffc107; text-align: center; padding: 0 20px; }
        #success { display: none; position: fixed; inset: 0; background: rgba(0,64,133,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <h2>VDC SAFETY</h2>
    <div class="camera-box">
        <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="status">⏳ Đang khởi tạo AI...</div>

    <div id="success">
        <h1 style="font-size: 80px;">✅</h1>
        <h2 id="user-name">XIN CHÀO!</h2>
        <p>Điểm danh thành công</p>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const video = document.getElementById('video');
    let faceMatcher = null;
    let isProcessing = false;

    // SỬ DỤNG LẠI CÁC MODEL CŨ CHẠY TỐT
    async function init() {
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
                .then(stream => { video.srcObject = stream; loadData(); })
                .catch(() => { document.getElementById('status').innerText = "❌ Lỗi: Hãy cho phép Camera!"; });
        } catch (e) { document.getElementById('status').innerText = "❌ Lỗi tải AI!"; }
    }

    async function loadData() {
        const snap = await db.ref('students').once('value');
        const data = snap.val() || {};
        const labels = Object.keys(data);
        if (labels.length === 0) { document.getElementById('status').innerText = "👉 Đang quét... (Chưa có ID)"; startDetection(); return; }

        const descriptors = labels.map(l => new faceapi.LabeledFaceDescriptors(l, data[l].descriptors.map(d => new Float32Array(d))));
        faceMatcher = new faceapi.FaceMatcher(descriptors, 0.55);
        document.getElementById('status').innerText = "✨ SẴN SÀNG QUÉT MẶT";
        startDetection();
    }

    function startDetection() {
        setInterval(async () => {
            if (isProcessing) return;
            const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            if (det && faceMatcher) {
                const match = faceMatcher.findBestMatch(det.descriptor);
                if (match.label !== 'unknown') {
                    isProcessing = true;
                    saveAttendance(match.label);
                }
            }
        }, 600);
    }

    async function saveAttendance(id) {
        const sessSnap = await db.ref('current_session').once('value');
        const sess = sessSnap.val();
        
        const canvas = document.createElement('canvas');
        canvas.width = 300; canvas.height = 380;
        canvas.getContext('2d').drawImage(video, 0, 0, 300, 380);
        const photo = canvas.toDataURL('image/jpeg', 0.6);

        await db.ref(`attendance/${sess.date}/${sess.session}/${id}`).set({
            stt: id, time: new Date().toLocaleTimeString('vi-VN') + " " + new Date().toLocaleDateString('vi-VN'), photo: photo
        });

        document.getElementById('user-name').innerText = "CHÀO STT: " + id;
        document.getElementById('success').style.display = 'flex';
        setTimeout(() => { location.reload(); }, 2000);
    }

    window.onload = init;
</script>
</body>
</html>
