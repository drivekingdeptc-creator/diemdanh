<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VDC SAFETY - AI FACE ID v1.7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 95%; max-width: 400px; background: white; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-col; max-height: 98vh; }
        
        /* Thu nhỏ khung Video để đẩy nút lên */
        #video-container { position: relative; width: 260px; height: 320px; margin: 10px auto; background: #000; border-radius: 25px; overflow: hidden; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
        
        .face-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 75%; border: 3px dashed rgba(255, 255, 255, 0.4); border-radius: 50% / 60%; z-index: 20; }
        .face-detected { border-color: #10b981; border-style: solid; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        
        .btn-vdc { background: #1e293b; color: white; transition: 0.3s; box-shadow: 0 10px 20px rgba(30, 41, 59, 0.2); }
        .btn-vdc:disabled { opacity: 0.3; box-shadow: none; }
        .btn-confirm { background: #10b981; }
    </style>
</head>
<body class="p-2">

<div class="app-container flex-col">
    <div id="session-info" class="bg-slate-900 text-white p-3 text-[10px] text-center font-black uppercase tracking-widest text-blue-400">VDC AI Scanner</div>

    <div class="p-4 text-center flex-1 flex flex-col justify-between">
        <p id="loading-msg" class="text-[10px] text-red-500 font-bold animate-pulse mb-2 uppercase">⌛ Đang nạp AI...</p>

        <div id="scanner-section" class="flex-1 flex flex-col justify-around">
            <div id="video-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="overlay"></canvas>
                <div class="face-guide" id="faceGuide"></div>
            </div>
            
            <div class="mb-2">
                <p id="scan-status" class="text-[10px] font-black text-slate-400 mb-3 tracking-widest uppercase italic">ÁP MẶT VÀO KHUNG HÌNH</p>
                <button class="btn-vdc w-full py-4 rounded-2xl font-black text-base uppercase shadow-xl" id="btnCapture" onclick="checkFace()" disabled>XÁC NHẬN ĐIỂM DANH</button>
            </div>
        </div>

        <div id="search-section" class="hidden mt-2 p-4 border-t border-dashed border-slate-200 text-left">
            <p class="text-[9px] text-slate-500 mb-3 italic font-bold uppercase text-center">AI chưa nhận ra mặt. Vui lòng nhập tên.</p>
            <input type="text" id="inputName" class="w-full p-4 bg-slate-50 border rounded-xl mb-3 outline-none font-bold text-slate-700 uppercase" placeholder="Tên không dấu">
            <button class="w-full py-4 bg-slate-700 text-white rounded-xl font-bold uppercase text-xs" onclick="searchStudent()">TÌM HỒ SƠ</button>
        </div>

        <div id="verify-section" class="hidden mt-2 bg-blue-50/50 p-4 rounded-3xl border border-blue-100 text-left">
            <img id="preview-photo" class="w-20 h-28 object-cover rounded-xl border-4 border-white shadow-md mx-auto mb-4">
            <div class="grid grid-cols-2 gap-2 text-[8px] font-bold text-slate-400 uppercase tracking-widest">
                <div>STT<input type="text" id="c1" disabled class="w-full p-2 bg-slate-100 rounded-lg font-bold text-slate-800 text-center"></div>
                <div>Học viên<input type="text" id="c2" disabled class="w-full p-2 bg-slate-100 rounded-lg font-bold text-slate-800 uppercase"></div>
            </div>
            <button class="w-full mt-4 py-4 bg-green-600 text-white rounded-2xl font-black text-base uppercase shadow-lg" onclick="saveFinal()">XÁC NHẬN ĐĂNG KÝ</button>
        </div>

        <div id="result-screen" class="hidden mt-2 bg-white p-6 rounded-[30px] shadow-2xl border border-green-50 text-center">
            <div class="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-3 text-white shadow-lg"><i class="fas fa-check text-sm"></i></div>
            <img id="res-photo" class="w-24 h-32 object-cover rounded-2xl border-4 border-white shadow-md mx-auto mb-3">
            <h2 class="text-base font-black text-slate-800 uppercase" id="res-name"></h2>
            <p class="text-[9px] font-bold text-green-600 mt-1" id="res-time"></p>
            <button class="w-full mt-4 py-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-[10px]" onclick="resetScanner()">TIẾP TỤC</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let lastDescriptor, isDetecting = false, faceMatcher, session, currentStudent, capturedPhoto;

    function removeAccents(str) { return str ? str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D') : ""; }

    async function initAI() {
        const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        try {
            await Promise.all([
                faceapi.nets.ssdMobilenetv1.loadFromUri(URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(URL)
            ]);
            document.getElementById('loading-msg').style.display = 'none';
            db.ref('current_session').on('value', async snap => {
                session = snap.val();
                if(session) {
                    document.getElementById('session-info').innerText = "LỚP: " + session.class;
                    await loadFaceDB();
                }
            });
            startCamera();
        } catch (e) { document.getElementById('loading-msg').innerText = "❌ LỖI NẠP AI!"; }
    }

    async function startCamera() {
        const video = document.getElementById('video');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            video.play();
            const canvas = document.getElementById('overlay');
            faceapi.matchDimensions(canvas, { width: 260, height: 320 });
            setInterval(async () => {
                if(!isDetecting) return;
                const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                if(det) {
                    lastDescriptor = det.descriptor;
                    document.getElementById('btnCapture').disabled = false;
                    document.getElementById('faceGuide').classList.add('face-detected');
                    document.getElementById('scan-status').innerText = "✅ ĐÃ KHÓA MẶT";
                    document.getElementById('scan-status').classList.replace('text-slate-400', 'text-green-600');
                } else {
                    document.getElementById('btnCapture').disabled = true;
                    document.getElementById('faceGuide').classList.remove('face-detected');
                    document.getElementById('scan-status').innerText = "🔍 ĐANG TÌM MẶT...";
                    document.getElementById('scan-status').classList.replace('text-green-600', 'text-slate-400');
                }
            }, 600);
        };
    }

    async function loadFaceDB() {
        const snap = await db.ref(`classes/${session.source}/students`).once('value');
        const data = snap.val() || {};
        const labeled = [];
        for (let k in data) {
            if (data[k] && data[k].descriptor) {
                labeled.push(new faceapi.LabeledFaceDescriptors(data[k].stt.toString(), [new Float32Array(data[k].descriptor)]));
            }
        }
        if (labeled.length > 0) faceMatcher = new faceapi.FaceMatcher(labeled, 0.42);
    }

    async function checkFace() {
        const v = document.getElementById('video');
        const canvas = document.createElement('canvas');
        canvas.width = 450; canvas.height = 600;
        canvas.getContext('2d').drawImage(v, 0, 0, 450, 600);
        capturedPhoto = canvas.toDataURL('image/jpeg', 0.8);
        if(faceMatcher && lastDescriptor) {
            const match = faceMatcher.findBestMatch(lastDescriptor);
            if(match.label !== 'unknown') {
                const snap = await db.ref(`classes/${session.source}/students/${match.label}`).once('value');
                if(snap.val()) { currentStudent = snap.val(); return saveAttendance(currentStudent); }
            }
        }
        isDetecting = false;
        document.getElementById('scanner-section').classList.add('hidden');
        document.getElementById('search-section').classList.remove('hidden');
    }

    async function searchStudent() {
        const input = document.getElementById('inputName').value.trim().toLowerCase();
        const clean = removeAccents(input);
        const snap = await db.ref(`classes/${session.source}/students`).once('value');
        const list = snap.val() || {};
        const found = Object.values(list).find(u => u && u.name && (u.name.toLowerCase() === input || removeAccents(u.name.toLowerCase()) === clean));
        if(found) {
            if(found.face_id_url) { alert("Hồ sơ này đã đăng ký!"); resetScanner(); return; }
            currentStudent = found;
            document.getElementById('search-section').classList.add('hidden');
            document.getElementById('verify-section').classList.remove('hidden');
            document.getElementById('preview-photo').src = capturedPhoto;
            document.getElementById('c1').value = found.stt;
            document.getElementById('c2').value = found.name;
        } else { alert("Không tìm thấy tên!"); }
    }

    async function saveFinal() {
        await db.ref(`classes/${session.source}/students/${currentStudent.stt}`).update({ descriptor: Array.from(lastDescriptor), face_id_url: capturedPhoto });
        saveAttendance(currentStudent);
    }

    async function saveAttendance(st) {
        const today = new Date().toISOString().slice(0,10);
        await db.ref(`attendance/${today}/${st.stt}`).set({ name: st.name, timestamp: Date.now(), face_thumb: capturedPhoto });
        isDetecting = false;
        document.getElementById('scanner-section').classList.add('hidden');
        document.getElementById('verify-section').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-photo').src = capturedPhoto;
        document.getElementById('res-name').innerText = st.name.toUpperCase();
        document.getElementById('res-time').innerText = "XÁC NHẬN XONG: " + new Date().toLocaleTimeString('vi-VN');
    }

    function resetScanner() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('search-section').classList.add('hidden');
        document.getElementById('verify-section').classList.add('hidden');
        document.getElementById('scanner-section').classList.remove('hidden');
        isDetecting = true;
        document.getElementById('btnCapture').disabled = true;
        document.getElementById('scan-status').innerText = "🔍 ĐANG TÌM MẶT...";
        document.getElementById('scan-status').classList.replace('text-green-600', 'text-slate-400');
        document.getElementById('faceGuide').classList.remove('face-detected');
    }
    initAI();
</script>
</body>
</html>
