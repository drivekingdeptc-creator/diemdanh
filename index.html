<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC SAFETY - ĐIỂM DANH FACE ID</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #004085; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { text-align: center; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 24px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        p { opacity: 0.8; font-size: 14px; margin-bottom: 20px; }
        
        /* Khung Camera */
        .camera-box { position: relative; width: 320px; height: 420px; margin: 0 auto; border: 4px solid white; border-radius: 160px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; }

        /* Trạng thái và Thông báo */
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; color: #ffc107; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ffc107; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Giao diện overlay khi thành công */
        #success-overlay { display: none; position: fixed; inset: 0; background: rgba(0,64,133,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
        .check-icon { font-size: 80px; color: #28a745; margin-bottom: 20px; }
        
        .footer { position: fixed; bottom: 10px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>VDC SAFETY</h1>
    <p>Hệ thống nhận diện điểm danh thông minh</p>

    <div class="camera-box">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="status">
        <div class="loader"></div> Đang khởi tạo AI...
    </div>
</div>

<div id="success-overlay">
    <div class="check-icon">✓</div>
    <h2 id="success-name">CHÀO ANH/CHỊ!</h2>
    <p>Bạn đã điểm danh thành công.</p>
</div>

<div class="footer">v1.8.8 - Không GPS - AI High Speed</div>

<script>
    // --- CẤU HÌNH FIREBASE (GIỮ NGUYÊN CỦA ANH) ---
    const firebaseConfig = {
        apiKey: "AIzaSyCgbd-57H8-StCcBQPWyLWWAt4QAm-oVNI",
        authDomain: "hepc-ed95d.firebaseapp.com",
        databaseURL: "https://hepc-ed95d-default-rtdb.firebaseio.com",
        projectId: "hepc-ed95d",
        storageBucket: "hepc-ed95d.firebasestorage.app",
        messagingSenderId: "536861347284",
        appId: "1:536861347284:web:61d162705878577f741a41"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let labeledDescriptors = [];
    let faceMatcher = null;

    // 1. TẢI MODEL AI
    async function initAI() {
        status.innerHTML = `<div class="loader"></div> Đang tải mô hình nhân diện...`;
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
        await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
        await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights');
        startVideo();
    }

    // 2. MỞ CAMERA
    function startVideo() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
                status.innerHTML = `<div class="loader"></div> Đang đồng bộ danh sách học viên...`;
                loadLabeledImages();
            })
            .catch(err => {
                status.innerHTML = "❌ Lỗi: Không thể truy cập Camera!";
                alert("Vui lòng cho phép quyền sử dụng Camera!");
            });
    }

    // 3. ĐỒNG BỘ DATA FACE ID TỪ FIREBASE
    async function loadLabeledImages() {
        const snap = await db.ref('students').once('value');
        const data = snap.val() || {};
        const labels = Object.keys(data);

        if (labels.length === 0) {
            status.innerHTML = "⚠️ Chưa có dữ liệu khuôn mặt nào.";
            // Vẫn cho chạy để nhận diện "Người lạ"
            startDetection();
            return;
        }

        labeledDescriptors = labels.map(label => {
            const descriptors = data[label].descriptors.map(d => new Float32Array(d));
            return new faceapi.LabeledFaceDescriptors(label, descriptors);
        });

        faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
        status.innerHTML = "👉 Vui lòng nhìn thẳng vào Camera";
        startDetection();
    }

    // 4. VÒNG LẶP NHẬN DIỆN
    function startDetection() {
        const canvas = document.getElementById('canvas');
        const displaySize = { width: 320, height: 420 };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptors();

            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

            if (resizedDetections.length > 0) {
                const bestMatch = faceMatcher ? faceMatcher.findBestMatch(resizedDetections[0].descriptor) : null;
                
                if (bestMatch && bestMatch.label !== 'unknown') {
                    // Nhận diện ĐÚNG NGƯỜI
                    status.innerHTML = `<span style="color:#28a745">Xác nhận: ${bestMatch.label}</span>`;
                    processAttendance(bestMatch.label);
                } else {
                    status.innerHTML = `<span style="color:#ffc107">Đang quét... (Người lạ)</span>`;
                }
            }
        }, 800); // Quét mỗi 0.8 giây
    }

    // 5. XỬ LÝ LƯU ĐIỂM DANH (KHÔNG GPS)
    let isProcessing = false;
    async function processAttendance(studentId) {
        if (isProcessing) return;
        isProcessing = true;

        try {
            // Lấy phiên dạy hiện tại (Ngày/Buổi)
            const sessSnap = await db.ref('current_session').once('value');
            const sess = sessSnap.val();
            
            if (!sess) {
                alert("Giảng viên chưa mở phiên dạy!");
                isProcessing = false;
                return;
            }

            // Chụp ảnh bằng Canvas
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 320; tempCanvas.height = 420;
            tempCanvas.getContext('2d').drawImage(video, 0, 0, 320, 420);
            const photoBase64 = tempCanvas.toDataURL('image/jpeg', 0.7);

            // Lưu Firebase (Lược bỏ hoàn toàn GPS)
            const now = new Date();
            await db.ref(`attendance/${sess.date}/${sess.session}/${studentId}`).set({
                stt: studentId,
                time: now.toLocaleTimeString('vi-VN') + " " + now.toLocaleDateString('vi-VN'),
                photo: photoBase64,
                lat: null,
                lng: null
            });

            // Hiển thị Overlay thành công
            document.getElementById('success-name').innerText = "CHÀO STT: " + studentId;
            document.getElementById('success-overlay').style.display = 'flex';

            // Tự động reset sau 2.5 giây cho người tiếp theo
            setTimeout(() => {
                location.reload();
            }, 2500);

        } catch (error) {
            console.error(error);
            isProcessing = false;
        }
    }

    window.onload = initAI;
</script>
</body>
</html>
